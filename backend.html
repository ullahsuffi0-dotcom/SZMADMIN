<style>
:root{--bg:#f5f7fb;--sf:#ffffff;--sf2:#f1f4f9;--sf3:#e6ebf3;--bd:#dde3ec;--bd2:#c5cdd9;--tx:#1a2233;--tx2:#5a6378;--tx3:#8893a5;--ac:#3d6ee0;--ac2:#e4ecfb;--ac3:#bdd0f4;--su:#10a169;--subg:#dff5ea;--wn:#c97a04;--wnbg:#fdf3dc;--dn:#d63838;--dnbg:#fce0e0;--gd:#b88a04;--gdbg:#fdf3d2;--pu:#7c3aed;--pubg:#ece4fc;--tl:#0d8a7a;--tlbg:#dcf3ef;--r:10px;--rs:6px;--sh:0 2px 8px rgba(15,30,60,.06);--shl:0 8px 28px rgba(15,30,60,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px}
button,input,select,textarea{font-family:'Sora',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.hidden{display:none!important}
#lp{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(ellipse at 20% 50%,rgba(79,142,247,.08),transparent 50%)}
.lw{width:420px;padding:0 16px}.ll{text-align:center;margin-bottom:24px}
.li{width:62px;height:62px;background:linear-gradient(135deg,var(--ac),var(--pu));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px;box-shadow:0 8px 32px rgba(79,142,247,.3);overflow:hidden}
.li img{width:100%;height:100%;object-fit:contain}.ll h1{font-size:20px;font-weight:700}.ll p{font-size:12px;color:var(--tx2);margin-top:3px}
.lc{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:24px;box-shadow:var(--shl)}
.lsw{display:flex;gap:2px;background:var(--sf2);border-radius:6px;padding:3px}
.lb{padding:4px 9px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;color:var(--tx3);border:none;background:none;font-family:'Sora',sans-serif}
.lb.act{background:var(--ac);color:#fff}
.dl{background:var(--bg);border-radius:8px;padding:11px;margin-top:14px;font-size:11px}
.dl .dt{font-weight:600;color:var(--tx2);margin-bottom:6px}
.dr{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--bd);color:var(--tx3)}
.dr:last-child{border:none}.dr span:last-child{color:var(--ac);font-weight:500}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.ib{background:linear-gradient(90deg,#f97316,var(--gd));padding:7px 18px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:500;color:#000;flex-shrink:0}
#ai{display:flex;flex:1;overflow:hidden}
#sb{width:220px;background:var(--sf2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
#ma{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{height:52px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 18px;gap:9px;flex-shrink:0}
#ct{flex:1;overflow-y:auto;background:var(--bg)}
.sh{padding:14px;border-bottom:1px solid var(--bd)}.sl{display:flex;align-items:center;gap:9px}
.si{width:32px;height:32px;background:linear-gradient(135deg,var(--ac),var(--pu));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;overflow:hidden}
.si img{width:100%;height:100%;object-fit:contain}
.sst{font-size:11px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sss{font-size:9px;color:var(--tx3);margin-top:1px}
.su2{padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer}.su2:hover{background:var(--sf2)}
.up{display:flex;align-items:center;gap:8px}
.ua{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:#fff}
.un{font-size:12px;font-weight:600;color:var(--tx)}.ur{font-size:10px;color:var(--tx3)}
.snv{padding:6px 0;flex:1}
.ns{padding:7px 14px 3px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3)}
.ni{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .15s;border-left:2px solid transparent;margin:1px 0}
.ni:hover{background:var(--sf2);color:var(--tx)}.ni.act{background:var(--ac2);color:var(--ac);border-left-color:var(--ac)}
[dir=rtl] .ni{border-left:none;border-right:2px solid transparent}
[dir=rtl] .ni.act{border-right-color:var(--ac)}
.nx{font-size:14px;width:17px;text-align:center}
.nb2{margin-left:auto;background:var(--dn);color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:10px}
.sft{padding:10px 14px;border-top:1px solid var(--bd)}
.lo{width:100%;padding:7px;background:var(--sf2);color:var(--tx2);border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:'Sora',sans-serif}
.lo:hover{background:var(--dnbg);color:var(--dn)}
.tbt{font-size:14px;font-weight:600}
.tbr{margin-left:auto;display:flex;align-items:center;gap:7px}
.tbg{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:4px 9px;font-size:11px;color:var(--tx2)}
.ld{width:7px;height:7px;background:var(--su);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ep{position:fixed;top:20px;right:20px;z-index:2000;background:var(--gd);color:#000;border-radius:var(--r);padding:14px 18px;max-width:300px;box-shadow:var(--shl);animation:sli .3s ease}
.ept{font-weight:700;font-size:13px;margin-bottom:5px}
.epi{font-size:11px;padding:3px 0;border-bottom:1px solid rgba(0,0,0,.1)}.epi:last-child{border:none}
@keyframes sli{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.pi{padding:18px 22px;max-width:1400px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}
.cg{display:grid;gap:13px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:1fr 1fr 1fr 1fr}

.stat{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:15px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.bl::before{background:linear-gradient(90deg,var(--ac),var(--pu))}.stat.gn::before{background:linear-gradient(90deg,var(--su),var(--tl))}
.stat.go::before{background:linear-gradient(90deg,var(--gd),var(--wn))}.stat.rd::before{background:linear-gradient(90deg,var(--dn),#f97316)}
.sl2{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.sv{font-size:26px;font-weight:700;letter-spacing:-1px}.sb3{font-size:10px;color:var(--tx3);margin-top:4px}
.sic{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:26px;opacity:.12}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:none;white-space:nowrap;font-family:'Sora',sans-serif}
.bp{background:var(--ac);color:#fff}.bp:hover{background:#3d7de0}
.bs{background:var(--su);color:#000}.bs:hover{background:#28c387}
.bd3{background:var(--dn);color:#fff}.bd3:hover{background:#e05555}
.bg2{background:var(--sf2);color:var(--tx2);border:1px solid var(--bd)}.bg2:hover{background:var(--sf3);color:var(--tx)}
.bo{background:var(--gd);color:#000}.bo:hover{background:#deb535}
.bsm{padding:5px 11px;font-size:11px}.bxs{padding:3px 8px;font-size:10px}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--ac)}
.fg select option{background:var(--sf2);color:var(--tx)}
.fg textarea{resize:vertical;min-height:76px;line-height:1.5}

.fr{display:grid;gap:11px}.f2{grid-template-columns:1fr 1fr}.f3{grid-template-columns:1fr 1fr 1fr}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse;font-size:12px}thead{background:var(--sf2)}
th{padding:9px 12px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--bd);vertical-align:middle;color:var(--tx2)}
td strong{color:var(--tx)}tr:last-child td{border-bottom:none}tr:hover td{background:var(--sf2)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.bbl{background:var(--ac2);color:var(--ac);border:1px solid var(--ac3)}.bgn{background:var(--subg);color:var(--su)}
.bgo{background:var(--gdbg);color:var(--gd)}.brd{background:var(--dnbg);color:var(--dn)}
.bpu{background:var(--pubg);color:var(--pu)}.btl{background:var(--tlbg);color:var(--tl)}.bgr{background:var(--sf3);color:var(--tx3)}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.mo{background:var(--sf);border:1px solid var(--bd);border-radius:14px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;box-shadow:var(--shl)}
.ml{max-width:820px}
.mh{padding:17px 20px 13px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--sf);z-index:10;border-bottom:1px solid var(--bd)}
.mh h3{font-size:14px;font-weight:600}
.mc{font-size:18px;color:var(--tx3);cursor:pointer;width:27px;height:27px;display:flex;align-items:center;justify-content:center;border-radius:5px;border:none;background:none}
.mc:hover{background:var(--sf2);color:var(--tx)}
.mb2{padding:17px 20px}.mf{padding:13px 20px 18px;display:flex;gap:7px;justify-content:flex-end;border-top:1px solid var(--bd)}
#tr{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--sf);border:1px solid var(--bd);border-radius:7px;padding:10px 15px;font-size:12px;color:var(--tx);box-shadow:var(--shl);animation:ti .2s ease;display:flex;align-items:center;gap:7px;min-width:240px}
.toast.success{border-left:3px solid var(--su)}.toast.danger{border-left:3px solid var(--dn)}.toast.info{border-left:3px solid var(--ac)}
@keyframes ti{from{transform:translateX(28px);opacity:0}to{transform:translateX(0);opacity:1}}
.sh2{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.sh2 h3{font-size:13px;font-weight:600}
.tl2{padding-left:13px;border-left:2px solid var(--bd)}.tli{position:relative;padding:0 0 12px 16px}
.tld{position:absolute;left:-6px;top:4px;width:11px;height:11px;border-radius:50%;background:var(--ac);border:2px solid var(--bg)}
.tlm{font-size:10px;color:var(--tx3);margin-bottom:2px}.tlc{font-size:12px;color:var(--tx2)}
.prog{height:5px;background:var(--sf3);border-radius:3px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--ac),var(--pu));border-radius:3px;transition:width .3s}
.al{padding:10px 13px;border-radius:var(--rs);font-size:12px;margin-bottom:12px;line-height:1.5}
.ai{background:var(--ac2);color:#1e4498;border:1px solid var(--ac3)}
.aw{background:var(--wnbg);color:#7a4d00;border:1px solid #e8c17a}
.ad{background:var(--dnbg);color:#a52424;border:1px solid #f0adad}
.ag{background:var(--subg);color:#0a6a47;border:1px solid #87d6b0}
.dv{height:1px;background:var(--bd);margin:14px 0}
code{font-family:'JetBrains Mono',monospace;background:var(--sf2);padding:2px 6px;border-radius:4px;font-size:11px;color:var(--ac)}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:13px}
.tab{padding:8px 14px;font-size:12px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab.act{color:var(--ac);border-bottom-color:var(--ac)}
.emp{text-align:center;padding:32px 20px;color:var(--tx3)}.emp .ei{font-size:30px;margin-bottom:8px}.emp p{font-size:12px}
.sd{position:absolute;top:100%;left:0;right:0;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);z-index:200;display:none;max-height:200px;overflow-y:auto;box-shadow:var(--sh)}
.sdi{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--bd);font-size:12px}.sdi:last-child{border:none}.sdi:hover{background:var(--sf2)}
.tsw{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.sw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.sw.act{border-color:var(--tx);transform:scale(1.18)}
.mono{font-family:'JetBrains Mono',monospace}
@media print{#sb,#tb,#tr,.no-print,.ib,.ep{display:none!important}#app{display:block}#ct{overflow:visible}body{background:#fff;color:#000}}
</style>

<style>
/* Immediately hide login/app for parent or pickup URL params, BEFORE JS runs */
html.parent-url #lp, html.parent-url #app, html.pickup-url #lp, html.pickup-url #app { display: none !important; }
</style>
<script>
// Run immediately at parse time — before login panel renders to user
(function(){
  try{
    var p=new URLSearchParams(window.location.search);
    if(p.get('parent')==='1')document.documentElement.classList.add('parent-url');

<script>
'use strict';
window.SZM_VERSION='2026.05.20a';
console.log('[SZM] Version '+window.SZM_VERSION);
// ─── SZM MODE DETECTION ─────────────────────────────────
// Auto-detect mode: /admin/ path → 'backend', everything else → 'client'
(function(){
  var path=window.location.pathname.toLowerCase();
  if(path.includes('/admin'))window.SZM_MODE='backend';
  else if(path.includes('backend.html')||path.endsWith('/backend'))window.SZM_MODE='backend';
  else{
    var p=new URLSearchParams(window.location.search);
    if(p.get('mode')==='backend')window.SZM_MODE='backend';
    else window.SZM_MODE='client';
  }

// ─── PASSWORD HASHING (SHA-256 via Web Crypto API) ───────
async function hashPassword(plain){
  const enc=new TextEncoder().encode(plain+'__szm_salt_2024');
  const buf=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function hashPasswordSync(plain){
  let h=0x811c9dc5;
  const s=plain+'__szm_salt_2024';
  for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193);}
  return'fnv1a_'+(h>>>0).toString(16).padStart(8,'0');
}

function clearLoginSession(){
  try{sessionStorage.removeItem('sms7_login_session');}catch(e){}

function restoreLoginSession(){
  try{
    const raw=sessionStorage.getItem('sms7_login_session');
    if(!raw)return null;
    const sess=JSON.parse(raw);
    if(Date.now()-sess.ts>86400000)return null;
    const acc=DB.get('accounts')||[];
    const user=acc.find(a=>a.id===sess.uid&&a.active)||null;
    if(!user)return null;
    // Mode enforcement on session restore
    if(window.SZM_MODE==='backend'&&user.role!=='backend_admin')return null;
    if(window.SZM_MODE==='client'&&user.role==='backend_admin')return null;
    return user;
  }catch(e){return null;}
}

localStorage.setItem=function(k,v){
  _origLSsetItem(k,v);

  if(!k.startsWith('sms7_')||window.__fbSyncPaused||!window.__FB||!window.__FB.db)return;

};

  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp2').value.trim();
  if(!u||!p){toast('Please enter username and password','danger');return;}

  if(typeof initSessions==='function'){try{initSessions();}catch(e){}}
  if(typeof seed==='function'){try{seed();}catch(e){}}
  if(typeof migrate==='function'){try{migrate();}catch(e){}}
  if(typeof ensureAccountsExist==='function'){try{ensureAccountsExist();}catch(e){}}

  // Pull latest accounts from Firebase before checking credentials (with 3s timeout)
  if(window.__FB&&window.__FB.db&&window.__FB.connected){
    try{
      const fbPromise=window.__FB.get(window.__FB.ref(window.__FB.db,'data/accounts'));
      const timeoutPromise=new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),3000));
      const snap=await Promise.race([fbPromise,timeoutPromise]);
      if(snap.exists()){
        let fbAcc=snap.val();
        if(fbAcc&&typeof fbAcc==='object'&&!Array.isArray(fbAcc)){
          const ks=Object.keys(fbAcc);
          if(ks.length>0&&ks.every(k=>/^\d+$/.test(k))){const a=[];ks.sort((x,y)=>+x-+y).forEach(k=>a.push(fbAcc[k]));fbAcc=a;}
        }
        if(Array.isArray(fbAcc)&&fbAcc.length>0){
          const localAcc=JSON.parse(localStorage.getItem('sms7_accounts')||'[]');
          const localBA=localAcc.find(a=>a.role==='backend_admin');
          const fbBA=fbAcc.find(a=>a.role==='backend_admin');
          if(localBA&&!fbBA){fbAcc.unshift(localBA);}
          else if(localBA&&fbBA){
            const localTs=localBA._pwdChangedAt||'';
            const fbTs=fbBA._pwdChangedAt||'';
            if(localTs>=fbTs){fbBA.password=localBA.password;fbBA._pwdChangedAt=localTs;}
            if(localBA._mustChangePassword)fbBA._mustChangePassword=true;
          }
          window.__fbSyncPaused=true;
          localStorage.setItem('sms7_accounts',JSON.stringify(fbAcc));
          window.__fbSyncPaused=false;
        }
      }
    }catch(e){console.warn('[FB] Could not fetch accounts (using local data):',e.message);}
  }

  // Ensure backend admin account exists after Firebase sync (Firebase may not have it)
  if(typeof ensureAccountsExist==='function'){try{ensureAccountsExist();}catch(e){}}
  // Wait for any pending async hash upgrades to complete
  await new Promise(r=>setTimeout(r,50));

  const acc=DB.get('accounts')||[];
  if(!acc.length){
    toast('Account database is empty — reloading...','danger');
    try{localStorage.removeItem('sms7_sv7');}catch(e){}
    setTimeout(()=>location.reload(),1500);
    return;
  }

  // Try Firebase Auth first (server-side auth), then fall back to local hash
  let user=null;
  const fbAccount=acc.find(a=>a.username===u&&a.active);
  if(fbAccount&&fbAccount.firebaseEmail&&window.__FB_AUTH){
    try{
      await window.__FB_AUTH.signIn(window.__FB.auth,fbAccount.firebaseEmail,p);
      user=fbAccount;
    }catch(e){
      // Firebase Auth failed — try local hash fallback
    }
  }
  if(!user){
    const hashed=await hashPassword(p);
    user=acc.find(a=>a.username===u&&a.active&&(a.password===hashed));
    if(!user){
      const fnvHash=hashPasswordSync(p);
      user=acc.find(a=>a.username===u&&a.active&&a.password===fnvHash);
      if(user){user.password=hashed;DB.set('accounts',acc);}
    }
    if(!user){
      const legacy=acc.find(a=>a.username===u&&a.active&&a.password===p&&!a.password.match(/^[a-f0-9]{64}$/));
      if(legacy){
        legacy.password=hashed;
        DB.set('accounts',acc);
        user=legacy;
      }
    }
  }
  // GUARANTEED FALLBACK: If all hash checks failed, the stored hash may be corrupted
  // by Firebase sync race conditions or async upgrade races. For accounts that still
  // have _mustChangePassword (default password not yet changed), allow login with the
  // known default password and fix the stored hash.
  if(!user){
    const knownDefaults=['admin123','staff@123','backend@admin'];
    if(knownDefaults.includes(p)){
      const candidate=acc.find(a=>a.username===u&&a.active&&a._mustChangePassword);
      if(candidate){
        const fixedHash=await hashPassword(p);
        candidate.password=fixedHash;DB.set('accounts',acc);user=candidate;
        console.log('[Login] Default-password fallback login for: '+u+' — stored hash was corrupted, now fixed.');
      }
    }
  }
  // Silently register Firebase Auth account for future logins
  if(user&&!user.firebaseEmail&&window.__FB_AUTH){
    const email=user.username+'@szm-school.app';
    try{
      await window.__FB_AUTH.createUser(window.__FB.auth,email,p);
      const idx=acc.findIndex(a=>a.id===user.id);
      if(idx>=0){acc[idx].firebaseEmail=email;DB.set('accounts',acc);user=acc[idx];}
    }catch(e){/* ignore — may already exist or auth not enabled */}
  }
  if(!user){
    _loginAttempts.count++;
    if(_loginAttempts.count>=5){_loginAttempts.lockUntil=Date.now()+30000;_loginAttempts.count=0;toast('Too many failed attempts. Locked for 30s','danger');}
    else{toast('Invalid credentials','danger');}
    return;
  }
  // Mode enforcement: backend.html only allows backend_admin; client.html blocks backend_admin
  if(window.SZM_MODE==='backend'&&user.role!=='backend_admin'){toast('This portal is for Backend Admin only. School staff should use the Client portal.','danger');return;}
  if(window.SZM_MODE==='client'&&user.role==='backend_admin'){toast('Backend Admin cannot log in here. Use the Backend Admin portal.','danger');return;}
  _loginAttempts.count=0;_loginAttempts.lockUntil=0;
  CU=user;SAIMP=false;SAR=null;saveLoginSession(user);
  launch();
}

  if(CU.role!=='backend_admin'||CU._impersonating){
    // Own permissions
    if(CU.permissions){Object.keys(CU.permissions).forEach(p=>{if(CU.permissions[p]==='hidden')hiddenSet.add(p);});}

function buildStuTbl(students){
  if(!students.length)return'<div class="emp"><div class="ei">👨‍🎓</div><p>'+T('no_records')+'</p></div>';
  const cE=['superadmin','principal'].includes(CU.role),cV=['superadmin','principal','vice_principal','student_advisor','academic_supervisor','quality_supervisor'].includes(CU.role),cR=['superadmin','principal','vice_principal','student_advisor'].includes(CU.role);
  return'<div class="tw"><table><thead><tr><th>SN</th><th>CS</th><th>'+T('first_name')+'</th><th>'+T('last_name')+'</th><th>'+T('grade')+'</th><th>'+T('nationality')+'</th><th>'+T('father_phone')+'</th><th>'+T('mother_phone')+'</th><th>Advisor</th><th>Actions</th></tr></thead><tbody>'+students.map(s=>{const adv=gA(s.advisorId);return'<tr><td class="mono" style="color:var(--tx3)">'+(s.sn||'—')+'</td><td class="mono" style="color:var(--tx3)">'+(s.csn||'—')+'</td><td><strong>'+s.firstName+'</strong></td><td>'+s.lastName+'</td><td><span class="badge bbl">Gr '+s.grade+'-'+s.section+'</span></td><td style="font-size:11px">'+(s.nationality||'—')+'</td><td class="mono" style="font-size:11px">'+(s.fatherPhone||'—')+'</td><td class="mono" style="font-size:11px">'+(s.motherPhone||'—')+'</td><td style="font-size:11px;color:var(--tx3)">'+(adv?adv.firstName+' '+adv.lastName:'—')+'</td><td style="display:flex;gap:4px">'+(cV?'<button class="btn bg2 bxs" onclick="vStuRec(\''+s.id+'\')">📋</button>':'')+(cE?'<button class="btn bg2 bxs" onclick="editStuM(\''+s.id+'\')">'+T('edit')+'</button>':'')+(cR?'<button class="btn bg2 bxs" onclick="qRef(\''+s.id+'\')">Refer</button>':'')+'</td></tr>';}).join('')+'</tbody></table></div>';
}
function vStuRec(id){
  const s=gS(id);if(!s)return;
  const inf=(DB.get('infractions')||[]).filter(i=>i.studentId===id),refs=(DB.get('referrals')||[]).filter(r=>r.studentId===id),nbs=(DB.get('notebook_checks')||[]).filter(n=>n.studentId===id),cmps=(DB.get('complaints')||[]).filter(c=>c.studentName===fN(s)),adv=gA(s.advisorId);
  openM('<div class="mh"><h3>📋 '+fN(s)+'</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2"><div class="cg g3" style="margin-bottom:12px;font-size:12px"><div><div style="font-size:10px;color:var(--tx3)">'+T('grade')+'</div><div style="font-weight:600">Gr '+s.grade+'-'+s.section+'</div></div><div><div style="font-size:10px;color:var(--tx3)">'+T('nationality')+'</div><div style="font-weight:600">'+(s.nationality||'—')+'</div></div><div><div style="font-size:10px;color:var(--tx3)">SN/CS</div><div style="font-weight:600">'+s.sn+'/'+s.csn+'</div></div><div><div style="font-size:10px;color:var(--tx3)">'+T('father_phone')+'</div><div class="mono" style="font-weight:600">'+(s.fatherPhone||'—')+'</div></div><div><div style="font-size:10px;color:var(--tx3)">'+T('mother_phone')+'</div><div class="mono" style="font-weight:600">'+(s.motherPhone||'—')+'</div></div><div><div style="font-size:10px;color:var(--tx3)">Advisor</div><div style="font-weight:600">'+(adv?adv.firstName+' '+adv.lastName:'—')+'</div></div></div><div class="tabs"><div class="tab act" onclick="swStuTab(\'inf\',\''+id+'\',this)">⚠️ '+T('infractions')+' ('+inf.length+')</div><div class="tab" onclick="swStuTab(\'ref\',\''+id+'\',this)">🔀 '+T('referrals')+' ('+refs.length+')</div><div class="tab" onclick="swStuTab(\'nb\',\''+id+'\',this)">📓 Notebooks ('+nbs.length+')</div><div class="tab" onclick="swStuTab(\'cmp\',\''+id+'\',this)">📋 '+T('complaints')+' ('+cmps.length+')</div></div><div id="stc">'+bInfTab(inf)+'</div></div>',true);
}
function bInfTab(list){const db={'Degree 1 — Minor':'bbl','Degree 2 — Moderate':'bgo','Degree 3 — Serious':'brd','Degree 4 — Severe':'brd'};if(!list.length)return'<div class="emp"><div class="ei">✅</div><p>'+T('no_records')+'</p></div>';return list.map(i=>'<div class="card" style="margin-bottom:7px"><div style="display:flex;gap:5px;align-items:center;margin-bottom:4px"><span class="badge '+(db[i.degree]||'bgr')+'">'+i.degree+'</span><strong style="font-size:12px">'+i.type+'</strong><span style="margin-left:auto;font-size:10px;color:var(--tx3)">'+i.date+'</span></div><div style="font-size:12px;color:var(--tx2)">'+i.description+'</div>'+(i.principalAck?'<div style="font-size:11px;color:var(--gd);margin-top:3px">🎯 '+i.principalAck+'</div>':'')+'</div>').join('');}
window.swStuTab=function(tab,id,el){document.querySelectorAll('.mo .tab').forEach(t=>t.classList.remove('act'));el.classList.add('act');const s=gS(id),cont=document.getElementById('stc');if(tab==='inf'){cont.innerHTML=bInfTab((DB.get('infractions')||[]).filter(i=>i.studentId===id));}else if(tab==='ref'){const list=(DB.get('referrals')||[]).filter(r=>r.studentId===id);cont.innerHTML=list.length?list.map(r=>'<div class="card" style="margin-bottom:7px"><span class="badge bpu">'+r.reason+'</span><div style="font-size:12px;margin-top:4px">'+r.description+'</div><div style="font-size:10px;color:var(--tx3);margin-top:2px">'+r.referredByName+' → '+r.referredToName+' · '+r.created+'</div>'+r.notes.map(n=>'<div style="font-size:11px;color:var(--tl);margin-top:2px">💬 '+n.by+': '+n.text+'</div>').join('')+'</div>').join(''):'<div class="emp"><div class="ei">🔀</div><p>'+T('no_records')+'</p></div>';}else if(tab==='nb'){const list=(DB.get('notebook_checks')||[]).filter(n=>n.studentId===id);cont.innerHTML=list.length?list.map(n=>'<div class="card" style="margin-bottom:7px"><div style="font-size:10px;color:var(--tx3)">'+n.date+' · '+n.subject+' · '+n.supervisorName+'</div><div class="cg g3" style="margin-top:5px;font-size:11px"><div><div style="color:var(--tx3)">Notebook</div>'+n.notebookStatus+'</div><div><div style="color:var(--tx3)">Workbook</div>'+n.workbookStatus+'</div><div><div style="color:var(--tx3)">Tchr</div>'+n.teacherChecking+'</div></div></div>').join(''):'<div class="emp"><div class="ei">📓</div><p>'+T('no_records')+'</p></div>';}else if(tab==='cmp'){const list=(DB.get('complaints')||[]).filter(c=>c.studentName===fN(s));cont.innerHTML=list.length?list.map(c=>'<div class="card" style="margin-bottom:7px"><strong class="mono">'+c.trackNo+'</strong> <span class="badge bpu">'+c.type+'</span><span class="badge '+(c.status==='Open'?'brd':c.status==='Resolved'?'bgn':'bbl')+'">'+c.status+'</span><div style="font-size:12px;color:var(--tx2);margin-top:4px">'+c.description+'</div></div>').join(''):'<div class="emp"><div class="ei">📋</div><p>'+T('no_records')+'</p></div>';}};
function addStuM(){const advisors=(DB.get('accounts')||[]).filter(a=>a.role==='student_advisor'&&a.active);openM('<div class="mh"><h3>+ Student</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2"><div class="fr f3"><div class="fg"><label>SN</label><input id="nssn" type="number"></div><div class="fg"><label>CS</label><input id="nscs" type="number"></div><div class="fg"><label>'+T('nationality')+'</label><input id="nsnat"></div></div><div class="fr f2"><div class="fg"><label>'+T('first_name')+' *</label><input id="nsfn"></div><div class="fg"><label>'+T('last_name')+' *</label><input id="nsln"></div></div><div class="fr f3"><div class="fg"><label>'+T('grade')+' *</label><input id="nsgr"></div><div class="fg"><label>'+T('section')+' *</label><input id="nssc"></div><div class="fg"><label>Gender</label><select id="nsgn"><option>Male</option><option>Female</option></select></div></div><div class="fr f2"><div class="fg"><label>'+T('father_phone')+' *</label><input id="nsfp"></div><div class="fg"><label>'+T('mother_phone')+'</label><input id="nsmp"></div></div><div class="fg"><label>Advisor</label><select id="nsad"><option value="">— None —</option>'+advisors.map(a=>'<option value="'+a.id+'">'+a.firstName+' '+a.lastName+'</option>').join('')+'</select></div></div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="saveStu()">+ '+T('add')+' →</button></div>');}
function saveStu(){const fn=document.getElementById('nsfn').value.trim(),ln=document.getElementById('nsln').value.trim(),gr=document.getElementById('nsgr').value.trim(),sc=document.getElementById('nssc').value.trim(),fp=document.getElementById('nsfp').value.trim();if(!fn||!ln||!gr||!sc||!fp){toast('Fill required fields','danger');return;}const students=DB.get('students')||[];students.push({id:'s'+Date.now(),sn:parseInt(document.getElementById('nssn').value)||students.length+1,csn:parseInt(document.getElementById('nscs').value)||1,firstName:fn,lastName:ln,grade:gr,section:sc,gender:document.getElementById('nsgn').value,nationality:document.getElementById('nsnat').value,fatherPhone:fp,motherPhone:document.getElementById('nsmp').value,advisorId:document.getElementById('nsad').value,created:new Date().toISOString().split('T')[0]});DB.set('students',students);logA('Added student: '+fn+' '+ln);closeM();toast('Student added','success');rStudents();}
function editStuM(id){const s=gS(id);if(!s)return;const advisors=(DB.get('accounts')||[]).filter(a=>a.role==='student_advisor'&&a.active);openM('<div class="mh"><h3>Edit: '+fN(s)+'</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2"><div class="fr f3"><div class="fg"><label>SN</label><input id="essn" value="'+(s.sn||'')+'"></div><div class="fg"><label>CS</label><input id="escs" value="'+(s.csn||'')+'"></div><div class="fg"><label>'+T('nationality')+'</label><input id="esnat" value="'+esc(s.nationality||'')+'"></div></div><div class="fr f2"><div class="fg"><label>'+T('first_name')+'</label><input id="esfn" value="'+esc(s.firstName)+'"></div><div class="fg"><label>'+T('last_name')+'</label><input id="esln" value="'+esc(s.lastName)+'"></div></div><div class="fr f3"><div class="fg"><label>'+T('grade')+'</label><input id="esgr" value="'+s.grade+'"></div><div class="fg"><label>'+T('section')+'</label><input id="essc" value="'+s.section+'"></div><div class="fg"><label>Gender</label><select id="esgn"><option '+(s.gender==='Male'?'selected':'')+'>Male</option><option '+(s.gender==='Female'?'selected':'')+'>Female</option></select></div></div><div class="fr f2"><div class="fg"><label>'+T('father_phone')+'</label><input id="esfp" value="'+esc(s.fatherPhone||'')+'"></div><div class="fg"><label>'+T('mother_phone')+'</label><input id="esmp" value="'+esc(s.motherPhone||'')+'"></div></div><div class="fg"><label>Advisor</label><select id="esad"><option value="">— None —</option>'+advisors.map(a=>'<option value="'+a.id+'"'+(s.advisorId===a.id?' selected':'')+'>'+a.firstName+' '+a.lastName+'</option>').join('')+'</select></div></div><div class="mf"><button class="btn bd3 bsm" onclick="delStu(\''+id+'\')">Delete</button><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="saveEditStu(\''+id+'\')">'+T('save')+' →</button></div>');}
function saveEditStu(id){const students=DB.get('students')||[];const i=students.findIndex(s=>s.id===id);if(i<0)return;students[i]={...students[i],sn:parseInt(document.getElementById('essn').value)||students[i].sn,csn:parseInt(document.getElementById('escs').value)||students[i].csn,firstName:document.getElementById('esfn').value.trim(),lastName:document.getElementById('esln').value.trim(),grade:document.getElementById('esgr').value.trim(),section:document.getElementById('essc').value.trim(),gender:document.getElementById('esgn').value,nationality:document.getElementById('esnat').value,fatherPhone:document.getElementById('esfp').value,motherPhone:document.getElementById('esmp').value,advisorId:document.getElementById('esad').value};DB.set('students',students);logA('Updated student: '+fN(students[i]));closeM();toast('Updated','success');rStudents();}
function delStu(id){if(!confirm('Delete this student?'))return;DB.set('students',(DB.get('students')||[]).filter(s=>s.id!==id));logA('Deleted student');closeM();toast('Deleted','danger');rStudents();}
function impStuM(){openM('<div class="mh"><h3>📥 Import Students CSV</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2"><div class="al ai">CSV columns: SN, CS, FirstName, LastName, Grade, Section, Gender, Nationality, FatherPhone, MotherPhone</div><div style="background:var(--sf2);border-radius:var(--rs);padding:9px;font-family:monospace;font-size:10px;color:var(--tx3);margin-bottom:12px">1,1,Abdullah,Al-Harbi,10,A,Male,Saudi,0501234567,0501234568</div><div class="fg"><label>CSV File *</label><input type="file" id="impf" accept=".csv"></div></div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="procImp()">Import →</button></div>');window.procImp=function(){const file=document.getElementById('impf').files[0];if(!file){toast('Select file','danger');return;}const reader=new FileReader();reader.onload=e=>{const lines=e.target.result.split('\n').filter(l=>l.trim()).slice(1);const students=DB.get('students')||[];let added=0;lines.forEach(line=>{const[sn,csn,fn,ln,grade,sec,gender,nat,fp,mp]=line.split(',').map(c=>c.trim().replace(/"/g,''));if(fn&&ln&&grade){students.push({id:'s'+Date.now()+added,sn:parseInt(sn)||added+1,csn:parseInt(csn)||1,firstName:fn,lastName:ln,grade,section:sec||'A',gender:gender||'Male',nationality:nat||'',fatherPhone:fp||'',motherPhone:mp||'',advisorId:'',created:new Date().toISOString().split('T')[0]});added++;}});DB.set('students',students);logA('Imported '+added+' students from CSV');closeM();toast(added+' students imported','success');rStudents();};reader.readAsText(file);};}

function rComplaints(){
  const canA=['superadmin','principal','vice_principal','academic_supervisor'].includes(CU.role);
  const canViewAll=canA||CU.role==='quality_incharge';
  const complaints=DB.get('complaints')||[];const myList=canViewAll?complaints:complaints.filter(c=>c.assignedTo===CU.id);
  const bm={Open:'brd','In Progress':'bbl',Resolved:'bgn',Closed:'bgr'};const pm={High:'brd',Medium:'bgo',Low:'bgn'};
  document.getElementById('pc').innerHTML='<div class="card" style="margin-bottom:12px"><div style="display:flex;gap:6px;flex-wrap:wrap">'+['All','Open','In Progress','Resolved','Closed'].map(s=>'<button class="btn '+(s==='All'?'bp':'bg2')+' bsm cf" onclick="fltCmp(\''+s+'\',this)">'+s+'</button>').join('')+'</div></div><div class="card" id="cmpw">'+bCmpTbl(myList,bm,pm)+'</div>';
  window.fltCmp=function(s,el){document.querySelectorAll('.cf').forEach(b=>{b.className=b.className.replace('bp','bg2');});el.className=el.className.replace('bg2','bp');document.getElementById('cmpw').innerHTML=bCmpTbl(s==='All'?myList:myList.filter(c=>c.status===s),bm,pm);};
}
function bCmpTbl(list,bm,pm){if(!list.length)return'<div class="emp"><div class="ei">📭</div><p>'+T('no_records')+'</p></div>';return'<div class="tw"><table><thead><tr><th>'+T('track_number')+'</th><th>'+T('parent_name')+'</th><th>Student</th><th>Type</th><th>'+T('status')+'</th><th>'+T('priority')+'</th><th>'+T('assigned_to')+'</th><th>'+T('date')+'</th><th>Actions</th></tr></thead><tbody>'+list.map(c=>'<tr><td><strong class="mono" style="color:var(--ac)">'+c.trackNo+'</strong></td><td>'+c.parentName+'<br><span class="mono" style="font-size:10px;color:var(--tx3)">'+c.parentPhone+'</span></td><td>'+c.studentName+'<br><span style="font-size:10px;color:var(--tx3)">Gr '+c.grade+'-'+c.section+'</span></td><td><span class="badge bpu">'+c.type+'</span><br><span style="font-size:10px;color:var(--tx3)">'+c.subtype+'</span></td><td><span class="badge '+(bm[c.status]||'bgr')+'">'+c.status+'</span></td><td><span class="badge '+(pm[c.priority]||'bgr')+'">'+c.priority+'</span></td><td style="font-size:11px;color:'+(c.assignedName?'var(--tx2)':'var(--dn)')+'">'+( c.assignedName||'Unassigned')+'</td><td style="font-size:10px;color:var(--tx3)">'+(c.created||'').split('T')[0]+'</td><td><button class="btn bg2 bxs" onclick="vCmp(\''+c.id+'\')">Manage</button></td></tr>').join('')+'</tbody></table></div>';}
function vCmp(id){const complaints=DB.get('complaints')||[];const c=complaints.find(x=>x.id===id);if(!c)return;const isQI=CU.role==='quality_incharge';const canA=!isQI&&['superadmin','principal','vice_principal','academic_supervisor'].includes(CU.role);const canR=!isQI&&(canA||c.assignedTo===CU.id);const canAck=!isQI&&['superadmin','principal'].includes(CU.role);openM('<div class="mh"><h3>'+c.trackNo+' — '+c.type+'</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2">'+(isQI?'<div class="al ai">👁️ Read-only view (Quality Incharge)</div>':'')+'<div style="display:flex;gap:5px;margin-bottom:12px"><span class="badge '+(c.status==='Open'?'brd':c.status==='In Progress'?'bbl':c.status==='Resolved'?'bgn':'bgr')+'">'+c.status+'</span><span class="badge '+(c.priority==='High'?'brd':c.priority==='Medium'?'bgo':'bgn')+'">'+c.priority+'</span></div><div class="cg g2" style="margin-bottom:12px;font-size:12px"><div><div style="font-size:10px;color:var(--tx3)">'+T('parent_name')+'</div><div style="font-weight:600">'+c.parentName+'</div><div class="mono" style="font-size:11px;color:var(--tx3)">'+c.parentPhone+'</div></div><div><div style="font-size:10px;color:var(--tx3)">Student</div><div style="font-weight:600">'+c.studentName+'</div><div style="font-size:11px;color:var(--tx3)">Gr '+c.grade+'-'+c.section+'</div></div><div><div style="font-size:10px;color:var(--tx3)">Issue</div><div style="font-weight:600">'+c.type+' → '+c.subtype+'</div></div><div><div style="font-size:10px;color:var(--tx3)">'+T('date')+'</div><div style="font-weight:600">'+(c.created||'').split('T')[0]+'</div></div>'+(isQI&&c.assignedName?'<div><div style="font-size:10px;color:var(--tx3)">Assigned To</div><div style="font-weight:600">'+c.assignedName+'</div></div>':'')+'</div><div class="fg"><label>'+T('description')+'</label><div style="background:var(--sf2);padding:10px;border-radius:var(--rs);font-size:12px;color:var(--tx2);line-height:1.6">'+c.description+'</div></div>'+(canA?'<div class="fr f2"><div class="fg"><label>'+T('assigned_to')+'</label><select id="ca"><option value="">Unassigned</option>'+sOpts()+'</select></div><div class="fg"><label>'+T('status')+'</label><select id="cs">'+['Open','In Progress','Resolved','Closed'].map(s=>'<option'+(c.status===s?' selected':'')+'>'+s+'</option>').join('')+'</select></div></div>':'')+(canAck?'<div class="fg"><label>'+T('principal_ack')+'</label><input id="cpk" value="'+esc(c.principalAck||'')+'" placeholder="Ack note…"></div>':isQI&&c.principalAck?'<div class="al ag">🎯 Principal Ack: '+esc(c.principalAck)+'</div>':'')+(canR?'<div class="fg"><label>'+T('add_remark')+'</label><textarea id="crm" placeholder="'+T('add_remark')+'…"></textarea></div>':'')+(c.remarks&&c.remarks.length?'<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--tx3);margin-bottom:8px">'+T('remark_history')+'</div><div class="tl2">'+c.remarks.map(r=>'<div class="tli"><div class="tld"></div><div class="tlm">'+new Date(r.time).toLocaleString()+' · '+r.by+'</div><div class="tlc">'+r.text+'</div></div>').join('')+'</div></div>':'')+'</div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('close')+'</button><button class="btn bg2 bsm" onclick="window.print()">🖨️</button>'+(isQI?'':'<button class="btn bp" onclick="saveCmp(\''+id+'\')">'+T('save')+' →</button>')+'</div>',true);const ae=document.getElementById('ca');if(ae&&c.assignedTo)ae.value=c.assignedTo;}
function saveCmp(id){const complaints=DB.get('complaints')||[];const i=complaints.findIndex(c=>c.id===id);if(i<0)return;const ae=document.getElementById('ca'),se=document.getElementById('cs'),re=document.getElementById('crm'),pe=document.getElementById('cpk');if(ae){const av=ae.value,u=av?gA(av):null;complaints[i].assignedTo=av||null;complaints[i].assignedName=u?u.firstName+' '+u.lastName:'';if(complaints[i].status==='Open'&&av)complaints[i].status='In Progress';}if(se)complaints[i].status=se.value;if(pe)complaints[i].principalAck=pe.value;if(re&&re.value.trim()){complaints[i].remarks=complaints[i].remarks||[];complaints[i].remarks.push({by:CU.firstName+' '+CU.lastName,role:rL(CU.role),text:re.value.trim(),time:new Date().toISOString()});logA('Updated complaint '+complaints[i].trackNo);}complaints[i].updated=new Date().toISOString();DB.set('complaints',complaints);closeM();toast('Updated','success');rComplaints();}
function rTasks(){
  const isP=['superadmin','principal','quality_incharge'].includes(CU.role),tasks=DB.get('tasks')||[];
  let myT=isP?tasks:['vice_principal','academic_supervisor'].includes(CU.role)?tasks.filter(t=>t.assignedTo===CU.id||t.assignedBy===CU.id):tasks.filter(t=>t.assignedTo===CU.id);
  const canA=['superadmin','principal','vice_principal','academic_supervisor','activity_incharge','student_advisor'].includes(CU.role);

function manTask(id){const tasks=DB.get('tasks')||[];const t=tasks.find(x=>x.id===id);if(!t)return;const isP=['superadmin','principal','quality_incharge'].includes(CU.role),isQI=CU.role==='quality_incharge',canE=!isQI&&(t.assignedTo===CU.id||t.assignedBy===CU.id||isP);openM('<div class="mh"><h3>'+t.title+'</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2"><div style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap"><span class="badge '+(t.priority==='High'?'brd':t.priority==='Medium'?'bgo':'bgn')+'">'+t.priority+'</span><span class="badge '+(t.status==='Completed'?'bgn':t.status==='In Progress'?'bbl':'bgo')+'">'+t.status+'</span></div><div style="font-size:12px;color:var(--tx2);margin-bottom:12px;line-height:1.6">'+(t.desc||'')+'</div><div class="cg g3" style="margin-bottom:12px;font-size:11px"><div><div style="color:var(--tx3)">'+T('assigned_to')+'</div><div style="font-weight:600;margin-top:2px">'+t.assignedName+'</div></div><div><div style="color:var(--tx3)">'+T('assigned_by')+'</div><div style="font-weight:600;margin-top:2px">'+t.assignedByName+'</div></div><div><div style="color:var(--tx3)">'+T('due_date')+'</div><div style="font-weight:600;margin-top:2px">'+t.dueDate+'</div></div></div>'+(canE?'<div class="fr f2"><div class="fg"><label>'+T('status')+'</label><select id="tst">'+['Pending','In Progress','Completed'].map(s=>'<option'+(t.status===s?' selected':'')+'>'+s+'</option>').join('')+'</select></div><div class="fg"><label>Progress %</label><input type="number" id="tpr" min="0" max="100" value="'+t.progress+'"></div></div><div class="fg"><label>'+T('add_remark')+'</label><textarea id="trm" placeholder="Update note…"></textarea></div>':'<div class="al ai">View only — not assigned to you.</div>')+(t.remarks&&t.remarks.length?'<div style="margin-top:10px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--tx3);margin-bottom:7px">'+T('remark_history')+'</div><div class="tl2">'+t.remarks.map(r=>'<div class="tli"><div class="tld"></div><div class="tlm">'+r.time+' · '+r.by+'</div><div class="tlc">'+r.text+'</div></div>').join('')+'</div></div>':'')+'</div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('close')+'</button><button class="btn bg2 bsm" onclick="window.print()">🖨️</button>'+(canE?'<button class="btn bp" onclick="saveTskUp(\''+id+'\')">'+T('save')+' →</button>':'')+'</div>');}

function rTeachers(){
  const isSA=CU.role==='superadmin';
  const teachers=DB.get('teachers')||[];
  document.getElementById('pc').innerHTML='<div class="card" style="margin-bottom:12px"><div class="sh2"><h3>👨‍🏫 '+T('teachers')+' ('+teachers.length+')</h3>'+(isSA?'<div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn bg2 bsm" onclick="bulkTchM()" title="Super Admin: bulk delete or replace all teachers">⚙️ Bulk</button><button class="btn bg2 bsm" onclick="impTchM()">📥 Import CSV</button><button class="btn bp bsm" onclick="addTchM()">+ Add Teacher</button></div>':'')+'</div><div style="font-size:11px;color:var(--tx3);margin-top:4px">Master list of teachers. Used for autocomplete when adding class visits and activity reports.</div></div><div class="card"><div style="display:flex;gap:8px;margin-bottom:12px"><input id="tchq" placeholder="🔍 Search by name, subject, or department…" oninput="fltTch()" style="flex:1;padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px"></div><div id="tchw">'+buildTchTbl(teachers,isSA)+'</div></div>';
  window.fltTch=function(){const q=document.getElementById('tchq').value.toLowerCase();const list=q?(DB.get('teachers')||[]).filter(t=>(t.name+' '+(t.subject||'')+' '+(t.department||'')+' '+(t.employeeId||'')).toLowerCase().includes(q)):DB.get('teachers')||[];document.getElementById('tchw').innerHTML=buildTchTbl(list,isSA);};
}

function buildTchTbl(teachers,isSA){
  if(!teachers.length)return'<div class="emp"><div class="ei">👨‍🏫</div><p>'+T('no_records')+'</p></div>';
  return'<div class="tw"><table><thead><tr><th>Employee ID</th><th>'+T('name')+'</th><th>'+T('subject')+'</th><th>Department</th><th>'+T('phone')+'</th><th>'+T('email')+'</th><th>'+T('status')+'</th><th>Actions</th></tr></thead><tbody>'+teachers.map(t=>'<tr><td class="mono" style="font-size:11px;color:var(--tx3)">'+(t.employeeId||'—')+'</td><td><strong>'+esc(t.name)+'</strong></td><td>'+(t.subject?'<span class="badge bbl">'+esc(t.subject)+'</span>':'—')+'</td><td style="font-size:11px;color:var(--tx2)">'+(t.department||'—')+'</td><td class="mono" style="font-size:11px">'+(t.phone||'—')+'</td><td style="font-size:11px;color:var(--tx3)">'+(t.email||'—')+'</td><td><span class="badge '+(t.active!==false?'bgn':'bgr')+'">'+T(t.active!==false?'active':'inactive')+'</span></td><td style="display:flex;gap:4px"><button class="btn bg2 bxs" onclick="vTchReports(\''+t.id+'\')">📊 Reports</button>'+(isSA?'<button class="btn bg2 bxs" onclick="editTchM(\''+t.id+'\')">'+T('edit')+'</button><button class="btn bd3 bxs" onclick="delTch(\''+t.id+'\')">Del</button>':'')+'</td></tr>').join('')+'</tbody></table></div>';
}

function addTchM(){
  openM('<div class="mh"><h3>+ Add Teacher</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2"><div class="fr f2"><div class="fg"><label>Full Name *</label><input id="tch-name" placeholder="e.g. Mohammed Al-Saadi"></div><div class="fg"><label>Employee ID</label><input id="tch-eid" placeholder="e.g. T-1042"></div></div><div class="fr f2"><div class="fg"><label>'+T('subject')+'</label><input id="tch-subj" placeholder="e.g. Mathematics"></div><div class="fg"><label>Department</label><input id="tch-dep" placeholder="e.g. Science Department"></div></div><div class="fr f2"><div class="fg"><label>'+T('phone')+'</label><input id="tch-phone"></div><div class="fg"><label>'+T('email')+'</label><input id="tch-email" type="email"></div></div><div class="fg"><label>Note</label><textarea id="tch-note" placeholder="Optional notes (qualifications, joining date, etc.)"></textarea></div></div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="saveTch()">+ '+T('add')+' →</button></div>');
}

function saveTch(){
  const name=document.getElementById('tch-name').value.trim();
  if(!name){toast('Teacher name required','danger');return;}
  const teachers=DB.get('teachers')||[];
  if(teachers.some(t=>t.name.toLowerCase()===name.toLowerCase())){toast('Teacher already exists','danger');return;}
  teachers.push({id:nid('tch'),name,employeeId:document.getElementById('tch-eid').value.trim(),subject:document.getElementById('tch-subj').value.trim(),department:document.getElementById('tch-dep').value.trim(),phone:document.getElementById('tch-phone').value.trim(),email:document.getElementById('tch-email').value.trim(),note:document.getElementById('tch-note').value.trim(),active:true,created:new Date().toISOString().split('T')[0]});
  DB.set('teachers',teachers);logA('Added teacher: '+name);closeM();toast('Teacher added','success');rTeachers();
}

function editTchM(id){
  const t=(DB.get('teachers')||[]).find(x=>x.id===id);if(!t)return;
  openM('<div class="mh"><h3>Edit: '+esc(t.name)+'</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2"><div class="fr f2"><div class="fg"><label>Full Name</label><input id="te-name" value="'+esc(t.name)+'"></div><div class="fg"><label>Employee ID</label><input id="te-eid" value="'+esc(t.employeeId||'')+'"></div></div><div class="fr f2"><div class="fg"><label>'+T('subject')+'</label><input id="te-subj" value="'+esc(t.subject||'')+'"></div><div class="fg"><label>Department</label><input id="te-dep" value="'+esc(t.department||'')+'"></div></div><div class="fr f2"><div class="fg"><label>'+T('phone')+'</label><input id="te-phone" value="'+esc(t.phone||'')+'"></div><div class="fg"><label>'+T('email')+'</label><input id="te-email" value="'+esc(t.email||'')+'"></div></div><div class="fg"><label>'+T('status')+'</label><select id="te-act"><option value="true"'+(t.active!==false?' selected':'')+'>Active</option><option value="false"'+(t.active===false?' selected':'')+'>Inactive</option></select></div><div class="fg"><label>Note</label><textarea id="te-note">'+esc(t.note||'')+'</textarea></div></div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="saveTchEdit(\''+id+'\')">'+T('save')+' →</button></div>');
}

function saveTchEdit(id){
  const teachers=DB.get('teachers')||[];const i=teachers.findIndex(t=>t.id===id);if(i<0)return;
  teachers[i].name=document.getElementById('te-name').value.trim()||teachers[i].name;
  teachers[i].employeeId=document.getElementById('te-eid').value.trim();
  teachers[i].subject=document.getElementById('te-subj').value.trim();
  teachers[i].department=document.getElementById('te-dep').value.trim();
  teachers[i].phone=document.getElementById('te-phone').value.trim();
  teachers[i].email=document.getElementById('te-email').value.trim();
  teachers[i].active=document.getElementById('te-act').value==='true';
  teachers[i].note=document.getElementById('te-note').value;
  DB.set('teachers',teachers);logA('Edited teacher: '+teachers[i].name);closeM();toast('Updated','success');rTeachers();
}

function delTch(id){
  if(!confirm('Delete this teacher? Their existing class visits and activity reports will keep the name on record.'))return;
  DB.set('teachers',(DB.get('teachers')||[]).filter(t=>t.id!==id));
  logA('Deleted teacher');toast('Deleted','danger');rTeachers();
}

function impTchM(){
  openM('<div class="mh"><h3>📥 Import Teachers CSV / Excel</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2"><div class="al ai">📋 Save your Excel file as <strong>CSV (.csv)</strong> first, then upload here. Two formats accepted:<br><br><strong>Simple (3 columns):</strong> Name, Subject, Phone<br><strong>Full (6 columns):</strong> Name, EmployeeID, Subject, Department, Phone, Email</div><div style="background:var(--sf2);border-radius:var(--rs);padding:9px;font-family:monospace;font-size:10px;color:var(--tx3);margin-bottom:12px">Simple example:<br>Mohammed Al-Saadi,Mathematics,0501234567<br>Layla Al-Najjar,Arabic,0502223344<br><br>Full example:<br>Mohammed Al-Saadi,T-1042,Mathematics,Science,0501234567,m@school.sa</div><div class="al aw" style="margin-bottom:12px">⚠️ The <strong>first row is treated as a header and skipped</strong>. Make sure your data starts from row 2.</div><div class="fg"><label>CSV File *</label><input type="file" id="tchimpf" accept=".csv,.txt"></div></div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="procTchImp()">Import →</button></div>');
  window.procTchImp=function(){const file=document.getElementById('tchimpf').files[0];if(!file){toast('Select file','danger');return;}const reader=new FileReader();reader.onload=e=>{const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim()).slice(1);const teachers=DB.get('teachers')||[];let added=0,skipped=0;lines.forEach((line,idx)=>{const cols=line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));let name,eid,subj,dep,ph,em;if(cols.length>=6){[name,eid,subj,dep,ph,em]=cols;}else if(cols.length>=3){[name,subj,ph]=cols;eid='';dep='';em='';}else if(cols.length===2){[name,subj]=cols;eid='';dep='';ph='';em='';}else if(cols.length===1){name=cols[0];eid=subj=dep=ph=em='';}else{skipped++;return;}if(name&&name.trim()){teachers.push({id:'tch'+Date.now()+idx,name:name.trim(),employeeId:(eid||'').trim(),subject:(subj||'').trim(),department:(dep||'').trim(),phone:(ph||'').trim(),email:(em||'').trim(),note:'',active:true,created:new Date().toISOString().split('T')[0]});added++;}else skipped++;});DB.set('teachers',teachers);logA('Imported '+added+' teachers from CSV');closeM();toast(added+' teachers imported'+(skipped?' ('+skipped+' rows skipped)':''),'success');rTeachers();};reader.readAsText(file);};
}

function tchSearch(q,did,onPickFn){

function vTchReports(tchId){

  // Find all visits matching this teacher (by name — visits store teacher name string)

  document.getElementById('vtchcontent').innerHTML='<div class="card" style="margin-bottom:13px"><div class="sh2"><h3>👨‍🏫 '+esc(t.name)+'</h3><button class="btn bg2 bsm" onclick="window.print()">🖨️ Print</button></div><div class="cg g3" style="margin-bottom:12px;font-size:12px">'+(t.employeeId?'<div><div style="font-size:10px;color:var(--tx3)">Employee ID</div><div class="mono" style="font-weight:600">'+esc(t.employeeId)+'</div></div>':'')+(t.subject?'<div><div style="font-size:10px;color:var(--tx3)">'+T('subject')+'</div><div style="font-weight:600">'+esc(t.subject)+'</div></div>':'')+(t.department?'<div><div style="font-size:10px;color:var(--tx3)">Department</div><div style="font-weight:600">'+esc(t.department)+'</div></div>':'')+(t.phone?'<div><div style="font-size:10px;color:var(--tx3)">'+T('phone')+'</div><div class="mono" style="font-weight:600">'+esc(t.phone)+'</div></div>':'')+(t.email?'<div><div style="font-size:10px;color:var(--tx3)">'+T('email')+'</div><div style="font-weight:600">'+esc(t.email)+'</div></div>':'')+'</div></div><div class="card" style="margin-bottom:13px"><div class="sh2"><h3>📈 Performance Summary</h3></div><div class="cg g4" style="font-size:12px"><div style="background:var(--ac2);padding:14px;border-radius:var(--r);border:1px solid var(--ac3)"><div style="font-size:10px;color:var(--tx3);text-transform:uppercase">Total Visits</div><div style="font-size:24px;font-weight:700;color:var(--ac);margin-top:4px">'+visits.length+'</div></div><div style="background:var(--gdbg);padding:14px;border-radius:var(--r);border:1px solid #f2dc8f"><div style="font-size:10px;color:var(--tx3);text-transform:uppercase">Average Score</div><div style="font-size:24px;font-weight:700;color:var(--gd);margin-top:4px">'+avgScore+' / '+EVAL_TOTAL+'</div></div><div style="background:var(--subg);padding:14px;border-radius:var(--r);border:1px solid #87d6b0"><div style="font-size:10px;color:var(--tx3);text-transform:uppercase">Average %</div><div style="font-size:24px;font-weight:700;color:var(--su);margin-top:4px">'+avgPct+'%</div></div><div style="background:var(--pubg);padding:14px;border-radius:var(--r);border:1px solid #cfb9f7"><div style="font-size:10px;color:var(--tx3);text-transform:uppercase">Grade</div><div style="margin-top:8px"><span class="badge '+avgGrade.c+'" style="font-size:12px;padding:5px 10px">'+avgGrade.l+'</span></div></div></div>'+(validCount&&validCount<visits.length?'<div class="al aw" style="margin-top:11px;margin-bottom:0">⚠️ '+(visits.length-validCount)+' visit(s) have no rubric scores and are not included in the average.</div>':'')+'</div><div class="card" style="margin-bottom:13px"><div class="sh2"><h3>📊 Category Averages</h3></div>'+buildTchCategoryAvg(visits)+'</div><div class="card"><div class="sh2"><h3>📝 All Class Visit Reports ('+visits.length+')</h3></div>'+(visits.length===0?'<div class="emp"><div class="ei">📝</div><p>No class visits recorded for this teacher yet</p></div>':'<div class="tw"><table><thead><tr><th>'+T('date')+'</th><th>'+T('subject')+'</th><th>'+T('grade')+'</th><th>Score</th><th>'+T('rating')+'</th><th>Supervisor</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+visits.map(v=>{const tot=v.scores?evalGetTotal(v.scores):0;const pct=v.scores?Math.round(tot/EVAL_TOTAL*100):0;const g=v.scores?evalGetGrade(pct):{l:'—',c:'bgr'};return'<tr><td class="mono" style="font-size:11px">'+v.date+'</td><td>'+v.subject+'</td><td>Gr '+v.grade+(v.section?'-'+v.section:'')+'</td><td>'+(v.scores?'<strong style="color:var(--ac)">'+tot+'/'+EVAL_TOTAL+'</strong> <span style="font-size:10px;color:var(--tx3)">('+pct+'%)</span>':'<span style="color:var(--tx3)">—</span>')+'</td><td><span class="badge '+g.c+'">'+g.l+'</span></td><td style="font-size:11px;color:var(--tx3)">'+v.supervisorName+'</td><td>'+(v.principalAck?'<span class="badge bgn">🔒 Locked</span>':v.academicAck?'<span class="badge bbl">Academic ✓</span>':'<span class="badge bgo">Pending</span>')+'</td><td><button class="btn bg2 bxs" onclick="vVisit(\''+v.id+'\')">View Full</button></td></tr>';}).join('')+'</tbody></table></div>')+'</div>';

function buildTchCategoryAvg(visits){
  const validVisits=visits.filter(v=>v.scores);
  if(!validVisits.length)return'<div class="emp"><p style="font-size:12px">No scored visits available</p></div>';
  return EVAL_RUBRIC.map(cat=>{
    let catSum=0,catMax=0;
    cat.items.forEach(it=>{catMax+=it.max;});
    const catTotalMax=catMax*validVisits.length;
    validVisits.forEach(v=>{cat.items.forEach(it=>{catSum+=parseInt(v.scores[it.k])||0;});});
    const avgCat=Math.round(catSum/validVisits.length);
    const pctCat=Math.round(catSum/catTotalMax*100);
    const g=evalGetGrade(pctCat);
    return'<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--bd)"><div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--tx)">'+cat.cat+'</div><div style="font-size:10px;color:var(--tx3)">Average across '+validVisits.length+' visit(s)</div></div><div style="text-align:right;min-width:100px"><div style="font-size:14px;font-weight:700;color:var(--ac)">'+avgCat+' / '+catMax+'</div><div style="font-size:11px;color:var(--tx3)">'+pctCat+'%</div></div><span class="badge '+g.c+'" style="min-width:80px;justify-content:center">'+g.l+'</span></div>';
  }).join('');
}

function evalGetTotal(scores){let t=0;EVAL_RUBRIC.forEach(c=>c.items.forEach(it=>{t+=parseInt(scores?.[it.k])||0;}));return t;}
function evalGetGrade(pct){if(pct>=90)return{l:'Excellent',c:'bgn'};if(pct>=75)return{l:'Good',c:'btl'};if(pct>=60)return{l:'Satisfactory',c:'bgo'};return{l:'Needs Improvement',c:'brd'};}

function rClassVisits(){
  const visits=DB.get('class_visits')||[];const isP=['superadmin','principal','quality_incharge'].includes(CU.role),isAc=CU.role==='academic_supervisor';const myV=isP||isAc?visits:visits.filter(v=>v.supervisorId===CU.id);const canC=['superadmin','academic_supervisor','quality_supervisor'].includes(CU.role);

function buildEvalForm(scores,readonly){
  let html='<div style="background:var(--sf2);padding:10px;border-radius:var(--rs);margin-bottom:13px;font-size:11px;color:var(--tx2)">📋 <strong>Teacher Performance Evaluation Card</strong> — Enter score for each criterion (max shown in brackets)</div>';
  EVAL_RUBRIC.forEach((cat,ci)=>{
    let catTotal=0,catMax=0;
    cat.items.forEach(it=>{catMax+=it.max;catTotal+=parseInt(scores?.[it.k])||0;});
    html+='<div style="background:var(--sf2);border-radius:var(--rs);padding:10px;margin-bottom:10px"><div style="font-size:12px;font-weight:700;color:var(--ac);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between"><span>'+(ci+1)+'. '+cat.cat+'</span><span style="color:var(--gd)">'+catTotal+'/'+catMax+'</span></div>';
    cat.items.forEach(it=>{
      const v=scores?.[it.k]||'';
      html+='<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px dashed var(--bd);font-size:12px"><div style="flex:1;color:var(--tx2)">'+it.l+'</div><div style="font-size:10px;color:var(--tx3);min-width:30px;text-align:right">/ '+it.max+'</div>'+(readonly?'<div style="min-width:50px;text-align:center;background:var(--ac2);color:var(--ac);padding:3px 8px;border-radius:4px;font-weight:600">'+(v||'—')+'</div>':'<input type="number" min="0" max="'+it.max+'" value="'+v+'" id="ev-'+it.k+'" oninput="updEvalTotal()" style="width:60px;padding:5px 7px;background:var(--sf);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:12px;text-align:center">')+'</div>';
    });
    html+='</div>';
  });
  const total=evalGetTotal(scores);const pct=Math.round(total/EVAL_TOTAL*100);const g=evalGetGrade(pct);
  html+='<div id="eval-tot" style="background:linear-gradient(135deg,var(--ac2),var(--pubg));border:1px solid var(--ac3);border-radius:var(--r);padding:14px;margin-top:10px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px">Total Score</div><div style="font-size:24px;font-weight:700;color:var(--ac);margin-top:2px"><span id="eval-total-num">'+total+'</span> / '+EVAL_TOTAL+'</div></div><div style="text-align:right"><div style="font-size:11px;color:var(--tx3)">Percentage</div><div style="font-size:20px;font-weight:700;color:var(--gd)" id="eval-pct">'+pct+'%</div><span class="badge '+g.c+'" id="eval-grade" style="margin-top:4px">'+g.l+'</span></div></div></div>';
  return html;
}

function updEvalTotal(){
  let total=0;EVAL_RUBRIC.forEach(c=>c.items.forEach(it=>{const el=document.getElementById('ev-'+it.k);if(el){let val=parseInt(el.value)||0;if(val>it.max){val=it.max;el.value=val;}if(val<0){val=0;el.value=val;}total+=val;}}));
  const pct=Math.round(total/EVAL_TOTAL*100);const g=evalGetGrade(pct);
  const tn=document.getElementById('eval-total-num');if(tn)tn.textContent=total;
  const pe=document.getElementById('eval-pct');if(pe)pe.textContent=pct+'%';
  const ge=document.getElementById('eval-grade');if(ge){ge.textContent=g.l;ge.className='badge '+g.c;}
}

function gatherEvalScores(){const s={};EVAL_RUBRIC.forEach(c=>c.items.forEach(it=>{const el=document.getElementById('ev-'+it.k);s[it.k]=el?parseInt(el.value)||0:0;}));return s;}

function addVisitM(){
  openM('<div class="mh"><h3>📝 Teacher Performance Evaluation</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2"><div class="fg"><label>'+T('teacher')+' *</label>'+tchSearchWidget('cv-tch-i','cv-tch-d','pickCvTch')+'</div><div id="cv-tch-info" style="display:none" class="al ai"></div><input type="hidden" id="cvt"><div class="fg"><label>'+T('subject')+' *</label><input id="cvs"></div><div class="fr f3"><div class="fg"><label>'+T('grade')+'</label><input id="cvg"></div><div class="fg"><label>'+T('section')+'</label><input id="cvsc"></div><div class="fg"><label>'+T('period')+'</label><input id="cvp"></div></div><div class="fr f2"><div class="fg"><label>'+T('date')+'</label><input type="date" id="cvd" value="'+new Date().toISOString().split('T')[0]+'"></div><div class="fg"><label>Visit Type</label><select id="cvty"><option>Scheduled</option><option>Unannounced</option><option>Follow-up</option></select></div></div>'+buildEvalForm({},false)+'<div class="fg" style="margin-top:13px"><label>'+T('strengths')+'</label><textarea id="cvst" placeholder="What the teacher did well..."></textarea></div><div class="fg"><label>'+T('improvements')+'</label><textarea id="cvi" placeholder="Areas for improvement..."></textarea></div><div class="fg"><label>'+T('follow_up')+'</label><textarea id="cvf" placeholder="Recommended follow-up actions..."></textarea></div></div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="saveVisit()">Submit Evaluation →</button></div>',true);

}

function saveVisit(){
  const t=document.getElementById('cvt').value.trim(),s=document.getElementById('cvs').value.trim();
  if(!t||!s){toast('Teacher and subject required','danger');return;}
  const scores=gatherEvalScores();const total=evalGetTotal(scores);const pct=Math.round(total/EVAL_TOTAL*100);
  const visits=DB.get('class_visits')||[];
  visits.push({id:nid('cv'),supervisorId:CU.id,supervisorName:CU.firstName+' '+CU.lastName,supervisorRole:CU.role,teacher:t,subject:s,grade:document.getElementById('cvg').value,section:document.getElementById('cvsc').value,date:document.getElementById('cvd').value,period:document.getElementById('cvp').value,visitType:document.getElementById('cvty').value,scores,totalScore:total,percentage:pct,strengths:document.getElementById('cvst').value,improvements:document.getElementById('cvi').value,followUp:document.getElementById('cvf').value,academicAck:'',academicAckDate:'',principalAck:'',principalAckDate:'',created:new Date().toISOString().split('T')[0]});

function vVisit(id){
  const visits=DB.get('class_visits')||[];const v=visits.find(x=>x.id===id);if(!v)return;
  const isP=['superadmin','principal','quality_incharge'].includes(CU.role),isAc=CU.role==='academic_supervisor',isSup=v.supervisorId===CU.id;

  if(reports[i].createdBy!==CU.id&&CU.role!=='superadmin'){toast('Not authorized','danger');return;}
  reports[i].activityName=document.getElementById('are-name').value.trim()||reports[i].activityName;
  reports[i].teacher=document.getElementById('are-teacher').value.trim()||reports[i].teacher;
  reports[i].activityDate=document.getElementById('are-date').value||reports[i].activityDate;
  reports[i].additionalNote=document.getElementById('are-note').value;
  DB.set('activity_reports',reports);logA('Edited activity report: '+reports[i].activityName);
  closeM();toast('Updated','success');rActivityReports();
}

function delAr(id){
  if(!confirm('Delete this activity report?'))return;
  DB.set('activity_reports',(DB.get('activity_reports')||[]).filter(r=>r.id!==id));
  logA('Deleted activity report');toast('Deleted','danger');rActivityReports();
}

function exportArM(){
  openM('<div class="mh"><h3>📥 Export Activity Reports</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2"><div class="al ai">Select date range and format. Leave dates empty to export all reports.</div><div class="fr f2"><div class="fg"><label>From Date</label><input type="date" id="ar-exp-from"></div><div class="fg"><label>To Date</label><input type="date" id="ar-exp-to"></div></div><div class="fg"><label>Filter by Teacher (optional)</label><input id="ar-exp-teacher" placeholder="Leave blank for all teachers"></div></div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bg2" onclick="doExportAr(\'csv\')">📊 Excel (CSV)</button><button class="btn bp" onclick="doExportAr(\'pdf\')">📄 PDF</button></div>');
}

function doExportAr(fmt){
  const from=document.getElementById('ar-exp-from').value,to=document.getElementById('ar-exp-to').value,tf=document.getElementById('ar-exp-teacher').value.trim().toLowerCase();
  let data=DB.get('activity_reports')||[];
  // Activity Incharge can only export their own reports
  if(CU.role==='activity_incharge')data=data.filter(r=>r.createdBy===CU.id);
  if(from)data=data.filter(r=>r.activityDate>=from);
  if(to)data=data.filter(r=>r.activityDate<=to);
  if(tf)data=data.filter(r=>r.teacher.toLowerCase().includes(tf));
  data.sort((a,b)=>a.activityDate.localeCompare(b.activityDate));
  if(!data.length){toast('No reports match your filters','danger');return;}
  const headers=['Activity Name','Teacher Conducted','Activity Date','Submitted By','Submitted On','Additional Note'];
  const rows=data.map(r=>[r.activityName,r.teacher,r.activityDate,r.createdByName,(r.created||'').split('T')[0],r.additionalNote||'']);
  const range=from||to?(' ('+(from||'all')+' to '+(to||'all')+')'):'';
  const fn='activity_reports'+(from||to?'_'+(from||'start')+'_to_'+(to||'end'):'');
  if(fmt==='csv'){expCSV(headers,rows,fn);}else{expPDF('Activity Reports'+range,headers,rows);}
  closeM();
  logA('Exported '+data.length+' activity reports as '+fmt.toUpperCase());
}

function rAttendance(){
  const canM=['admin_assistant','superadmin','principal','vice_principal'].includes(CU.role);
  const canV=canM||['academic_supervisor','student_advisor','quality_incharge'].includes(CU.role);
  if(!canV){document.getElementById('pc').innerHTML='<div class="emp"><div class="ei">🔒</div><p>Access restricted</p></div>';return;}
  const today=new Date().toISOString().split('T')[0];
  const sel=window._attDate||today;
  const students=DB.get('students')||[];
  const allAtt=DB.get('attendance')||[];
  const dayRec=allAtt.find(a=>a.date===sel)||{date:sel,absentIds:[],marked:false,markedBy:'',markedAt:''};
  const absentSet=new Set(dayRec.absentIds||[]);
  const absentCount=absentSet.size;
  const presentCount=students.length-absentCount;
  const isToday=sel===today;
  
  document.getElementById('pc').innerHTML='<div class="card" style="margin-bottom:12px"><div class="sh2"><h3>📅 '+T('daily_attendance')+'</h3><div style="display:flex;gap:6px;align-items:center"><label style="font-size:11px;color:var(--tx3)">Date:</label><input type="date" id="att-date" value="'+sel+'" max="'+today+'" onchange="window._attDate=this.value;rAttendance()" style="padding:6px 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:12px">'+(canM?'<button class="btn bg2 bsm" onclick="msgTplM()">⚙️ Message Template</button>':'')+'</div></div><div style="font-size:11px;color:var(--tx3);margin-top:4px">'+(canM?'Mark students absent below. All others will be automatically marked as present. Then click "📱 Send WhatsApp" to notify parents of absent students.':'View attendance records.')+'</div></div>'
  +'<div class="cg g4" style="margin-bottom:13px"><div class="stat bl"><div class="sl2">Total Students</div><div class="sv">'+students.length+'</div><div class="sic">👨‍🎓</div></div><div class="stat gn"><div class="sl2">Present</div><div class="sv">'+presentCount+'</div><div class="sb3">'+(students.length?Math.round(presentCount/students.length*100):0)+'%</div><div class="sic">✅</div></div><div class="stat rd"><div class="sl2">Absent</div><div class="sv">'+absentCount+'</div><div class="sb3">'+(students.length?Math.round(absentCount/students.length*100):0)+'%</div><div class="sic">❌</div></div><div class="stat go"><div class="sl2">Status</div><div style="font-size:14px;font-weight:700;margin-top:8px">'+(dayRec.marked?'<span style="color:var(--su)">✓ Submitted</span>':'<span style="color:var(--gd)">⏳ Draft</span>')+'</div>'+(dayRec.markedAt?'<div class="sb3">'+new Date(dayRec.markedAt).toLocaleString()+'</div>':'')+'<div class="sic">📋</div></div></div>'
  +(canM&&absentCount>0?'<div class="card" style="margin-bottom:13px;background:linear-gradient(135deg,var(--ac2),var(--pubg));border-color:var(--ac3)"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px"><div><div style="font-weight:700;font-size:13px;color:var(--ac);margin-bottom:3px">📱 Notify Parents via WhatsApp</div><div style="font-size:11px;color:var(--tx2)">Click below to open WhatsApp chats for each absent student\'s father and mother. You can review the message before sending.</div></div><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn bs bsm" onclick="sendWaAll(\'father\')">📱 Father ('+absentCount+')</button><button class="btn bs bsm" onclick="sendWaAll(\'mother\')">📱 Mother ('+absentCount+')</button><button class="btn bp bsm" onclick="sendWaAll(\'both\')">📱 Both Parents ('+(absentCount*2)+')</button></div></div></div>':'')
  +'<div class="card" style="margin-bottom:13px"><div class="sh2"><h3>🔍 Mark Absent Students</h3><div style="display:flex;gap:6px">'+(canM?'<button class="btn bg2 bsm" onclick="markAllPresent()">↺ Reset All Present</button><button class="btn bp bsm" onclick="submitAtt()">'+(dayRec.marked?'Update':'Submit')+' Attendance →</button>':'')+'</div></div>'
  +'<div style="display:flex;gap:8px;margin-bottom:12px"><input id="attq" placeholder="🔍 Search by name or grade…" oninput="fltAtt()" style="flex:1;padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px"><select id="attgf" onchange="fltAtt()" style="padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx)"><option value="">All Grades</option>'+[...new Set(students.map(s=>s.grade))].sort().map(g=>'<option value="'+g+'">Gr '+g+'</option>').join('')+'</select><select id="attsf" onchange="fltAtt()" style="padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx)"><option value="">All Status</option><option value="absent">Absent only</option><option value="present">Present only</option></select></div>'
  +'<div id="attlist">'+buildAttList(students,absentSet,canM)+'</div></div>'
  +'<div class="card"><div class="sh2"><h3>📊 Attendance History</h3><button class="btn bg2 bsm" onclick="expAttHist()">📥 Export History</button></div>'+buildAttHistory(allAtt,students)+'</div>';
  
  window.fltAtt=function(){
    const q=document.getElementById('attq').value.toLowerCase(),gr=document.getElementById('attgf').value,sf=document.getElementById('attsf').value;
    let list=students;
    if(q)list=list.filter(s=>fN(s).toLowerCase().includes(q)||s.grade.includes(q)||(s.section||'').toLowerCase().includes(q));
    if(gr)list=list.filter(s=>s.grade===gr);
    if(sf==='absent')list=list.filter(s=>absentSet.has(s.id));
    if(sf==='present')list=list.filter(s=>!absentSet.has(s.id));
    document.getElementById('attlist').innerHTML=buildAttList(list,absentSet,canM);

}

function buildAttList(students,absentSet,canM){
  if(!students.length)return'<div class="emp"><div class="ei">👨‍🎓</div><p>No students match filters</p></div>';
  // Group by grade-section
  const groups={};
  students.forEach(s=>{const k='Gr '+s.grade+'-'+s.section;if(!groups[k])groups[k]=[];groups[k].push(s);});
  const sortedKeys=Object.keys(groups).sort();
  return sortedKeys.map(k=>{
    const list=groups[k].sort((a,b)=>(a.csn||0)-(b.csn||0));
    const grAbsent=list.filter(s=>absentSet.has(s.id)).length;
    return'<div style="margin-bottom:13px;background:var(--sf2);border-radius:var(--r);overflow:hidden"><div style="padding:9px 12px;background:var(--sf3);font-size:12px;font-weight:600;display:flex;justify-content:space-between"><span>📚 '+k+'</span><span style="color:'+(grAbsent?'var(--dn)':'var(--su)')+'">'+grAbsent+' / '+list.length+' absent</span></div>'
    +'<div style="padding:6px">'+list.map(s=>{
      const isAbs=absentSet.has(s.id);
      return'<div style="display:flex;align-items:center;gap:9px;padding:8px 10px;border-bottom:1px solid var(--bd);background:'+(isAbs?'var(--dnbg)':'transparent')+';border-radius:var(--rs);margin-bottom:2px">'
      +(canM?'<input type="checkbox" id="att-'+s.id+'" '+(isAbs?'checked':'')+' onchange="togAbs(\''+s.id+'\')" style="width:17px;height:17px;cursor:pointer;accent-color:var(--dn)">':'<div style="width:17px"></div>')
      +'<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600">'+fN(s)+'</div><div style="font-size:10px;color:var(--tx3)">SN: '+s.sn+' · '+(s.fatherPhone||s.motherPhone||'No phone')+'</div></div>'
      +'<span class="badge '+(isAbs?'brd':'bgn')+'" style="min-width:62px;justify-content:center">'+(isAbs?'❌ Absent':'✅ Present')+'</span>'
      +'</div>';
    }).join('')+'</div></div>';
  }).join('');
}

function togAbs(sid){
  const sel=window._attDate||new Date().toISOString().split('T')[0];
  const allAtt=DB.get('attendance')||[];
  let i=allAtt.findIndex(a=>a.date===sel);
  if(i<0){allAtt.push({date:sel,absentIds:[],marked:false,markedBy:'',markedAt:''});i=allAtt.length-1;}
  const set=new Set(allAtt[i].absentIds);
  if(set.has(sid))set.delete(sid);else set.add(sid);
  allAtt[i].absentIds=[...set];
  DB.set('attendance',allAtt);
  rAttendance();
}

function markAllPresent(){
  if(!confirm('Reset all students to Present for this date?'))return;
  const sel=window._attDate||new Date().toISOString().split('T')[0];
  const allAtt=DB.get('attendance')||[];
  const i=allAtt.findIndex(a=>a.date===sel);
  if(i>=0){allAtt[i].absentIds=[];allAtt[i].marked=false;DB.set('attendance',allAtt);}
  toast('All students marked Present','success');rAttendance();
}

function submitAtt(){
  const sel=window._attDate||new Date().toISOString().split('T')[0];
  const allAtt=DB.get('attendance')||[];
  let i=allAtt.findIndex(a=>a.date===sel);
  if(i<0){allAtt.push({date:sel,absentIds:[],marked:false,markedBy:'',markedAt:''});i=allAtt.length-1;}
  allAtt[i].marked=true;
  allAtt[i].markedBy=CU.firstName+' '+CU.lastName;
  allAtt[i].markedAt=new Date().toISOString();
  DB.set('attendance',allAtt);
  logA('Submitted attendance for '+sel+' ('+allAtt[i].absentIds.length+' absent)');
  toast('Attendance submitted ✓','success');rAttendance();
}

function buildAttHistory(allAtt,students){
  const recent=allAtt.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30);
  if(!recent.length)return'<div class="emp"><div class="ei">📅</div><p>No attendance records yet</p></div>';
  return'<div class="tw"><table><thead><tr><th>Date</th><th>Total</th><th>Present</th><th>Absent</th><th>Rate</th><th>Status</th><th>Submitted By</th><th>Actions</th></tr></thead><tbody>'+recent.map(r=>{
    const abs=(r.absentIds||[]).length;const pres=students.length-abs;const rate=students.length?Math.round(pres/students.length*100):0;
    return'<tr><td><strong class="mono">'+r.date+'</strong><br><span style="font-size:10px;color:var(--tx3)">'+new Date(r.date).toLocaleDateString(undefined,{weekday:'long'})+'</span></td><td>'+students.length+'</td><td style="color:var(--su)">'+pres+'</td><td style="color:var(--dn)">'+abs+'</td><td><strong>'+rate+'%</strong></td><td>'+(r.marked?'<span class="badge bgn">✓ Submitted</span>':'<span class="badge bgo">Draft</span>')+'</td><td style="font-size:11px;color:var(--tx3)">'+(r.markedBy||'—')+'</td><td><button class="btn bg2 bxs" onclick="window._attDate=\''+r.date+'\';rAttendance()">View</button></td></tr>';
  }).join('')+'</tbody></table></div>';
}

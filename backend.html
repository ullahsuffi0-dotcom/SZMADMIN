function getMsgTpl(){
  const s=DB.get('settings')||{};
  return s.attMsgTpl||'Dear Parent / السلام عليكم،\n\nThis is to inform you that your child {STUDENT_NAME} (Grade {GRADE}-{SECTION}) was absent from school today, {DATE}.\n\nنود إعلامكم بأن ابنكم/ابنتكم كان غائباً اليوم.\n\nKindly contact the school office for any clarification.\nيرجى التواصل مع إدارة المدرسة.\n\n— {SCHOOL_NAME}';
}

function fmtMsg(student,date){
  const s=DB.get('settings')||{};
  const tpl=getMsgTpl();
  const dateStr=new Date(date).toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  return tpl
    .replace(/\{STUDENT_NAME\}/g,fN(student))
    .replace(/\{GRADE\}/g,student.grade||'')
    .replace(/\{SECTION\}/g,student.section||'')
    .replace(/\{DATE\}/g,dateStr)
    .replace(/\{SCHOOL_NAME\}/g,s.schoolName||'School')
    .replace(/\{SN\}/g,student.sn||'');
}

function cleanPhone(ph){
  // Remove non-digits, then strip leading zero (assume Saudi default)
  if(!ph)return '';
  let p=ph.replace(/\D/g,'');
  // If starts with 0, replace with 966 (Saudi country code)
  if(p.startsWith('0'))p='966'+p.slice(1);
  // If doesn't start with country code and is 9-10 digits, prepend 966
  else if(p.length>=9&&p.length<=10&&!p.startsWith('966'))p='966'+p;
  return p;
}

function buildWaUrl(phone,msg){
  const cleanedPh=cleanPhone(phone);
  if(!cleanedPh)return null;
  return 'https://wa.me/'+cleanedPh+'?text='+encodeURIComponent(msg);
}

function sendWaAll(target){
  const sel=window._attDate||new Date().toISOString().split('T')[0];
  const allAtt=DB.get('attendance')||[];
  const dayRec=allAtt.find(a=>a.date===sel);
  if(!dayRec||!dayRec.absentIds||!dayRec.absentIds.length){toast('No absent students for this date','danger');return;}
  const students=DB.get('students')||[];
  const absent=dayRec.absentIds.map(id=>students.find(s=>s.id===id)).filter(Boolean);
  if(!absent.length){toast('No students found','danger');return;}
  
  // Build the queue of WhatsApp links
  const queue=[];
  absent.forEach(s=>{
    const msg=fmtMsg(s,sel);
    if(target==='father'||target==='both'){
      if(s.fatherPhone){const u=buildWaUrl(s.fatherPhone,msg);if(u)queue.push({url:u,student:fN(s),parent:'Father',phone:s.fatherPhone});}
    }
    if(target==='mother'||target==='both'){
      if(s.motherPhone){const u=buildWaUrl(s.motherPhone,msg);if(u)queue.push({url:u,student:fN(s),parent:'Mother',phone:s.motherPhone});}
    }
  });
  if(!queue.length){toast('No phone numbers found for absent students','danger');return;}
  
  // Show confirmation modal with the queue and a "Open All" or one-by-one option
  showWaQueue(queue,absent.length,sel,target);
}

function showWaQueue(queue,absentCount,date,target){
  const tplPreview=fmtMsg({firstName:'<<Student>>',lastName:'',grade:'<<G>>',section:'<<S>>',sn:'<<SN>>'},date).slice(0,200)+'...';
  openM('<div class="mh"><h3>📱 Send WhatsApp to Parents</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2"><div class="al ag" style="margin-bottom:12px">📲 <strong>'+queue.length+' WhatsApp messages</strong> ready to send for <strong>'+absentCount+'</strong> absent student(s) on <strong>'+date+'</strong>.</div>'
  +'<div class="al aw"><strong>How it works:</strong><br>• Click <strong>"Open All Chats"</strong> to launch all WhatsApp chats at once (browser may ask permission for popups — please allow).<br>• Or click each student\'s 📱 button below to open one chat at a time.<br>• In each WhatsApp tab, the message is pre-filled — just press <strong>Send</strong>.</div>'
  +'<div style="background:var(--sf2);border-radius:var(--rs);padding:11px;margin-bottom:12px;max-height:280px;overflow-y:auto"><div style="font-size:10px;color:var(--tx3);font-weight:700;text-transform:uppercase;margin-bottom:7px">Send Queue</div>'
  +queue.map((q,i)=>'<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px"><div style="flex:1"><strong>'+q.student+'</strong> — '+q.parent+'<br><span class="mono" style="font-size:10px;color:var(--tx3)">'+q.phone+'</span></div><button class="btn bs bxs" onclick="window.open(\''+q.url+'\',\'_blank\')">📱 Open</button></div>').join('')
  +'</div></div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="openAllWa()">📱 Open All '+queue.length+' Chats →</button></div>');
  // Store queue globally so openAllWa can use it
  window._waQueue=queue;
  window._waMeta={absentCount,date,target};
}

function openAllWa(){
  const queue=window._waQueue||[];if(!queue.length)return;
  const total=queue.length;
  // Replace modal with progress UI
  document.getElementById('mr').innerHTML='<div class="mb"><div class="mo"><div class="mh"><h3>📱 Opening WhatsApp Chats…</h3></div><div class="mb2"><div class="al ai" style="margin-bottom:14px">⏳ Opening chats in rapid sequence. Each opens in a new tab with the message pre-filled. Please <strong>do not close this window</strong> until done — and allow popups if your browser asks.</div>'
  +'<div style="text-align:center;padding:18px"><div id="wa-counter" style="font-size:42px;font-weight:700;color:var(--ac);letter-spacing:-1px"><span id="wa-cur">0</span> <span style="color:var(--tx3);font-size:24px">/ '+total+'</span></div><div id="wa-status" style="font-size:13px;color:var(--tx2);margin-top:6px;min-height:20px">Preparing…</div></div>'
  +'<div style="background:var(--sf2);border-radius:var(--rs);padding:4px;margin-bottom:14px"><div id="wa-bar" style="height:10px;background:linear-gradient(90deg,var(--ac),var(--pu));border-radius:var(--rs);width:0%;transition:width .3s"></div></div>'
  +'<div id="wa-loglist" style="background:var(--sf2);border-radius:var(--rs);padding:9px;max-height:180px;overflow-y:auto;font-size:11px;font-family:\'JetBrains Mono\',monospace"></div>'
  +'</div><div class="mf"><button class="btn bd3" id="wa-stopbtn" onclick="stopWaQueue()">⏹ Stop</button><button class="btn bp hidden" id="wa-donebtn" onclick="closeM()">✓ Done</button></div></div></div>';
  
  window._waCancel=false;
  let opened=0,blocked=0,processed=0;
  
  const processOne=(idx)=>{
    if(window._waCancel||idx>=queue.length){finishWaQueue(opened,blocked,total);return;}
    const q=queue[idx];
    const curEl=document.getElementById('wa-cur'),stEl=document.getElementById('wa-status'),barEl=document.getElementById('wa-bar'),logEl=document.getElementById('wa-loglist');
    if(curEl)curEl.textContent=(idx+1);
    if(stEl)stEl.innerHTML='Opening: <strong>'+esc(q.student)+'</strong> — '+q.parent;
    if(barEl)barEl.style.width=Math.round((idx+1)/total*100)+'%';
    
    const w=window.open(q.url,'_blank');
    let mark='';
    if(w){opened++;mark='<span style="color:var(--su)">✓</span>';}
    else{blocked++;mark='<span style="color:var(--dn)">✗ blocked</span>';}
    processed++;
    
    if(logEl){
      const line=document.createElement('div');
      line.style.cssText='padding:3px 0;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between';
      line.innerHTML='<span>['+(idx+1)+'/'+total+'] '+esc(q.student)+' — '+q.parent+' ('+q.phone+')</span>'+mark;
      logEl.appendChild(line);
      logEl.scrollTop=logEl.scrollHeight;
    }
    
    setTimeout(()=>processOne(idx+1),350);
  };
  
  // Start
  setTimeout(()=>processOne(0),200);
  
  // Log activity once we kick off
  const meta=window._waMeta||{};
  logA('Started WhatsApp absence notifications: '+queue.length+' messages ('+meta.target+') for '+meta.date);
}

function stopWaQueue(){window._waCancel=true;}

function finishWaQueue(opened,blocked,total){
  const stEl=document.getElementById('wa-status'),stopBtn=document.getElementById('wa-stopbtn'),doneBtn=document.getElementById('wa-donebtn');
  if(stopBtn)stopBtn.classList.add('hidden');
  if(doneBtn)doneBtn.classList.remove('hidden');
  if(window._waCancel){
    if(stEl)stEl.innerHTML='<strong style="color:var(--gd)">⏹ Stopped.</strong> '+opened+' chats opened, '+blocked+' blocked, '+(total-opened-blocked)+' skipped.';
    toast('Stopped after '+opened+' chats','info');
  }else if(blocked===total){
    if(stEl)stEl.innerHTML='<strong style="color:var(--dn)">⚠️ All popups blocked!</strong> Please allow popups for this site and try again.';
    toast('All popups blocked — allow popups in browser','danger');
  }else if(blocked>0){
    if(stEl)stEl.innerHTML='<strong style="color:var(--gd)">Done with warnings.</strong> '+opened+' opened, '+blocked+' blocked. Allow popups for full coverage.';

function expAttHist(){
  const allAtt=DB.get('attendance')||[];
  const students=DB.get('students')||[];
  if(!allAtt.length){toast('No attendance records to export','danger');return;}
  // Build matrix: each row = student, columns = dates
  const dates=allAtt.map(a=>a.date).sort();
  const headers=['SN','Student Name','Grade','Section','Father Phone','Mother Phone',...dates,'Days Absent','Attendance %'];
  const rows=students.map(s=>{
    let absDays=0;
    const dateCols=dates.map(d=>{const rec=allAtt.find(a=>a.date===d);if(rec&&(rec.absentIds||[]).includes(s.id)){absDays++;return'Absent';}return'Present';});
    const totalDays=dates.length;
    const attRate=totalDays?Math.round((totalDays-absDays)/totalDays*100):0;
    return[s.sn||'',fN(s),s.grade,s.section||'',s.fatherPhone||'',s.motherPhone||'',...dateCols,absDays,attRate+'%'];
  });
  expCSV(headers,rows,'attendance_history_'+new Date().toISOString().split('T')[0]);
}

function rStudentHealth(){
  const canEdit=['student_advisor','superadmin'].includes(CU.role);
  const canView=canEdit||['principal','vice_principal','academic_supervisor','admin_assistant','activity_incharge','quality_supervisor'].includes(CU.role);
  if(!canView){document.getElementById('pc').innerHTML='<div class="emp"><div class="ei">🔒</div><p>Access restricted</p></div>';return;}
  const students=DB.get('students')||[];
  const health=DB.get('student_health')||[];
  const withHealth=health.filter(h=>h.issues&&h.issues.length>0);
  // Severity counts
  const severeCount=withHealth.filter(h=>h.issues.some(i=>i.severity==='Severe')).length;
  const moderateCount=withHealth.filter(h=>h.issues.some(i=>i.severity==='Moderate'&&!i.severity==='Severe')).length;
  const mildCount=withHealth.length-severeCount-moderateCount;
  
  document.getElementById('pc').innerHTML='<div class="card" style="margin-bottom:12px"><div class="sh2"><h3>🩺 '+T('student_health')+'</h3><div style="display:flex;gap:6px">'+(canEdit?'<button class="btn bp bsm" onclick="addHealthM()">+ Add Health Record</button>':'')+'<button class="btn bg2 bsm" onclick="expHealthPDF()">📄 Export PDF</button><button class="btn bg2 bsm" onclick="expHealthCSV()">📊 Export Excel</button></div></div><div style="font-size:11px;color:var(--tx3);margin-top:4px">'+(canEdit?'Maintain health records, allergies, medications, and emergency precautions for students.':'View health records and precautions for students.')+(CU.role==='quality_incharge'?' [Restricted]':'')+'</div></div>'
  +'<div class="cg g4" style="margin-bottom:13px"><div class="stat bl"><div class="sl2">Students with Records</div><div class="sv">'+withHealth.length+'</div><div class="sb3">of '+students.length+' total</div><div class="sic">🩺</div></div><div class="stat rd"><div class="sl2">Severe</div><div class="sv">'+severeCount+'</div><div class="sic">🚨</div></div><div class="stat go"><div class="sl2">Moderate</div><div class="sv">'+moderateCount+'</div><div class="sic">⚠️</div></div><div class="stat gn"><div class="sl2">Mild</div><div class="sv">'+mildCount+'</div><div class="sic">ℹ️</div></div></div>'
  +'<div class="card"><div class="sh2"><h3>🔍 Search Records</h3></div><div style="display:flex;gap:8px;margin-bottom:12px"><input id="hq" placeholder="🔍 Search by student name, condition, or grade…" oninput="fltHealth()" style="flex:1;padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px"><select id="hgf" onchange="fltHealth()" style="padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx)"><option value="">All Grades</option>'+[...new Set(students.map(s=>s.grade))].sort().map(g=>'<option value="'+g+'">Gr '+g+'</option>').join('')+'</select><select id="hsf" onchange="fltHealth()" style="padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx)"><option value="">All Severities</option><option>Severe</option><option>Moderate</option><option>Mild</option></select></div><div id="hlist">'+buildHealthList(withHealth,students,canEdit)+'</div></div>';
  
  window.fltHealth=function(){
    const q=document.getElementById('hq').value.toLowerCase(),gr=document.getElementById('hgf').value,sv=document.getElementById('hsf').value;
    const allHealth=(DB.get('student_health')||[]).filter(h=>h.issues&&h.issues.length>0);
    const allStu=DB.get('students')||[];
    let list=allHealth;
    if(q)list=list.filter(h=>{const s=allStu.find(x=>x.id===h.studentId);if(!s)return false;return fN(s).toLowerCase().includes(q)||s.grade.includes(q)||(s.section||'').toLowerCase().includes(q)||h.issues.some(i=>(i.condition||'').toLowerCase().includes(q)||(i.notes||'').toLowerCase().includes(q));});
    if(gr)list=list.filter(h=>{const s=allStu.find(x=>x.id===h.studentId);return s&&s.grade===gr;});
    if(sv)list=list.filter(h=>h.issues.some(i=>i.severity===sv));
    document.getElementById('hlist').innerHTML=buildHealthList(list,allStu,canEdit);
  };
}

function buildHealthList(healthRecords,students,canEdit){
  if(!healthRecords.length)return'<div class="emp"><div class="ei">🩺</div><p>No health records found</p><div style="font-size:11px;margin-top:6px">'+(canEdit?'Click "+ Add Health Record" to create the first one.':'No matching records.')+'</div></div>';
  // Sort by grade then last name
  const enriched=healthRecords.map(h=>{const s=students.find(x=>x.id===h.studentId);return s?{h,s}:null;}).filter(Boolean);
  enriched.sort((a,b)=>{if(a.s.grade!==b.s.grade)return a.s.grade.localeCompare(b.s.grade);return fN(a.s).localeCompare(fN(b.s));});
  // Group by grade
  const byGrade={};
  enriched.forEach(({h,s})=>{const k='Gr '+s.grade+'-'+s.section;if(!byGrade[k])byGrade[k]=[];byGrade[k].push({h,s});});
  return Object.keys(byGrade).sort().map(grade=>{
    const list=byGrade[grade];
    return'<div style="margin-bottom:13px"><div style="padding:9px 12px;background:var(--sf2);border-radius:var(--r) var(--r) 0 0;font-size:12px;font-weight:600;display:flex;justify-content:space-between;border:1px solid var(--bd);border-bottom:none"><span>📚 '+grade+'</span><span style="color:var(--tx3)">'+list.length+' student(s) with health records</span></div>'
    +'<div style="border:1px solid var(--bd);border-radius:0 0 var(--r) var(--r)">'
    +list.map(({h,s})=>{
      const topSev=h.issues.find(i=>i.severity==='Severe')?{c:'brd',l:'🚨 Severe'}:h.issues.find(i=>i.severity==='Moderate')?{c:'bgo',l:'⚠️ Moderate'}:{c:'bgn',l:'ℹ️ Mild'};
      const conditions=h.issues.map(i=>i.condition).filter(Boolean).slice(0,3).join(', ')+(h.issues.length>3?' +'+(h.issues.length-3)+' more':'');
      return'<div style="padding:11px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:pointer" onclick="vHealth(\''+s.id+'\')"><div style="flex:1;min-width:0"><div style="display:flex;gap:6px;align-items:center;margin-bottom:3px"><strong style="font-size:13px">'+fN(s)+'</strong><span class="badge '+topSev.c+'">'+topSev.l+'</span><span class="badge bbl">'+h.issues.length+' condition(s)</span></div><div style="font-size:11px;color:var(--tx3)">'+esc(conditions)+'</div>'+(h.advisorName?'<div style="font-size:10px;color:var(--tx3);margin-top:2px">Last updated by '+esc(h.advisorName)+' · '+(h.updated?h.updated.split('T')[0]:'')+'</div>':'')+'</div><div style="display:flex;gap:5px"><button class="btn bg2 bxs" onclick="event.stopPropagation();vHealth(\''+s.id+'\')">View</button>'+(canEdit?'<button class="btn bp bxs" onclick="event.stopPropagation();editHealthM(\''+s.id+'\')">'+T('edit')+'</button>':'')+'</div></div>';
    }).join('')
    +'</div></div>';
  }).join('');
}

function addHealthM(){
  openM('<div class="mh"><h3>🩺 Add Health Record</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2"><div class="al ai">📋 Search and select a student to add or update their health record.</div><div class="fg"><label>Student *</label>'+sw('pickHealthStu','hsi','hsd')+'</div><div id="hss" style="display:none" class="al ai"></div></div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button></div>');

function editHealthM(sid){
  const s=gS(sid);if(!s)return;
  const all=DB.get('student_health')||[];
  const existing=all.find(h=>h.studentId===sid);
  const issues=existing?existing.issues||[]:[];
  // store editing state
  window._healthEdit={studentId:sid,issues:JSON.parse(JSON.stringify(issues))};
  renderHealthEditor(s);
}

ss.emergencyAction)+'</div>':'')+(iss.notes?'<div style="font-size:11px;margin-top:5px;color:var(--tx2);line-height:1.5">📝 '+esc(iss.notes)+'</div>':'')+'</div>').join(''):'<div class="emp"><div class="ei">🩺</div><p>No health issues recorded yet</p><div style="font-size:11px;margin-top:6px">Click "+ Add Issue" below to record a condition.</div></div>';
  
  openM('<div class="mh"><h3>🩺 Health Record — '+fN(s)+'</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2"><div style="background:var(--sf2);border-radius:var(--rs);padding:10px;margin-bottom:13px;font-size:12px"><strong>'+fN(s)+'</strong> · Gr '+s.grade+'-'+s.section+' · SN: '+s.sn+(s.fatherPhone?' · 📞 '+s.fatherPhone:'')+(s.motherPhone?' · 📞 '+s.motherPhone:'')+'</div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px"><h3 style="font-size:13px">Health Conditions</h3><button class="btn bp bsm" onclick="editHealthIssue(-1)">+ Add Condition</button></div><div id="health-issue-list">'+issuesHtml+'</div></div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="saveHealthRecord()">💾 Save Record →</button></div>',true);
}

function editHealthIssue(idx){
  const data=window._healthEdit;
  const iss=idx>=0?data.issues[idx]:{condition:'',type:'Allergy',severity:'Mild',dateRecorded:new Date().toISOString().split('T')[0],medications:'',allergies:'',precautions:'',emergencyAction:'',notes:''};

hers should know about">'+esc(iss.precautions)+'</textarea></div><div class="fg"><label>🚨 Emergency Action Plan</label><textarea id="hi-emrg" placeholder="What to do if a flare-up or emergency occurs">'+esc(iss.emergencyAction)+'</textarea></div><div class="fg"><label>📝 Additional Notes</label><textarea id="hi-notes" placeholder="Doctor name, hospital, any other context">'+esc(iss.notes)+'</textarea></div></div><div class="mf"><button class="btn bg2" onclick="closeHealthIssue()">'+T('cancel')+'</button><button class="btn bp" onclick="saveHealthIssue('+idx+')">'+(isNew?'+ Add':'Save')+' →</button></div></div>';
  document.body.appendChild(overlay);
}

function closeHealthIssue(){const m=document.getElementById('health-issue-modal');if(m)m.remove();}

function saveHealthIssue(idx){
  const cond=document.getElementById('hi-cond').value.trim();
  if(!cond){toast('Condition name is required','danger');return;}
  const issue={
    condition:cond,
    type:document.getElementById('hi-type').value,
    severity:document.getElementById('hi-sev').value,
    dateRecorded:document.getElementById('hi-date').value,
    medications:document.getElementById('hi-med').value.trim(),
    allergies:document.getElementById('hi-alg').value.trim(),
    precautions:document.getElementById('hi-prec').value.trim(),
    emergencyAction:document.getElementById('hi-emrg').value.trim(),
    notes:document.getElementById('hi-notes').value.trim(),
  };
  const data=window._healthEdit;
  if(idx<0)data.issues.push(issue);else data.issues[idx]=issue;
  closeHealthIssue();

  const s=gS(data.studentId);if(s)renderHealthEditor(s);

function delHealthIssue(idx){
  if(!confirm('Remove this health condition?'))return;
  const data=window._healthEdit;
  data.issues.splice(idx,1);
  const s=gS(data.studentId);if(s)renderHealthEditor(s);
}

function saveHealthRecord(){
  const data=window._healthEdit;if(!data)return;
  const all=DB.get('student_health')||[];
  let i=all.findIndex(h=>h.studentId===data.studentId);
  const rec={studentId:data.studentId,issues:data.issues,advisorId:CU.id,advisorName:CU.firstName+' '+CU.lastName,updated:new Date().toISOString()};
  if(i<0)all.push({id:nid('h'),...rec,created:new Date().toISOString()});else all[i]={...all[i],...rec};
  DB.set('student_health',all);
  const s=gS(data.studentId);
  logA('Updated health record for '+(s?fN(s):'student')+' ('+data.issues.length+' condition(s))');
  closeM();toast('Health record saved','success');rStudentHealth();
}

bottom:1px solid #ddd;padding-bottom:4px">Health Conditions ('+rec.issues.length+')</h2>'

function expHealthPDF(){
  const all=(DB.get('student_health')||[]).filter(h=>h.issues&&h.issues.length>0);
  if(!all.length){toast('No health records to export','danger');return;}
  const students=DB.get('students')||[];
  const settings=DB.get('settings')||{};
  const enriched=all.map(h=>{const s=students.find(x=>x.id===h.studentId);return s?{h,s}:null;}).filter(Boolean);
  enriched.sort((a,b)=>{if(a.s.grade!==b.s.grade)return a.s.grade.localeCompare(b.s.grade);return fN(a.s).localeCompare(fN(b.s));});
  const sevColor=sv=>sv==='Severe'?'#d63838':sv==='Moderate'?'#b88a04':'#10a169';
  const w=window.open('','_blank');
  let body='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Health Records Summary</title><style>@page{size:A4;margin:15mm}body{font-family:Arial,sans-serif;color:#1a3a5c;font-size:11px;line-height:1.5}.confidential{background:#fce0e0;color:#a52424;padding:7px 10px;border-radius:6px;font-size:10px;font-weight:bold;border-left:4px solid #d63838;margin-bottom:14px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}.stat{background:#f0f4f8;border-radius:6px;padding:10px;text-align:center}.stat .lbl{font-size:9px;text-transform:uppercase;color:#555;font-weight:bold}.stat .val{font-size:20px;font-weight:bold;color:#1a5f7a;margin-top:4px}.stu-card{border:1px solid #ddd;border-radius:6px;padding:11px;margin-bottom:11px;page-break-inside:avoid;break-inside:avoid}.stu-card h3{font-size:13px;margin:0 0 5px;color:#1a5f7a;display:flex;justify-content:space-between;align-items:center}.stu-card h3 .meta{font-size:10px;color:#777;font-weight:normal}.cond{padding:6px 8px;border-radius:4px;margin-top:6px;font-size:10px;line-height:1.5}.footer{margin-top:24px;padding-top:10px;border-top:1px solid #ddd;font-size:9px;color:#888;text-align:center}@media print{button{display:none}.stu-card{page-break-inside:avoid}}</style></head><body>'+pdfHeaderHTML({subtitle:'Student Health Records — Master Summary ('+enriched.length+' students)'})+'<div class="confidential">⚠️ CONFIDENTIAL MEDICAL INFORMATION — Authorized School Staff Only</div>';
  const sevCounts={Severe:0,Moderate:0,Mild:0};

  body+='<div class="summary"><div class="stat"><div class="lbl">Students</div><div class="val">'+enriched.length+'</div></div><div class="stat"><div class="lbl">Severe</div><div class="val" style="color:#d63838">'+sevCounts.Severe+'</div></div><div class="stat"><div class="lbl">Moderate</div><div class="val" style="color:#b88a04">'+sevCounts.Moderate+'</div></div><div class="stat"><div class="lbl">Mild</div><div class="val" style="color:#10a169">'+sevCounts.Mild+'</div></div></div>';
  body+=enriched.map(({h,s})=>{
    const cardsHtml=h.issues.map(iss=>'<div class="cond" style="background:'+(iss.severity==='Severe'?'#fce0e0':iss.severity==='Moderate'?'#fdf3dc':'#dff5ea')+';border-left:3px solid '+sevColor(iss.severity)+'"><strong>'+(iss.condition||'—')+'</strong> ('+iss.severity+' · '+(iss.type||'—')+')'+(iss.precautions?'<br>🛡️ '+iss.precautions:'')+(iss.emergencyAction?'<br>🚨 '+iss.emergencyAction:'')+(iss.medications?'<br>💊 '+iss.medications:'')+(iss.allergies?'<br>⚠️ '+iss.allergies:'')+'</div>').join('');
    return'<div class="stu-card"><h3><span>'+fN(s)+' <span class="meta">— Gr '+s.grade+'-'+s.section+' · SN '+s.sn+'</span></span><span class="meta">📞 '+(s.fatherPhone||s.motherPhone||'—')+'</span></h3>'+cardsHtml+'</div>';
  }).join('');
  body+='<div class="footer">Generated from '+(settings.schoolName||'School')+' Management System on '+new Date().toLocaleString()+' · This document contains confidential medical information.</div><button onclick="window.print()" style="margin-top:14px;padding:8px 16px;background:#1a5f7a;color:#fff;border:none;border-radius:4px;cursor:pointer">🖨️ Print / Save as PDF</button></body></html>';
  w.document.write(body);w.document.close();

  toast('PDF generated for '+enriched.length+' students','success');

function expHealthCSV(){
  const all=(DB.get('student_health')||[]).filter(h=>h.issues&&h.issues.length>0);
  if(!all.length){toast('No health records to export','danger');return;}
  const students=DB.get('students')||[];
  const headers=['Student Name','Grade','Section','SN','Father Phone','Mother Phone','Condition','Type','Severity','Date Recorded','Medications','Allergies','Precautions','Emergency Action','Notes','Last Updated By','Updated On'];
  const rows=[];
  all.forEach(h=>{
    const s=students.find(x=>x.id===h.studentId);if(!s)return;
    h.issues.forEach(iss=>{
      rows.push([fN(s),s.grade,s.section||'',s.sn||'',s.fatherPhone||'',s.motherPhone||'',iss.condition||'',iss.type||'',iss.severity||'',iss.dateRecorded||'',iss.medications||'',iss.allergies||'',iss.precautions||'',iss.emergencyAction||'',iss.notes||'',h.advisorName||'',(h.updated||'').split('T')[0]]);
    });
  });
  expCSV(headers,rows,'student_health_records_'+new Date().toISOString().split('T')[0]);
}

// ═══════════════════════════════════════════════════════════
// REMEDIAL PLANS — Student Advisor creates plans for academically weak students
// Plans assigned to teachers (selectable from teachers list or typed),
// scheduled by day/time. Export PDF per teacher or multi-teacher.
// ═══════════════════════════════════════════════════════════

const REMEDIAL_TYPES=['Quiz 1','Quiz 2','1st Mid Term','2nd Mid Term'];
const WEEK_DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function rRemedial(){
  const canEdit=['student_advisor','superadmin'].includes(CU.role);
  const canView=canEdit||['principal','vice_principal','academic_supervisor','activity_incharge'].includes(CU.role);
  if(!canView){document.getElementById('pc').innerHTML='<div class="emp"><div class="ei">🔒</div><p>Access restricted</p></div>';return;}
  const plans=DB.get('remedial_plans')||[];
  const totalStudents=plans.reduce((s,p)=>s+(p.studentIds?p.studentIds.length:0),0);
  const teachers=[...new Set(plans.map(p=>p.teacherName).filter(Boolean))];
  
  document.getElementById('pc').innerHTML='<div class="card" style="margin-bottom:12px"><div class="sh2"><h3>📚 '+T('remedial_plans')+'</h3><div style="display:flex;gap:6px;flex-wrap:wrap">'+(canEdit?'<button class="btn bp bsm" onclick="addRemedialM()">+ New Remedial Plan</button>':'')+'<button class="btn bg2 bsm" onclick="vRemedialByTeacher()">🔍 View by Teacher</button><button class="btn bg2 bsm" onclick="expRemedialMultiM()">📄 Multi-Teacher PDF</button></div></div><div style="font-size:11px;color:var(--tx3);margin-top:4px">Assign academically weak students to teachers for remedial classes covering Quiz 1, Quiz 2, 1st Mid Term, and 2nd Mid Term assessments.</div></div>'
  +'<div class="cg g4" style="margin-bottom:13px"><div class="stat bl"><div class="sl2">Total Plans</div><div class="sv">'+plans.length+'</div><div class="sic">📚</div></div><div class="stat go"><div class="sl2">Students Enrolled</div><div class="sv">'+totalStudents+'</div><div class="sic">👨‍🎓</div></div><div class="stat gn"><div class="sl2">Assigned Teachers</div><div class="sv">'+teachers.length+'</div><div class="sic">👨‍🏫</div></div><div class="stat rd"><div class="sl2">Active Plans</div><div class="sv">'+plans.filter(p=>p.status!=='Completed').length+'</div><div class="sic">⏳</div></div></div>'
  +'<div class="card"><div class="sh2"><h3>🔍 All Remedial Plans</h3></div><div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap"><input id="rmq" placeholder="🔍 Search by class, subject, teacher…" oninput="fltRemedial()" style="flex:1;min-width:200px;padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px"><select id="rmtf" onchange="fltRemedial()" style="padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx)"><option value="">All Types</option>'+REMEDIAL_TYPES.map(t=>'<option>'+t+'</option>').join('')+'</select><select id="rmdf" onchange="fltRemedial()" style="padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx)"><option value="">All Days</option>'+WEEK_DAYS.map(d=>'<option>'+d+'</option>').join('')+'</select></div><div id="rmlist">'+buildRemedialList(plans,canEdit)+'</div></div>';
  
  window.fltRemedial=function(){
    const q=document.getElementById('rmq').value.toLowerCase(),tf=document.getElementById('rmtf').value,df=document.getElementById('rmdf').value;
    let list=DB.get('remedial_plans')||[];
    if(q)list=list.filter(p=>(p.grade+'-'+p.section+' '+p.subject+' '+(p.teacherName||'')+' '+(p.type||'')).toLowerCase().includes(q));
    if(tf)list=list.filter(p=>p.type===tf);
    if(df)list=list.filter(p=>(p.days||[]).includes(df));
    document.getElementById('rmlist').innerHTML=buildRemedialList(list,canEdit);
  };
}

function buildRemedialList(plans,canEdit){
  if(!plans.length)return'<div class="emp"><div class="ei">📚</div><p>No remedial plans yet</p>'+(canEdit?'<div style="font-size:11px;margin-top:6px">Click "+ New Remedial Plan" to create one.</div>':'')+'</div>';
  return'<div class="tw"><table><thead><tr><th>Type</th><th>Class</th><th>Subject</th><th>Teacher</th><th>Students</th><th>Schedule</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead><tbody>'
  +plans.slice().reverse().map(p=>{
    const stuCount=(p.studentIds||[]).length;
    const days=(p.days||[]).join(', ');
    const tb={'Quiz 1':'bbl','Quiz 2':'btl','1st Mid Term':'bgo','2nd Mid Term':'brd'};
    return'<tr><td><span class="badge '+(tb[p.type]||'bgr')+'">'+esc(p.type||'—')+'</span></td><td><strong>Gr '+p.grade+'-'+p.section+'</strong></td><td>'+esc(p.subject||'—')+'</td><td><strong>'+esc(p.teacherName||'—')+'</strong>'+(p.teacherFromList?'':' <span style="font-size:9px;color:var(--gd)" title="External teacher (not in master list)">⚡</span>')+'</td><td><span class="badge bpu">'+stuCount+' student(s)</span></td><td style="font-size:11px;color:var(--tx2)">'+days+(p.startTime?' · '+p.startTime+(p.endTime?'-'+p.endTime:''):'')+'</td><td><span class="badge '+(p.status==='Completed'?'bgn':p.status==='In Progress'?'bbl':'bgo')+'">'+(p.status||'Active')+'</span></td><td style="font-size:10px;color:var(--tx3)">'+(p.created||'').split('T')[0]+'<br>'+esc(p.createdByName||'—')+'</td><td style="display:flex;gap:4px"><button class="btn bg2 bxs" onclick="vRemedial(\''+p.id+'\')">View</button>'+(canEdit?'<button class="btn bp bxs" onclick="editRemedialM(\''+p.id+'\')">Edit</button><button class="btn bd3 bxs" onclick="delRemedial(\''+p.id+'\')">Del</button>':'')+'</td></tr>';
  }).join('')
  +'</tbody></table></div>';
}

// ═══════════════════════════════════════════════════════════
// ADD / EDIT FORM
// ═══════════════════════════════════════════════════════════

function addRemedialM(){window._remEdit={isNew:true,studentIds:[],days:[],teacherFromList:false};renderRemedialForm();}

function editRemedialM(id){
  const p=(DB.get('remedial_plans')||[]).find(x=>x.id===id);if(!p)return;
  window._remEdit={isNew:false,id,...JSON.parse(JSON.stringify(p))};
  renderRemedialForm();
}

function renderRemedialForm(){
  const data=window._remEdit;
  const students=DB.get('students')||[];
  // Get unique grade/section combos
  const classes=[...new Set(students.map(s=>s.grade+'-'+s.section))].sort();
  const stuOpts=data.grade&&data.section?students.filter(s=>s.grade===data.grade&&s.section===data.section):[];
  const selSet=new Set(data.studentIds||[]);
  
  openM('<div class="mh"><h3>📚 '+(data.isNew?'New':'Edit')+' Remedial Plan</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2">'
  +'<div class="al ai" style="margin-bottom:14px">📋 Build a remedial plan in 4 simple steps: <strong>1)</strong> Pick the type & class → <strong>2)</strong> Pick the subject → <strong>3)</strong> Assign teacher → <strong>4)</strong> Pick students & schedule.</div>'
  
  // STEP 1: Type + Class
  +'<div style="background:var(--sf2);border-radius:var(--r);padding:12px;margin-bottom:12px;border-left:4px solid var(--ac)"><div style="font-size:11px;font-weight:700;color:var(--ac);text-transform:uppercase;margin-bottom:8px">Step 1 · Plan Type & Class</div><div class="fr f2"><div class="fg" style="margin-bottom:0"><label>Remedial Type *</label><select id="rm-type">'+REMEDIAL_TYPES.map(t=>'<option '+(data.type===t?'selected':'')+'>'+t+'</option>').join('')+'</select></div><div class="fg" style="margin-bottom:0"><label>Class (Grade-Section) *</label><select id="rm-class" onchange="onRemClassChange()"><option value="">— Select —</option>'+classes.map(c=>{const[g,sec]=c.split('-');return'<option value="'+c+'" '+(data.grade+'-'+data.section===c?'selected':'')+'>'+g+sec+'</option>';}).join('')+'</select></div></div></div>'
  
  // STEP 2: Subject
  +'<div style="background:var(--sf2);border-radius:var(--r);padding:12px;margin-bottom:12px;border-left:4px solid var(--gd)"><div style="font-size:11px;font-weight:700;color:var(--gd);text-transform:uppercase;margin-bottom:8px">Step 2 · Subject</div><div class="fg" style="margin-bottom:0"><label>Subject *</label><input id="rm-subject" value="'+esc(data.subject||'')+'" placeholder="e.g. Mathematics, English, Physics" oninput="onRemSubjectChange()"></div></div>'

function onRemClassChange(){
  const v=document.getElementById('rm-class').value;
  const data=window._remEdit;
  if(v){const[g,s]=v.split('-');data.grade=g;data.section=s;}else{data.grade='';data.section='';}
  data.studentIds=[];
  renderRemedialForm();
}

function onRemSubjectChange(){
  // Just keep value in sync, no rerender needed
  window._remEdit.subject=document.getElementById('rm-subject').value.trim();
}

function remTchSearch(q){
  const d=document.getElementById('rm-tch-d');if(!d)return;
  // Update editing state with current typed name (allowing free text)
  window._remEdit.teacherName=q;
  window._remEdit.teacherFromList=false;
  document.getElementById('rm-tch-info').innerHTML=q?'⚡ <span style="color:var(--gd)">External teacher (not yet linked to master list)</span>':'Start typing to search…';
  if(!q.trim()){d.style.display='none';return;}
  const teachers=(DB.get('teachers')||[]).filter(t=>t.active!==false);
  const ql=q.toLowerCase();
  const found=teachers.filter(t=>(t.name+' '+(t.subject||'')+' '+(t.department||'')).toLowerCase().includes(ql)).slice(0,8);
  if(!found.length){d.style.display='block';d.innerHTML='<div style="padding:9px 12px;font-size:11px;color:var(--tx3)">No match in master list — the typed name will be used as an external teacher.</div>';return;}
  d.style.display='block';
  d.innerHTML=found.map(t=>'<div class="sdi" onmousedown="pickRemTch(\''+t.id+'\')"><strong>'+esc(t.name)+'</strong>'+(t.subject?' <span class="badge bbl" style="margin-left:5px">'+esc(t.subject)+'</span>':'')+'</div>').join('');
}

function pickRemTch(tid){
  const t=(DB.get('teachers')||[]).find(x=>x.id===tid);if(!t)return;
  window._remEdit.teacherName=t.name;
  window._remEdit.teacherId=t.id;
  window._remEdit.teacherFromList=true;
  document.getElementById('rm-tch-i').value=t.name;
  document.getElementById('rm-tch-d').style.display='none';
  document.getElementById('rm-tch-info').innerHTML='✓ <span style="color:var(--su)">Linked to master teacher list</span>'+(t.subject?' — '+esc(t.subject):'')+(t.department?' · '+esc(t.department):'');
}

function toggleRemStu(sid,checked){
  const data=window._remEdit;
  const set=new Set(data.studentIds||[]);
  if(checked)set.add(sid);else set.delete(sid);
  data.studentIds=[...set];
  document.getElementById('rm-sel-count').textContent='('+data.studentIds.length+' selected)';
}

function remSelAll(yes){
  const data=window._remEdit;
  document.querySelectorAll('.rm-stu-cb').forEach(cb=>{cb.checked=yes;});
  if(yes){const students=DB.get('students')||[];data.studentIds=students.filter(s=>s.grade===data.grade&&s.section===data.section).map(s=>s.id);}
  else data.studentIds=[];
  document.getElementById('rm-sel-count').textContent='('+data.studentIds.length+' selected)';
}

function toggleRemDay(day,checked){
  const data=window._remEdit;
  const set=new Set(data.days||[]);
  if(checked)set.add(day);else set.delete(day);
  data.days=[...set];
}

function saveRemedial(){
  const data=window._remEdit;
  // Capture latest input values
  data.type=document.getElementById('rm-type').value;
  data.subject=document.getElementById('rm-subject').value.trim();
  data.teacherName=document.getElementById('rm-tch-i').value.trim();
  data.startTime=document.getElementById('rm-stime').value;
  data.endTime=document.getElementById('rm-etime').value;
  data.status=document.getElementById('rm-status').value;
  data.notes=document.getElementById('rm-notes').value.trim();
  
  if(!data.type||!data.grade||!data.subject||!data.teacherName){toast('Fill required fields: type, class, subject, teacher','danger');return;}
  if(!data.studentIds||!data.studentIds.length){toast('Select at least one student','danger');return;}
  if(!data.days||!data.days.length){toast('Select at least one day of the week','danger');return;}
  
  const plans=DB.get('remedial_plans')||[];
  if(data.isNew){
    plans.push({id:nid('rm'),type:data.type,grade:data.grade,section:data.section,subject:data.subject,teacherName:data.teacherName,teacherId:data.teacherId||null,teacherFromList:!!data.teacherFromList,studentIds:data.studentIds,days:data.days,startTime:data.startTime,endTime:data.endTime,status:data.status,notes:data.notes,createdBy:CU.id,createdByName:CU.firstName+' '+CU.lastName,created:new Date().toISOString(),updated:new Date().toISOString()});
    logA('Created remedial plan: '+data.type+' for Gr '+data.grade+'-'+data.section+' '+data.subject+' (teacher: '+data.teacherName+', '+data.studentIds.length+' students)');
    toast('Remedial plan created','success');
  }else{
    const i=plans.findIndex(p=>p.id===data.id);if(i>=0){plans[i]={...plans[i],type:data.type,grade:data.grade,section:data.section,subject:data.subject,teacherName:data.teacherName,teacherId:data.teacherId||null,teacherFromList:!!data.teacherFromList,studentIds:data.studentIds,days:data.days,startTime:data.startTime,endTime:data.endTime,status:data.status,notes:data.notes,updated:new Date().toISOString()};
    logA('Updated remedial plan: '+data.type+' for Gr '+data.grade+'-'+data.section+' '+data.subject);
    toast('Plan updated','success');}
  }
  DB.set('remedial_plans',plans);
  closeM();rRemedial();
}

function delRemedial(id){
  if(!confirm('Delete this remedial plan?'))return;
  DB.set('remedial_plans',(DB.get('remedial_plans')||[]).filter(p=>p.id!==id));
  logA('Deleted remedial plan');toast('Deleted','danger');rRemedial();
}

function renderTeacherRemedial(){
  const tch=document.getElementById('vrt-tch').value,day=document.getElementById('vrt-day').value;

  const filtered=day?all.filter(p=>(p.days||[]).includes(day)):all;
  if(!filtered.length){document.getElementById('vrt-content').innerHTML='<div class="emp"><div class="ei">📚</div><p>No remedial plans found for '+esc(tch)+(day?' on '+day:'')+'</p></div>';return;}
  const students=DB.get('students')||[];
  const totalStu=filtered.reduce((s,p)=>s+(p.studentIds||[]).length,0);
  const tb={'Quiz 1':'bbl','Quiz 2':'btl','1st Mid Term':'bgo','2nd Mid Term':'brd'};
  document.getElementById('vrt-content').innerHTML='<div style="background:var(--ac2);border:1px solid var(--ac3);border-radius:var(--rs);padding:11px;margin-bottom:12px;font-size:12px"><strong>📊 Summary:</strong> '+filtered.length+' plan(s), '+totalStu+' total student assignments'+(day?' on '+day:'')+'</div>'
  +filtered.map(p=>{
    const stuList=(p.studentIds||[]).map(sid=>students.find(s=>s.id===sid)).filter(Boolean);
    return'<div class="card" style="margin-bottom:11px;padding:11px"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:5px;margin-bottom:8px"><div><span class="badge '+(tb[p.type]||'bgr')+'">'+esc(p.type)+'</span> <span class="badge bpu">Gr '+p.grade+'-'+p.section+'</span> <span class="badge bbl">'+esc(p.subject)+'</span></div><div style="font-size:11px;color:var(--tx2)"><strong>'+(p.days||[]).join(', ')+'</strong>'+(p.startTime?' · '+p.startTime+(p.endTime?'-'+p.endTime:''):'')+'</div></div><div style="background:var(--sf2);border-radius:var(--rs);padding:8px;font-size:11px"><strong style="color:var(--ac)">👥 Students ('+stuList.length+'):</strong> '+stuList.map(s=>fN(s)+(s.sn?' (SN '+s.sn+')':'')).join(', ')+'</div>'+(p.notes?'<div style="font-size:11px;color:var(--tx3);margin-top:6px"><em>📝 '+esc(p.notes)+'</em></div>':'')+'</div>';

function doRmmExport(){
  const sel=[...document.querySelectorAll('.rmm-tch-cb:checked')].map(cb=>cb.value);
  if(!sel.length){toast('Select at least one teacher','danger');return;}
  const dayFilter=document.getElementById('rmm-day').value;
  let plans=(DB.get('remedial_plans')||[]).filter(p=>sel.some(n=>n.toLowerCase()===(p.teacherName||'').toLowerCase()));
  if(dayFilter)plans=plans.filter(p=>(p.days||[]).includes(dayFilter));
  if(!plans.length){toast('No plans match filters','danger');return;}
  closeM();
  expRemedialPDFCommon(plans,{title:'Remedial Plans — Multi-Teacher Report',subtitle:sel.length+' teacher(s) · '+plans.length+' plan(s)'+(dayFilter?' · '+dayFilter:'')});
}

function expRemedialPDFCommon(plans,opts,teacherFocus){
  const settings=DB.get('settings')||{};
  const students=DB.get('students')||[];
  const tb={'Quiz 1':'#3d6ee0','Quiz 2':'#0d8a7a','1st Mid Term':'#dd6b20','2nd Mid Term':'#d63838'};
  // Group plans by teacher
  const byTeacher={};
  plans.forEach(p=>{const k=p.teacherName||'(unknown)';if(!byTeacher[k])byTeacher[k]=[];byTeacher[k].push(p);});
  
  const w=window.open('','_blank');

      +'<table><thead><tr><th style="width:40px">SN</th><th>Student Name</th><th style="width:130px">Father Phone</th></tr></thead><tbody>'
      +(stuList.length?stuList.map(s=>'<tr><td>'+(s.sn||'—')+'</td><td><strong>'+fN(s)+'</strong></td><td>'+(s.fatherPhone||'—')+'</td></tr>').join(''):'<tr><td colspan="3" style="text-align:center;color:#999">No students</td></tr>')

// UNIVERSAL WHATSAPP SHARE HELPER
// Auto-downloads PDF, opens WhatsApp with text + 3-step instructions
// ═══════════════════════════════════════════════════════════

function waShareModal(opts){
  // opts: {phone, name, message, pdfFn (function that triggers PDF download), context}
  const cleanPh=cleanPhone(opts.phone||'');
  const tplMsg=opts.message||'';
  openM('<div class="mh"><h3>📱 Share via WhatsApp</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2">'
  +'<div class="al ai">📲 Sharing to <strong>'+esc(opts.name||'recipient')+'</strong>'+(cleanPh?' (<span class="mono">'+cleanPh+'</span>)':'')+'</div>'
  +'<div class="al aw"><strong>How to share the PDF (3 steps):</strong><br><br>1️⃣ Click <strong>"Generate PDF & Open WhatsApp"</strong> below<br>2️⃣ The PDF downloads to your device automatically<br>3️⃣ In the WhatsApp tab that opens, tap the 📎 attachment icon → pick the just-downloaded PDF → press Send</div>'
  +(opts.phone?'':'<div class="fg"><label>Recipient Phone *</label><input id="wash-phone" placeholder="05XXXXXXXX" type="tel"><div style="font-size:10px;color:var(--tx3);margin-top:3px">Saudi numbers auto-prepend 966</div></div>')
  +'<div class="fg"><label>Message (editable)</label><textarea id="wash-msg" style="min-height:120px;font-size:12px">'+esc(tplMsg)+'</textarea></div>'
  +'</div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="waShareGo()">📱 Generate PDF & Open WhatsApp →</button></div>');
  window._waShare={pdfFn:opts.pdfFn,phone:opts.phone||'',context:opts.context||''};
}

function waShareGo(){
  const data=window._waShare;if(!data)return;
  const phEl=document.getElementById('wash-phone');
  const phRaw=phEl?phEl.value.trim():data.phone;
  if(!phRaw){toast('Phone number required','danger');return;}
  const ph=cleanPhone(phRaw);
  const msg=document.getElementById('wash-msg').value.trim();
  // 1. Trigger the PDF download
  if(data.pdfFn){try{data.pdfFn();}catch(e){console.error(e);toast('PDF generation issue: '+e.message,'danger');}}
  // 2. Open WhatsApp with text after a short delay so PDF download starts first
  setTimeout(()=>{const url='https://wa.me/'+ph+'?text='+encodeURIComponent(msg);window.open(url,'_blank');},500);
  logA('Shared '+(data.context||'report')+' via WhatsApp to '+ph);
  closeM();
  toast('PDF generated → WhatsApp opening. Attach the PDF in WhatsApp.','success');
}

function rVPReports(){

function addVPReportM(){
  window._vpRepEdit={isNew:true,attachments:[]};
  renderVPReportForm();
}

function renderVPReportForm(){
  const data=window._vpRepEdit;
  const filesHtml=(data.attachments||[]).length?(data.attachments.map((a,i)=>'<div style="display:flex;justify-content:space-between;align-items:center;background:var(--sf2);padding:7px 10px;border-radius:var(--rs);margin-bottom:5px;font-size:11px"><div><strong>'+esc(a.name)+'</strong> <span style="color:var(--tx3)">('+a.kind+(a.size?' · '+formatBytes(a.size):'')+')</span>'+(a.url&&!a.data?'<br><a href="'+esc(a.url)+'" target="_blank" style="color:var(--ac);font-size:10px">'+esc(a.url).slice(0,60)+'...</a>':'')+'</div><button class="btn bd3 bxs" onclick="rmVPAttach('+i+')">×</button></div>').join('')):'<div style="font-size:11px;color:var(--tx3)">No files attached yet</div>';
  
  openM('<div class="mh"><h3>📋 '+(data.isNew?'New':'Edit')+' Report to Principal</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2">'
  +'<div class="fr f2"><div class="fg"><label>Report Type *</label><select id="vpr-type">'+VP_REPORT_TYPES.map(t=>'<option '+(data.type===t?'selected':'')+'>'+t+'</option>').join('')+'</select></div><div class="fg"><label>Priority</label><select id="vpr-pri"><option '+(data.priority==='Normal'||!data.priority?'selected':'')+'>Normal</option><option '+(data.priority==='High'?'selected':'')+'>High</option><option '+(data.priority==='Low'?'selected':'')+'>Low</option></select></div></div>'
  +'<div class="fg"><label>Title *</label><input id="vpr-title" value="'+esc(data.title||'')+'" placeholder="Brief summary headline"></div>'
  +'<div class="fg"><label>Detailed Description *</label><textarea id="vpr-desc" placeholder="Full description of the report contents…" style="min-height:140px">'+esc(data.description||'')+'</textarea></div>'
  
  // ATTACHMENTS section
  +'<div style="background:var(--sf2);border-radius:var(--r);padding:12px;margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--tx);margin-bottom:9px;text-transform:uppercase">📎 Attachments (PDF / Image / Video)</div>'
  +'<div class="al aw" style="font-size:11px;margin-bottom:10px">⚠️ Files under <strong>1MB</strong> are stored inline. For larger files (videos, large PDFs) → upload to Google Drive / Dropbox first and paste the share link below.</div>'
  +'<div id="vpr-files">'+filesHtml+'</div>'
  +'<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap"><label class="btn bg2 bsm" style="cursor:pointer;margin:0">📎 Upload File <input type="file" accept=".pdf,image/*,video/*" onchange="addVPFile(this)" style="display:none"></label><button class="btn bg2 bsm" onclick="addVPLinkM()">🔗 Add Link</button></div></div>'
  +'</div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="saveVPReport()">📤 Submit to Principal →</button></div>',true);
}

function formatBytes(b){if(b<1024)return b+' B';if(b<1048576)return Math.round(b/1024)+' KB';return (b/1048576).toFixed(2)+' MB';}

function addVPFile(input){
  const f=input.files[0];if(!f)return;
  if(f.size>1024*1024){toast('File too large ('+formatBytes(f.size)+'). Max 1MB inline. Use "Add Link" instead for bigger files.','danger');input.value='';return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const data=window._vpRepEdit;
    const kind=f.type.startsWith('image/')?'Image':f.type.startsWith('video/')?'Video':f.type==='application/pdf'?'PDF':'File';
    data.attachments.push({name:f.name,kind,size:f.size,mime:f.type,data:e.target.result});
    input.value='';
    renderVPReportForm();
  };
  reader.readAsDataURL(f);
}

function addVPLinkM(){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.id='vp-link-modal';
  overlay.innerHTML='<div style="background:var(--sf);border:1px solid var(--bd);border-radius:14px;width:100%;max-width:480px;box-shadow:var(--shl)"><div class="mh"><h3>🔗 Add External Link</h3><button class="mc" onclick="document.getElementById(\'vp-link-modal\').remove()">×</button></div><div class="mb2"><div class="al ai">📋 Upload large files (videos, big PDFs) to Google Drive, Dropbox, or any cloud, then paste the public share link here. Make sure the link is set to "Anyone with the link can view".</div><div class="fg"><label>Display Name *</label><input id="vplnk-n" placeholder="e.g. CCTV Footage 2024-01-20"></div><div class="fr f2"><div class="fg"><label>Type</label><select id="vplnk-k"><option>PDF</option><option>Image</option><option>Video</option><option>Audio</option><option>Document</option><option>Other</option></select></div><div class="fg"><label>Link/URL *</label><input id="vplnk-u" placeholder="https://..."></div></div></div><div class="mf"><button class="btn bg2" onclick="document.getElementById(\'vp-link-modal\').remove()">'+T('cancel')+'</button><button class="btn bp" onclick="saveVPLink()">+ Add Link →</button></div></div>';
  document.body.appendChild(overlay);
}

function saveVPLink(){
  const n=document.getElementById('vplnk-n').value.trim(),k=document.getElementById('vplnk-k').value,u=document.getElementById('vplnk-u').value.trim();
  if(!n||!u){alert('Name and URL required');return;}
  const data=window._vpRepEdit;
  data.attachments.push({name:n,kind:k,url:u});
  document.getElementById('vp-link-modal').remove();
  renderVPReportForm();
}

function rmVPAttach(idx){
  const data=window._vpRepEdit;data.attachments.splice(idx,1);renderVPReportForm();
}

function saveVPReport(){
  const data=window._vpRepEdit;
  data.type=document.getElementById('vpr-type').value;
  data.priority=document.getElementById('vpr-pri').value;
  data.title=document.getElementById('vpr-title').value.trim();
  data.description=document.getElementById('vpr-desc').value.trim();
  if(!data.title||!data.description){toast('Title and description are required','danger');return;}
  const reports=DB.get('vp_reports')||[];
  if(data.isNew){
    reports.push({id:nid('vpr'),type:data.type,priority:data.priority,title:data.title,description:data.description,attachments:data.attachments||[],createdBy:CU.id,createdByName:CU.firstName+' '+CU.lastName,scope:CU.scope||'',principalAck:'',principalAckBy:'',principalAckAt:'',created:new Date().toISOString()});
  }
  try{
    DB.set('vp_reports',reports);
    logA('Submitted VP report to Principal: '+data.title);
    closeM();toast('Report submitted to Principal','success');rVPReports();
  }catch(e){
    if(e.name==='QuotaExceededError'){toast('Storage quota exceeded — too many large files. Use external links instead.','danger');}
    else{toast('Save error: '+e.message,'danger');}
  }
}

function vVPReport(id){
  const r=(DB.get('vp_reports')||[]).find(x=>x.id===id);if(!r)return;
  const isP=['principal','superadmin'].includes(CU.role);
  const isOwner=r.createdBy===CU.id;
  const pb={High:'brd',Normal:'bbl',Low:'bgr'};
  const filesHtml=(r.attachments||[]).length?'<div style="margin-top:10px">'+(r.attachments||[]).map(a=>{
    let preview='';
    if(a.data&&a.kind==='Image')preview='<img src="'+a.data+'" style="max-width:100%;max-height:200px;border-radius:var(--rs);margin-top:5px;border:1px solid var(--bd)">';
    else if(a.data&&a.kind==='Video')preview='<video controls src="'+a.data+'" style="max-width:100%;max-height:240px;border-radius:var(--rs);margin-top:5px"></video>';
    const link=a.data?'<a href="'+a.data+'" download="'+esc(a.name)+'" style="color:var(--ac);font-size:11px">⬇️ Download</a>':a.url?'<a href="'+esc(a.url)+'" target="_blank" style="color:var(--ac);font-size:11px">🔗 Open Link</a>':'';
    return'<div style="background:var(--sf2);padding:9px 11px;border-radius:var(--rs);margin-bottom:7px;border-left:3px solid var(--ac)"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:5px"><div><strong>'+esc(a.name)+'</strong> <span class="badge bbl">'+a.kind+'</span>'+(a.size?' <span style="color:var(--tx3);font-size:10px">'+formatBytes(a.size)+'</span>':'')+'</div>'+link+'</div>'+preview+'</div>';
  }).join('')+'</div>':'<div style="font-size:11px;color:var(--tx3)">No attachments</div>';
  
  openM('<div class="mh"><h3>📋 Report Detail</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2"><div style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap"><span class="badge bpu">'+esc(r.type||'—')+'</span><span class="badge '+(pb[r.priority]||'bgr')+'">'+(r.priority||'Normal')+'</span>'+(r.principalAck?'<span class="badge bgn">✓ Acknowledged</span>':'<span class="badge bgo">⏳ Pending Principal Ack</span>')+'</div>'
  +'<h2 style="font-size:16px;color:var(--tx);margin-bottom:8px">'+esc(r.title)+'</h2>'
  +'<div style="font-size:11px;color:var(--tx3);margin-bottom:12px">From <strong>'+esc(r.createdByName)+'</strong>'+(r.scope?' ('+esc(r.scope)+')':'')+' on '+new Date(r.created).toLocaleString()+'</div>'
  +'<div class="fg"><label>Description</label><div style="background:var(--sf2);padding:11px;border-radius:var(--rs);font-size:12px;color:var(--tx2);line-height:1.6;white-space:pre-wrap">'+esc(r.description)+'</div></div>'
  +'<div class="fg"><label>📎 Attachments</label>'+filesHtml+'</div>'
  +(isP&&!r.principalAck?'<div class="fg"><label>Acknowledge / Reply</label><textarea id="vpr-ack" placeholder="Acknowledgment, comments, or instructions back to VP…" style="min-height:80px"></textarea></div>':r.principalAck?'<div class="al ag" style="margin-bottom:12px"><strong>🎯 Principal\'s Response:</strong><br>'+esc(r.principalAck)+'<br><span style="font-size:10px;color:var(--tx3);margin-top:5px;display:block">— '+esc(r.principalAckBy||'')+' on '+(r.principalAckAt?new Date(r.principalAckAt).toLocaleString():'')+'</span></div>':'')
  +'</div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('close')+'</button><button class="btn bg2 bsm" onclick="window.print()">🖨️ Print</button>'+(isP&&!r.principalAck?'<button class="btn bp" onclick="ackVPReport(\''+id+'\')">✓ Acknowledge →</button>':'')+(isOwner&&!r.principalAck?'<button class="btn bd3 bsm" onclick="delVPReport(\''+id+'\')">Delete</button>':'')+'</div>',true);
}

function ackVPReport(id){
  const txt=document.getElementById('vpr-ack').value.trim();
  if(!txt){toast('Type an acknowledgment','danger');return;}
  const reports=DB.get('vp_reports')||[];const i=reports.findIndex(r=>r.id===id);if(i<0)return;
  reports[i].principalAck=txt;reports[i].principalAckBy=CU.firstName+' '+CU.lastName;reports[i].principalAckAt=new Date().toISOString();
  DB.set('vp_reports',reports);logA('Acknowledged VP report: '+reports[i].title);
  closeM();toast('Report acknowledged','success');rVPReports();
}

function delVPReport(id){
  if(!confirm('Delete this report?'))return;
  DB.set('vp_reports',(DB.get('vp_reports')||[]).filter(r=>r.id!==id));
  closeM();toast('Deleted','danger');rVPReports();
}

// WARNING LETTERS — Principal issues warnings to staff/teachers
// ═══════════════════════════════════════════════════════════

const WARNING_TYPES=['Verbal Warning','Written Warning','Final Written Warning','Performance Improvement Notice','Misconduct Notice','Attendance Warning'];

function rWarnings(){
  const canIssue=['principal','superadmin'].includes(CU.role);
  const canView=canIssue||['vice_principal','academic_supervisor'].includes(CU.role);
  if(!canView){document.getElementById('pc').innerHTML='<div class="emp"><div class="ei">🔒</div><p>Access restricted</p></div>';return;}
  const list=DB.get('warning_letters')||[];
  // Stats: count per recipient
  const byRecipient={};list.forEach(w=>{const k=w.recipientName||'(unknown)';byRecipient[k]=(byRecipient[k]||0)+1;});
  const repeatOffenders=Object.entries(byRecipient).filter(([n,c])=>c>=2).sort((a,b)=>b[1]-a[1]);
  
  document.getElementById('pc').innerHTML='<div class="card" style="margin-bottom:12px"><div class="sh2"><h3>⚠️ '+T('warning_letters')+' ('+list.length+')</h3>'+(canIssue?'<button class="btn bp bsm" onclick="addWarningM()">+ Issue Warning Letter</button>':'')+'</div><div style="font-size:11px;color:var(--tx3);margin-top:4px">Formal warning letters issued by the Principal. Click any letter to view, attach reply, or share.</div></div>'
  +'<div class="cg g4" style="margin-bottom:13px"><div class="stat bl"><div class="sl2">Total Letters</div><div class="sv">'+list.length+'</div><div class="sic">⚠️</div></div><div class="stat go"><div class="sl2">Awaiting Reply</div><div class="sv">'+list.filter(w=>!w.reply).length+'</div><div class="sic">⏳</div></div><div class="stat gn"><div class="sl2">Replied</div><div class="sv">'+list.filter(w=>w.reply).length+'</div><div class="sic">📨</div></div><div class="stat rd"><div class="sl2">Repeat Recipients</div><div class="sv">'+repeatOffenders.length+'</div><div class="sb3">2+ warnings</div><div class="sic">📊</div></div></div>'
  +'<div class="card"><div class="sh2"><h3>🔍 Search & Filter</h3></div>'
  +'<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap"><input id="wnq" placeholder="🔍 Search by recipient name…" oninput="fltWarnings()" style="flex:1;min-width:240px;padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px"><select id="wntf" onchange="fltWarnings()" style="padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx)"><option value="">All Types</option>'+WARNING_TYPES.map(t=>'<option>'+t+'</option>').join('')+'</select><select id="wnrf" onchange="fltWarnings()" style="padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx)"><option value="">All Reply Status</option><option value="replied">Replied</option><option value="pending">Awaiting Reply</option></select></div>'
  +'<div id="wnlist">'+buildWarningList(list,canIssue)+'</div></div>'
  +(repeatOffenders.length?'<div class="card" style="margin-top:13px"><div class="sh2"><h3>📊 Recipients with Multiple Warnings</h3></div><div style="font-size:11px;color:var(--tx3);margin-bottom:9px">Click a name to see full warning history for that person.</div><div style="display:flex;gap:6px;flex-wrap:wrap">'+repeatOffenders.map(([n,c])=>'<button class="btn bg2 bsm" onclick="searchWarnByName(\''+esc(n).replace(/\'/g,"\\'")+'\')"><strong>'+esc(n)+'</strong> <span style="background:var(--dn);color:#fff;padding:2px 7px;border-radius:9px;margin-left:5px;font-size:10px">'+c+' warnings</span></button>').join('')+'</div></div>':'');
}

function buildWarningList(list,canIssue){
  if(!list.length)return'<div class="emp"><div class="ei">⚠️</div><p>'+T('no_records')+'</p></div>';
  return'<div class="tw"><table><thead><tr><th>Date</th><th>Recipient</th><th>Type</th><th>Subject</th><th>Reply</th><th>Issued By</th><th>Actions</th></tr></thead><tbody>'
  +list.slice().reverse().map(w=>{
    const sb={Verbal:'bbl',Written:'bgo',Final:'brd'};
    const sev=w.type&&w.type.startsWith('Final')?'Final':w.type&&w.type.startsWith('Written')?'Written':'Verbal';
    return'<tr><td class="mono" style="font-size:11px">'+w.date+'</td><td><strong>'+esc(w.recipientName)+'</strong><br><span style="font-size:10px;color:var(--tx3)">'+esc(w.recipientRole||'')+'</span></td><td><span class="badge '+sb[sev]+'">'+esc(w.type)+'</span></td><td style="font-size:11px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(w.subject)+'</td><td>'+(w.reply?'<span class="badge bgn">📨 Replied</span>':'<span class="badge bgo">⏳ Pending</span>')+'</td><td style="font-size:11px;color:var(--tx3)">'+esc(w.issuedByName)+'</td><td style="display:flex;gap:4px"><button class="btn bg2 bxs" onclick="vWarning(\''+w.id+'\')">View</button>'+(canIssue?'<button class="btn bd3 bxs" onclick="delWarning(\''+w.id+'\')">Del</button>':'')+'</td></tr>';
  }).join('')+'</tbody></table></div>';
}

function fltWarnings(){
  const q=document.getElementById('wnq').value.toLowerCase().trim(),tf=document.getElementById('wntf').value,rf=document.getElementById('wnrf').value;
  let list=DB.get('warning_letters')||[];
  if(q)list=list.filter(w=>(w.recipientName||'').toLowerCase().includes(q)||(w.subject||'').toLowerCase().includes(q));
  if(tf)list=list.filter(w=>w.type===tf);
  if(rf==='replied')list=list.filter(w=>w.reply);
  if(rf==='pending')list=list.filter(w=>!w.reply);
  const canIssue=['principal','superadmin'].includes(CU.role);
  document.getElementById('wnlist').innerHTML=buildWarningList(list,canIssue);
}

function searchWarnByName(name){
  const inp=document.getElementById('wnq');
  if(inp){inp.value=name;fltWarnings();inp.scrollIntoView({behavior:'smooth',block:'center'});}
}

function addWarningM(){
  // Build recipient pool: staff accounts + teachers from master list
  const accounts=(DB.get('accounts')||[]).filter(a=>a.active!==false&&a.role!=='superadmin'&&a.role!=='backend_admin');
  const teachers=(DB.get('teachers')||[]).filter(t=>t.active!==false);
  
  openM('<div class="mh"><h3>⚠️ Issue Warning Letter</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2">'
  +'<div class="al aw">⚠️ Warning letters are formal records. They will be permanently saved and exportable as PDF for filing.</div>'
  +'<div class="fr f2"><div class="fg"><label>Recipient Category *</label><select id="wn-cat" onchange="onWarnCatChange()"><option value="staff">Staff Member</option><option value="teacher">Teacher</option></select></div><div class="fg"><label>Recipient *</label><select id="wn-rec"><option value="">— Select —</option>'+accounts.map(a=>'<option value="staff:'+a.id+'">'+a.firstName+' '+a.lastName+' ('+rL(a.role)+')</option>').join('')+'</select></div></div>'
  +'<div class="fr f2"><div class="fg"><label>Warning Type *</label><select id="wn-type">'+WARNING_TYPES.map(t=>'<option>'+t+'</option>').join('')+'</select></div><div class="fg"><label>Date *</label><input type="date" id="wn-date" value="'+new Date().toISOString().split('T')[0]+'"></div></div>'
  +'<div class="fg"><label>Subject *</label><input id="wn-sub" placeholder="Brief subject line for the warning"></div>'
  +'<div class="fg" style="margin-bottom:0"><label>Content *</label><textarea id="wn-content" placeholder="Full content of the warning letter — describe the concerns, expectations, required actions, and any consequences…" style="min-height:200px"></textarea></div>'
  +'</div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="saveWarning()">📝 Issue Warning →</button></div>',true);
  // Stash teacher list for switching
  window._warnTchOpts=teachers.map(t=>'<option value="teacher:'+t.id+'">'+t.name+(t.subject?' ('+t.subject+')':'')+'</option>').join('');
  window._warnStfOpts=accounts.map(a=>'<option value="staff:'+a.id+'">'+a.firstName+' '+a.lastName+' ('+rL(a.role)+')</option>').join('');
}

function onWarnCatChange(){
  const cat=document.getElementById('wn-cat').value;
  const sel=document.getElementById('wn-rec');
  sel.innerHTML='<option value="">— Select —</option>'+(cat==='staff'?(window._warnStfOpts||''):(window._warnTchOpts||''));
}

function saveWarning(){
  const recVal=document.getElementById('wn-rec').value;
  if(!recVal){toast('Select a recipient','danger');return;}
  const[cat,rid]=recVal.split(':');
  let recName='',recRole='',recPhone='',recEmail='';
  if(cat==='staff'){const a=(DB.get('accounts')||[]).find(x=>x.id===rid);if(a){recName=a.firstName+' '+a.lastName;recRole=rL(a.role);recPhone=a.phone||'';recEmail=a.email||'';}}
  else{const t=(DB.get('teachers')||[]).find(x=>x.id===rid);if(t){recName=t.name;recRole='Teacher'+(t.subject?' — '+t.subject:'');recPhone=t.phone||'';recEmail=t.email||'';}}
  const subject=document.getElementById('wn-sub').value.trim(),content=document.getElementById('wn-content').value.trim();
  if(!subject||!content){toast('Subject and content are required','danger');return;}
  const list=DB.get('warning_letters')||[];
  list.push({id:nid('wn'),recipientCat:cat,recipientId:rid,recipientName:recName,recipientRole:recRole,recipientPhone:recPhone,recipientEmail:recEmail,type:document.getElementById('wn-type').value,date:document.getElementById('wn-date').value,subject,content,reply:null,issuedBy:CU.id,issuedByName:CU.firstName+' '+CU.lastName,issuedByRole:rL(CU.role),created:new Date().toISOString()});
  DB.set('warning_letters',list);logA('Issued warning letter to '+recName+': '+subject);
  closeM();toast('Warning letter issued','success');rWarnings();
}

function vWarning(id){
  const w=(DB.get('warning_letters')||[]).find(x=>x.id===id);if(!w)return;
  const canIssue=['principal','superadmin'].includes(CU.role);
  const replyHtml=w.reply?'<div style="background:var(--gdbg);border-left:4px solid var(--gd);border-radius:var(--rs);padding:12px;margin-top:8px"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px"><div><strong style="color:var(--gd);font-size:13px">📨 Reply Received</strong><div style="font-size:10px;color:var(--tx3)">Uploaded by '+esc(w.reply.uploadedBy||'—')+' on '+(w.reply.uploadedAt?new Date(w.reply.uploadedAt).toLocaleString():'—')+'</div></div>'+(canIssue?'<button class="btn bd3 bxs" onclick="rmWarningReply(\''+w.id+'\')">Remove Reply</button>':'')+'</div>'+(w.reply.notes?'<div style="font-size:12px;color:var(--tx2);line-height:1.6;margin-bottom:8px;white-space:pre-wrap;background:var(--sf);padding:9px;border-radius:var(--rs)">'+esc(w.reply.notes)+'</div>':'')+(w.reply.fileName?'<div style="background:var(--sf);padding:9px 11px;border-radius:var(--rs);display:flex;justify-content:space-between;align-items:center"><div><strong>📎 '+esc(w.reply.fileName)+'</strong> <span style="color:var(--tx3);font-size:10px">'+(w.reply.fileSize?formatBytes(w.reply.fileSize):'')+'</span></div>'+(w.reply.fileData?'<a href="'+w.reply.fileData+'" download="'+esc(w.reply.fileName)+'" class="btn bp bxs" style="text-decoration:none">⬇️ Download Reply PDF</a>':'')+'</div>':'')+'</div>':'<div style="background:var(--sf2);border:2px dashed var(--bd);border-radius:var(--rs);padding:15px;text-align:center;margin-top:8px"><div style="color:var(--tx3);font-size:12px;margin-bottom:9px">No reply received yet</div>'+(canIssue||CU.id===w.issuedBy?'<button class="btn bp bsm" onclick="addWarningReplyM(\''+w.id+'\')">📨 Attach Reply PDF</button>':'<div style="font-size:10px;color:var(--tx3)">Only Principal/Super Admin or the issuer can attach a reply.</div>')+'</div>';
  
  openM('<div class="mh"><h3>⚠️ Warning Letter</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2">'
  +'<div class="cg g2" style="margin-bottom:13px;font-size:12px"><div><div style="font-size:10px;color:var(--tx3)">Recipient</div><div style="font-weight:700">'+esc(w.recipientName)+'</div><div style="font-size:11px;color:var(--tx3)">'+esc(w.recipientRole||'')+'</div></div><div><div style="font-size:10px;color:var(--tx3)">Type</div><div style="font-weight:600">'+esc(w.type)+'</div></div><div><div style="font-size:10px;color:var(--tx3)">Date</div><div style="font-weight:600">'+w.date+'</div></div><div><div style="font-size:10px;color:var(--tx3)">Issued By</div><div style="font-weight:600">'+esc(w.issuedByName)+'</div></div></div>'
  +'<div class="fg"><label>Subject</label><div style="background:var(--ac2);padding:11px;border-radius:var(--rs);font-size:14px;color:var(--tx);font-weight:600;border-left:3px solid var(--ac)">'+esc(w.subject)+'</div></div>'
  +'<div class="fg"><label>Content</label><div style="background:var(--sf2);padding:13px;border-radius:var(--rs);font-size:12px;color:var(--tx2);line-height:1.7;white-space:pre-wrap">'+esc(w.content||w.reasons||'')+(w.actions?'\n\n'+w.actions:'')+(w.consequences?'\n\n'+w.consequences:'')+'</div></div>'
  +'<div class="fg" style="margin-bottom:0"><label>📨 Recipient\'s Reply</label>'+replyHtml+'</div>'
  +'</div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('close')+'</button><button class="btn bg2 bsm" onclick="expWarningPDF(\''+w.id+'\')">📄 Export PDF</button>'+(w.recipientPhone?'<button class="btn bp bsm" onclick="shareWarningWA(\''+w.id+'\')">📱 Share WhatsApp</button>':'')+(canIssue?'<button class="btn bd3 bsm" onclick="delWarning(\''+w.id+'\')">Delete</button>':'')+'</div>',true);
}

function addWarningReplyM(id){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.id='wn-reply-modal';
  overlay.innerHTML='<div style="background:var(--sf);border:1px solid var(--bd);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shl)"><div class="mh"><h3>📨 Attach Reply</h3><button class="mc" onclick="document.getElementById(\'wn-reply-modal\').remove()">×</button></div><div class="mb2"><div class="al ai">📋 Upload the recipient\'s reply PDF (under 1MB) and add any notes about it. The reply will be permanently linked to this warning letter and visible whenever it is opened.</div><div class="fg"><label>Reply Notes (optional)</label><textarea id="wn-rnotes" placeholder="Brief notes about the reply, e.g. \'Acknowledged on Jan 15 — committed to corrective plan\'" style="min-height:80px"></textarea></div><div class="fg" style="margin-bottom:0"><label>Reply PDF File</label><input type="file" id="wn-rfile" accept="application/pdf,.pdf"><div style="font-size:10px;color:var(--tx3);margin-top:4px">Max 1MB. For larger files, upload to Google Drive and paste the link in notes above.</div></div></div><div class="mf"><button class="btn bg2" onclick="document.getElementById(\'wn-reply-modal\').remove()">'+T('cancel')+'</button><button class="btn bp" onclick="saveWarningReply(\''+id+'\')">📨 Save Reply →</button></div></div>';
  document.body.appendChild(overlay);
}

function saveWarningReply(id){
  const notes=document.getElementById('wn-rnotes').value.trim();
  const fileInput=document.getElementById('wn-rfile');
  const file=fileInput.files[0];
  if(!notes&&!file){toast('Add notes or attach a file','danger');return;}
  const finishSave=(fileData,fileName,fileSize)=>{
    const list=DB.get('warning_letters')||[];const i=list.findIndex(w=>w.id===id);if(i<0)return;
    list[i].reply={notes,fileName:fileName||'',fileSize:fileSize||0,fileData:fileData||'',uploadedBy:CU.firstName+' '+CU.lastName,uploadedAt:new Date().toISOString()};
    try{
      DB.set('warning_letters',list);
      logA('Attached reply to warning letter: '+list[i].subject);
      const m=document.getElementById('wn-reply-modal');if(m)m.remove();
      toast('Reply attached','success');closeM();vWarning(id);
    }catch(e){
      if(e.name==='QuotaExceededError'){toast('Storage quota exceeded — file too large for inline storage','danger');}
      else{toast('Save error: '+e.message,'danger');}
    }
  };
  if(file){
    if(file.size>1024*1024){toast('File too large ('+formatBytes(file.size)+'). Max 1MB.','danger');return;}
    const reader=new FileReader();
    reader.onload=e=>finishSave(e.target.result,file.name,file.size);
    reader.readAsDataURL(file);
  }else{
    finishSave('','',0);
  }
}

function rmWarningReply(id){
  if(!confirm('Remove the reply attachment?'))return;
  const list=DB.get('warning_letters')||[];const i=list.findIndex(w=>w.id===id);if(i<0)return;
  list[i].reply=null;DB.set('warning_letters',list);
  logA('Removed reply from warning letter: '+list[i].subject);
  toast('Reply removed','danger');closeM();vWarning(id);
}

function expWarningPDF(id){
  const w=(DB.get('warning_letters')||[]).find(x=>x.id===id);if(!w)return;
  const settings=DB.get('settings')||{};
  const win=window.open('','_blank');
  const replySection=w.reply?'<div class="section" style="margin-top:30px;page-break-before:auto"><h3 style="color:#7a4d00">📨 Recipient Reply</h3><p style="font-size:10px;color:#777">Uploaded by '+(w.reply.uploadedBy||'—')+' on '+(w.reply.uploadedAt?new Date(w.reply.uploadedAt).toLocaleString():'—')+'</p>'+(w.reply.notes?'<div style="background:#fdf3dc;padding:10px;border-radius:4px;font-size:11px;white-space:pre-wrap;line-height:1.6">'+w.reply.notes+'</div>':'')+(w.reply.fileName?'<p style="font-size:11px;margin-top:7px">📎 Attached file: <strong>'+w.reply.fileName+'</strong></p>':'')+'</div>':'';
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Warning Letter — '+w.recipientName+'</title><style>@page{size:A4;margin:20mm}body{font-family:Arial,sans-serif;color:#1a3a5c;font-size:12px;line-height:1.7;max-width:170mm}.title{text-align:center;font-size:20px;font-weight:bold;color:#a52424;text-transform:uppercase;letter-spacing:2px;margin:18px 0;padding:9px;border:2px solid #a52424;border-radius:6px}.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:#f0f4f8;padding:11px 14px;border-radius:6px;margin-bottom:18px;font-size:11px}.meta strong{display:block;font-size:9px;text-transform:uppercase;color:#555;margin-bottom:2px}.subject-box{background:#e4ecfb;padding:11px 14px;border-left:4px solid #1a5f7a;border-radius:4px;font-size:14px;font-weight:bold;margin-bottom:14px}.section{margin-bottom:14px}.section h3{font-size:13px;color:#1a5f7a;border-bottom:1px solid #ddd;padding-bottom:4px;margin-bottom:8px}.content{white-space:pre-wrap;font-size:12px;line-height:1.8}.closing{margin-top:32px;font-size:12px;line-height:1.6}.closing .name{font-weight:bold;color:#1a5f7a;font-size:13px;margin-top:4px}.closing .role{font-size:11px;color:#555}.reply-space{margin-top:36px;page-break-inside:avoid;border-top:2px dashed #1a5f7a;padding-top:14px}.reply-space h3{font-size:13px;color:#1a5f7a;margin-bottom:6px}.reply-space p{font-size:11px;color:#555;margin-bottom:14px;font-style:italic}.lines{margin-top:8px}.line{border-bottom:1px solid #aaa;height:24px;margin-bottom:8px}.reply-meta{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px;font-size:11px}.reply-meta .field{border-bottom:1px solid #888;padding-bottom:3px}.reply-meta .field small{display:block;color:#777;font-size:9px;margin-top:2px}.footer{margin-top:30px;padding-top:11px;border-top:1px solid #ddd;font-size:9px;color:#888;text-align:center}@media print{button{display:none}}</style></head><body>'+pdfHeaderHTML({subtitle:'Office of the Principal'})+'<div class="title">'+w.type+'</div><div class="meta"><div><strong>To</strong>'+w.recipientName+(w.recipientRole?' — '+w.recipientRole:'')+'</div><div><strong>Date</strong>'+w.date+'</div><div><strong>From</strong>'+w.issuedByName+(w.issuedByRole?' — '+w.issuedByRole:'')+'</div><div><strong>Reference</strong>'+w.id+'</div></div><div class="subject-box">Subject: '+w.subject+'</div><div class="section"><div class="content">'+(w.content||w.reasons||'')+(w.actions?'\n\n'+w.actions:'')+(w.consequences?'\n\n'+w.consequences:'')+'</div></div><div class="closing">Sincerely,<div class="name">'+w.issuedByName+'</div><div class="role">'+(w.issuedByRole||'Principal')+'</div></div><div class="reply-space"><h3>📝 Recipient Reply</h3><p>Please write your reply, acknowledgment, or comments in the space below.</p><div class="lines"><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div></div><div class="reply-meta"><div class="field"><span style="visibility:hidden">.</span><small>Recipient Name &amp; Date</small></div><div class="field"><span style="visibility:hidden">.</span><small>Signature</small></div></div></div>'+replySection+'<div class="footer">Confidential — '+esc(settings.schoolName||'School')+' · Generated on '+new Date().toLocaleString()+'</div><button onclick="window.print()" style="margin-top:14px;padding:8px 16px;background:#1a5f7a;color:#fff;border:none;border-radius:4px;cursor:pointer">🖨️ Print / Save as PDF</button></body></html>');
  win.document.close();
  setTimeout(()=>{try{win.print();}catch(e){}},800);
  toast('Warning letter PDF generated','success');
  logA('Exported warning letter PDF for '+w.recipientName);
}

function shareWarningWA(id){
  const w=(DB.get('warning_letters')||[]).find(x=>x.id===id);if(!w)return;
  const s=DB.get('settings')||{};
  const msg='Dear '+w.recipientName+',\n\nA formal warning letter ('+w.type+') has been issued by the Principal of '+(s.schoolName||'the school')+' regarding: '+w.subject+'\n\nThe full warning letter PDF is attached. Please review carefully and acknowledge.\n\n— '+w.issuedByName+'\n  '+(s.schoolName||'School');
  waShareModal({phone:w.recipientPhone,name:w.recipientName,message:msg,pdfFn:()=>expWarningPDF(id),context:'warning letter ('+w.subject+')'});
}

function delWarning(id){
  if(!confirm('Delete this warning letter? This is a formal record.'))return;
  DB.set('warning_letters',(DB.get('warning_letters')||[]).filter(w=>w.id!==id));
  logA('Deleted warning letter');toast('Deleted','danger');rWarnings();
}

function shareHealthWA(sid){
  const s=gS(sid);if(!s)return;
  const settings=DB.get('settings')||{};
  // Ask: share to which contact?
  const choices=[];
  if(s.fatherPhone)choices.push({label:'Father ('+s.fatherPhone+')',phone:s.fatherPhone,name:'Father of '+fN(s)});

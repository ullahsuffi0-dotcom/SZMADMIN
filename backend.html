function bulkStuDelete(){
  const count=(DB.get('students')||[]).length;
  if(!count){toast('No students to delete','info');return;}
  const confirm1=prompt('Type DELETE ALL to permanently remove all '+count+' student records:');
  if(confirm1!=='DELETE ALL'){toast('Cancelled — confirmation text did not match','info');return;}
  DB.set('students',[]);
  logA('SUPER ADMIN: Deleted all '+count+' students (bulk operation)');
  closeM();toast('All '+count+' students deleted','danger');rStudents();
}

function bulkStuReplace(){
  const file=document.getElementById('bulkstu-file').files[0];
  if(!file){toast('Pick a CSV file first','danger');return;}
  const oldCount=(DB.get('students')||[]).length;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim()).slice(1);
    if(!lines.length){toast('CSV file is empty (or only has a header)','danger');return;}
    const newStudents=[];
    let parseErr=0;
    lines.forEach((line,idx)=>{
      const cols=line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      // Expected: SN, CS, FirstName, LastName, Grade, Section, Gender, Nationality, FatherPhone, MotherPhone
      // Be tolerant: accept short forms too
      let sn,cs,first,last,grade,section,gender,nat,fp,mp;
      if(cols.length>=10){[sn,cs,first,last,grade,section,gender,nat,fp,mp]=cols;}
      else if(cols.length>=6){[sn,cs,first,last,grade,section]=cols;gender=nat=fp=mp='';}
      else{parseErr++;return;}
      if(!first&&!last&&!grade){parseErr++;return;}
      newStudents.push({id:'st'+Date.now()+'-'+idx,sn:sn||'',csn:cs||'',firstName:first||'',lastName:last||'',grade:grade||'',section:section||'',gender:gender||'',nationality:nat||'',fatherPhone:fp||'',motherPhone:mp||'',created:new Date().toISOString().split('T')[0]});
    });
    if(!newStudents.length){toast('No valid rows in CSV','danger');return;}
    const confirm1=prompt('This will DELETE all '+oldCount+' existing students and replace with '+newStudents.length+' new records.\n\nType REPLACE to confirm:');
    if(confirm1!=='REPLACE'){toast('Cancelled — confirmation text did not match','info');return;}
    DB.set('students',newStudents);
    logA('SUPER ADMIN: Replaced all students — removed '+oldCount+', imported '+newStudents.length);
    closeM();toast('Replaced: '+oldCount+' removed, '+newStudents.length+' imported'+(parseErr?' ('+parseErr+' rows skipped)':''),'success');rStudents();
  };
  reader.readAsText(file);
}

function bulkTchReplace(){

  const oldCount=(DB.get('teachers')||[]).length;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim()).slice(1);
    if(!lines.length){toast('CSV file is empty (or only has a header)','danger');return;}
    const newTeachers=[];
    let parseErr=0;
    lines.forEach((line,idx)=>{
      const cols=line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      let name,eid,subj,dep,ph,em;
      if(cols.length>=6){[name,eid,subj,dep,ph,em]=cols;}

      newTeachers.push({id:'tch'+Date.now()+'-'+idx,name:name.trim(),employeeId:(eid||'').trim(),subject:(subj||'').trim(),department:(dep||'').trim(),phone:(ph||'').trim(),email:(em||'').trim(),note:'',active:true,created:new Date().toISOString().split('T')[0]});

  };
  reader.readAsText(file);
}

function buildAchievementList(list,canEdit){
  if(!list.length)return'<div class="emp"><div class="ei">🏆</div><p>No achievement files linked yet</p>'+(canEdit?'<div style="font-size:11px;margin-top:6px">Click "+ Link Achievement File" to add one.</div>':'')+'</div>';
  // Group by teacher
  const byTeacher={};
  list.forEach(a=>{const k=a.teacherName||'(unknown)';if(!byTeacher[k])byTeacher[k]=[];byTeacher[k].push(a);});

    +items.map(a=>'<div style="padding:11px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;gap:10px"><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;margin-bottom:3px">'+esc(a.title||'Achievement File')+'</div><a href="'+esc(a.driveLink)+'" target="_blank" rel="noopener noreferrer" style="font-size:11px;color:var(--ac);font-family:\'JetBrains Mono\',monospace;text-decoration:underline;word-break:break-all">'+esc(a.driveLink)+'</a><div style="font-size:10px;color:var(--tx3);margin-top:3px">Added by '+esc(a.addedByName||'—')+' · '+(a.created||'').split('T')[0]+'</div></div><div style="display:flex;gap:5px;flex-shrink:0"><a href="'+esc(a.driveLink)+'" target="_blank" rel="noopener noreferrer" class="btn bp bxs" style="text-decoration:none">🔗 Open</a>'+(canEdit?'<button class="btn bg2 bxs" onclick="editAchievementM(\''+a.id+'\')">Edit</button><button class="btn bd3 bxs" onclick="delAchievement(\''+a.id+'\')">Del</button>':'')+'</div></div>').join('')
    +'</div></div>';
  }).join('');
}

function addAchievementM(){
  window._achEdit={isNew:true};
  renderAchievementForm();
}

function editAchievementM(id){
  const a=(DB.get('teacher_achievements')||[]).find(x=>x.id===id);if(!a)return;
  window._achEdit={isNew:false,id,...JSON.parse(JSON.stringify(a))};
  renderAchievementForm();
}

function renderAchievementForm(){
  const data=window._achEdit;
  openM('<div class="mh"><h3>🏆 '+(data.isNew?'Link New':'Edit')+' Achievement File</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2">'
  +'<div class="al ai">📋 Upload the teacher\'s achievement file to <strong>Google Drive</strong> first (set sharing to "Anyone with the link can view"), then paste the share link below.</div>'
  +'<div class="fg"><label>Teacher *</label>'+tchSearchWidget('ach-tch-i','ach-tch-d','pickAchTch')+'<input type="hidden" id="ach-tch-id" value="'+(data.teacherId||'')+'"><input type="hidden" id="ach-tch-name" value="'+esc(data.teacherName||'')+'">'+(data.teacherName?'<div id="ach-tch-info" class="al ai" style="margin-top:6px;margin-bottom:0;padding:7px 10px"><strong>'+esc(data.teacherName)+'</strong>'+(data.teacherSubject?' — '+esc(data.teacherSubject):'')+'</div>':'<div id="ach-tch-info"></div>')+'</div>'
  +'<div class="fg"><label>Title / Label (optional)</label><input id="ach-title" value="'+esc(data.title||'')+'" placeholder="e.g. Achievements 2024, Awards Folder"></div>'
  +'<div class="fg" style="margin-bottom:0"><label>Google Drive Link *</label><input id="ach-link" value="'+esc(data.driveLink||'')+'" placeholder="https://drive.google.com/..." style="font-family:\'JetBrains Mono\',monospace;font-size:11px"><div style="font-size:10px;color:var(--tx3);margin-top:4px">Make sure the file or folder is shared with "Anyone with the link can view".</div></div>'
  +'</div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="saveAchievement()">💾 '+(data.isNew?'Link File':'Update')+' →</button></div>',true);
  window.pickAchTch=function(tid){
    const t=(DB.get('teachers')||[]).find(x=>x.id===tid);if(!t)return;
    document.getElementById('ach-tch-i').value=t.name;
    document.getElementById('ach-tch-id').value=t.id;
    document.getElementById('ach-tch-name').value=t.name;
    document.getElementById('ach-tch-d').style.display='none';
    const info=document.getElementById('ach-tch-info');
    if(info){info.className='al ai';info.style.cssText='margin-top:6px;margin-bottom:0;padding:7px 10px';info.innerHTML='✓ <strong>'+esc(t.name)+'</strong>'+(t.subject?' — '+esc(t.subject):'')+(t.department?' · '+esc(t.department):'');}
    window._achEdit.teacherId=t.id;
    window._achEdit.teacherName=t.name;
    window._achEdit.teacherSubject=t.subject||'';
  };
}

function saveAchievement(){
  const data=window._achEdit;
  const tid=document.getElementById('ach-tch-id').value;
  const tname=document.getElementById('ach-tch-name').value.trim()||document.getElementById('ach-tch-i').value.trim();
  const link=document.getElementById('ach-link').value.trim();
  if(!tname){toast('Select a teacher','danger');return;}
  if(!link){toast('Google Drive link is required','danger');return;}
  if(!/^https?:\/\//i.test(link)){toast('Link must start with http:// or https://','danger');return;}
  
  const list=DB.get('teacher_achievements')||[];
  const rec={
    teacherId:tid||null,
    teacherName:tname,
    teacherSubject:data.teacherSubject||'',
    title:document.getElementById('ach-title').value.trim(),
    driveLink:link,
    addedBy:CU.id,
    addedByName:CU.firstName+' '+CU.lastName,
    addedByRole:rL(CU.role),
  };
  if(data.isNew){
    list.push({id:nid('ach'),...rec,created:new Date().toISOString()});
    logA('Linked achievement file for '+tname);
    toast('Achievement file linked','success');
  }else{
    const i=list.findIndex(a=>a.id===data.id);if(i>=0){list[i]={...list[i],...rec,updated:new Date().toISOString()};
    logA('Updated achievement link for '+tname);
    toast('Updated','success');}
  }
  DB.set('teacher_achievements',list);
  closeM();rTeacherAchievements();
}

function delAchievement(id){
  if(!confirm('Remove this achievement link?'))return;
  DB.set('teacher_achievements',(DB.get('teacher_achievements')||[]).filter(a=>a.id!==id));
  logA('Removed teacher achievement link');
  toast('Removed','danger');rTeacherAchievements();
}

function genPickupQR(p){
  const payload={
    type:'EARLY_PICKUP',
    student:p.studentName,
    grade:p.grade,
    guardian:p.guardianName,
    guardianPhone:p.guardianPhone,
    pickedBy:p.pickedBy||'',
    pickedByName:p.pickedByName||'',
    pickedByPhone:p.pickedByPhone||'',
    pickedById:p.pickedById||'',
    reason:p.reason,
    pickupTime:p.pickupTime,
    status:p.status,
    handledBy:p.handledBy||'',
    issuedAt:p.qrIssuedAt||new Date().toISOString(),
    ref:p.id
  };
  const data=JSON.stringify(payload);
  return'https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=10&data='+encodeURIComponent(data);
}

  const p=(DB.get('early_pickups')||[]).find(x=>x.id===id);if(!p)return;

    if(i>=0){list[i].qrIssuedAt=new Date().toISOString();DB.set('early_pickups',list);p.qrIssuedAt=list[i].qrIssuedAt;}
  }
  const settings=DB.get('settings')||{};
  const qrUrl=genPickupQR(p);
  const lgUrl=qrUrl.replace('size=300x300','size=600x600').replace('margin=10','margin=20');
  // Build payload preview for "extract data" view
  const payload={
    type:'EARLY_PICKUP',
    student:p.studentName,grade:p.grade,
    guardian:p.guardianName,guardianPhone:p.guardianPhone,
    pickedBy:p.pickedBy||'',pickedByName:p.pickedByName||'',pickedByPhone:p.pickedByPhone||'',pickedById:p.pickedById||'',
    reason:p.reason,pickupTime:p.pickupTime,
    status:p.status,handledBy:p.handledBy||'',
    issuedAt:p.qrIssuedAt,ref:p.id
  };
  const payloadJson=JSON.stringify(payload,null,2);
  openM('<div class="mh"><h3>📱 Early Pickup QR Slip</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2">'
  +'<div class="al ai">🔒 Show this QR to the gate guard. Scanning it will display the verified pickup details. Click <strong>"Show Data"</strong> below to see the encoded information directly.</div>'
  +'<div id="puqr-printable" style="background:#fff;color:#000;padding:18px;border-radius:8px;text-align:center;border:2px dashed #1a5f7a">'+(()=>{const l=settings.logo||'🎓';return l.startsWith&&l.startsWith('data:')?'<img src="'+l+'" style="width:48px;height:48px;object-fit:contain;border-radius:6px;margin-bottom:5px">':'<div style="font-size:36px;margin-bottom:3px">'+l+'</div>';})()+'<div style="font-size:15px;font-weight:bold;color:#1a5f7a;margin-bottom:3px">'+esc(settings.schoolName||'School')+'</div><div style="font-size:11px;color:#555;margin-bottom:14px">EARLY PICKUP AUTHORIZATION</div><img src="'+qrUrl+'" alt="Pickup QR" style="width:240px;height:240px;border:1px solid #ddd;border-radius:6px"><div style="margin-top:14px;text-align:left;font-size:12px;line-height:1.7;border-top:1px solid #eee;padding-top:11px;color:#000"><div><strong>Student:</strong> '+esc(p.studentName)+'</div><div><strong>Grade:</strong> '+esc(p.grade||'')+'</div><div><strong>Guardian:</strong> '+esc(p.guardianName)+' <span style="color:#555">('+esc(p.guardianPhone||'')+')</span></div>'+(p.pickedBy?'<div style="background:#fef3c7;padding:6px 8px;border-radius:4px;margin:5px 0;border-left:3px solid #d97706;color:#000"><strong>👤 Picked Up By:</strong> '+esc(p.pickedBy==='Father'||p.pickedBy==='Mother'?p.pickedBy+' ('+(p.guardianName||'')+')':p.pickedBy+(p.pickedByName?' — '+p.pickedByName:''))+(p.pickedByPhone&&p.pickedBy!=='Father'&&p.pickedBy!=='Mother'?' <span style="color:#555">('+esc(p.pickedByPhone)+')</span>':'')+(p.pickedById?'<br><span style="font-size:10px;color:#555">🆔 ID: '+esc(p.pickedById)+'</span>':'')+'</div>':'')+'<div><strong>Reason:</strong> '+esc(p.reason||'')+'</div><div><strong>Pickup Time:</strong> '+esc(p.pickupTime||'')+'</div><div><strong>Status:</strong> <span style="color:'+(p.status==='Student Released'?'#10a169':'#dd6b20')+';font-weight:bold">'+esc(p.status)+'</span></div>'+(p.handledBy?'<div><strong>Authorized by:</strong> '+esc(p.handledBy)+'</div>':'')+'<div style="font-size:10px;color:#888;margin-top:6px;border-top:1px dashed #ccc;padding-top:5px">Ref: '+p.id+' · Issued: '+new Date(p.qrIssuedAt).toLocaleString()+'</div></div></div>'
  +'<div style="margin-top:13px"><button class="btn bg2 bsm" onclick="togglePQRData()" style="width:100%" id="pqr-toggle">🔍 Show Encoded QR Data</button><div id="pqr-data" style="display:none;margin-top:9px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);padding:10px"><div style="font-size:10px;color:var(--tx3);margin-bottom:6px;text-transform:uppercase;font-weight:600">📋 Data Encoded in This QR</div><pre style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:var(--tx);background:var(--sf);padding:10px;border-radius:var(--rs);overflow-x:auto;margin:0;white-space:pre-wrap;line-height:1.5">'+esc(payloadJson)+'</pre><button class="btn bg2 bxs" onclick="copyPQRData()" style="margin-top:7px">📋 Copy JSON</button></div></div>'
  +'</div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('close')+'</button><button class="btn bg2 bsm" onclick="printPickupQR()">🖨️ Print Slip</button><a href="'+lgUrl+'" download="pickup_'+p.id+'.png" class="btn bp bsm" style="text-decoration:none">⬇️ Download QR</a></div>',true);
  window._pqrData=payloadJson;
}

function togglePQRData(){
  const d=document.getElementById('pqr-data'),b=document.getElementById('pqr-toggle');
  if(!d||!b)return;
  if(d.style.display==='none'){d.style.display='block';b.innerHTML='🔼 Hide Encoded QR Data';}
  else{d.style.display='none';b.innerHTML='🔍 Show Encoded QR Data';}
}

function copyPQRData(){
  if(!window._pqrData)return;
  navigator.clipboard.writeText(window._pqrData).then(()=>{toast('Copied to clipboard','success');},()=>{toast('Copy failed — select & copy manually','danger');});
}

function printPickupQR(){
  const node=document.getElementById('puqr-printable');if(!node)return;
  const w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><title>Pickup Slip</title><style>@page{size:A5;margin:10mm}body{font-family:Arial,sans-serif;margin:0;padding:14px}@media print{button{display:none}}</style></head><body>'+node.outerHTML+'<button onclick="window.print()" style="margin-top:14px;padding:8px 16px;background:#1a5f7a;color:#fff;border:none;border-radius:4px;cursor:pointer">🖨️ Print</button></body></html>');
  w.document.close();
  setTimeout(()=>{try{w.print();}catch(e){}},500);
}

function rExamAbsent(){
  const abs=DB.get('exam_absents')||[];
  const canC=['admin_assistant','superadmin','principal','vice_principal','academic_supervisor'].includes(CU.role);
  const canV=['superadmin','principal','vice_principal','academic_supervisor','student_advisor','admin_assistant','quality_incharge'].includes(CU.role);
  if(!canV){document.getElementById('pc').innerHTML='<div class="emp"><div class="ei">🔒</div><p>Access restricted</p></div>';return;}
  
  const uniqueStudents=new Set(abs.map(a=>a.studentId||a.studentName)).size;
  const uniqueSubjects=new Set(abs.map(a=>a.subject)).size;
  
  document.getElementById('pc').innerHTML='<div class="card" style="margin-bottom:12px"><div class="sh2"><h3>📵 '+T('exam_absent')+' ('+abs.length+')</h3><div style="display:flex;gap:5px;flex-wrap:wrap"><button class="btn bg2 bsm" onclick="expAbsC()">📊 CSV</button><button class="btn bg2 bsm" onclick="expAbsP()">📄 PDF</button>'+(canC?'<button class="btn bp bsm" onclick="addAbsM()">+ Add</button>':'')+'</div></div></div>'
  +'<div class="cg g4" style="margin-bottom:13px"><div class="stat bl"><div class="sl2">Total Absences</div><div class="sv">'+abs.length+'</div><div class="sic">📵</div></div><div class="stat go"><div class="sl2">Affected Students</div><div class="sv">'+uniqueStudents+'</div><div class="sic">👥</div></div><div class="stat gn"><div class="sl2">Subjects</div><div class="sv">'+uniqueSubjects+'</div><div class="sic">📚</div></div><div class="stat rd"><div class="sl2">Multi-Subject</div><div class="sv">'+countMultiSubject(abs)+'</div><div class="sb3">2+ subjects</div><div class="sic">⚠️</div></div></div>'
  +'<div class="card" style="margin-bottom:12px"><div style="display:flex;gap:5px;flex-wrap:wrap"><button id="abv-list" class="btn bp bsm" onclick="absView(\'list\')">📋 List View</button><button id="abv-stu" class="btn bg2 bsm" onclick="absView(\'student\')">👨‍🎓 Group by Student</button><button id="abv-sub" class="btn bg2 bsm" onclick="absView(\'subject\')">📚 Group by Subject</button></div></div>'
  +'<div id="absview"></div>';
  
  if(!window._absMode)window._absMode='list';
  absView(window._absMode);
}

function countMultiSubject(abs){
  const map={};
  abs.forEach(a=>{const k=a.studentId||a.studentName;if(!map[k])map[k]=new Set();map[k].add(a.subject);});
  return Object.values(map).filter(s=>s.size>=2).length;
}

function absView(mode){
  window._absMode=mode;
  ['list','stu','sub'].forEach(k=>{const b=document.getElementById('abv-'+k);if(b)b.className=b.className.replace('bp','bg2');});
  const activeKey=mode==='list'?'list':mode==='student'?'stu':'sub';
  const activeBtn=document.getElementById('abv-'+activeKey);if(activeBtn)activeBtn.className=activeBtn.className.replace('bg2','bp');
  
  if(mode==='list')renderAbsList();
  else if(mode==='student')renderAbsByStudent();
  else if(mode==='subject')renderAbsBySubject();
}

function renderAbsList(){
  const abs=DB.get('exam_absents')||[];
  document.getElementById('absview').innerHTML='<div class="card"><div style="display:flex;gap:8px;margin-bottom:12px"><input id="absq" placeholder="🔍 Search by student name, subject, or grade…" oninput="fltAbsList()" style="flex:1;padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px"></div><div id="absw">'+bAbsTbl(abs)+'</div></div>';
  window.fltAbsList=function(){
    const q=document.getElementById('absq').value.toLowerCase();
    const list=q?(DB.get('exam_absents')||[]).filter(a=>(a.studentName+' '+a.subject+' '+(a.grade||'')+'-'+(a.section||'')).toLowerCase().includes(q)):(DB.get('exam_absents')||[]);
    document.getElementById('absw').innerHTML=bAbsTbl(list);
  };
}

function bAbsTbl(list){
  if(!list.length)return'<div class="emp"><div class="ei">📵</div><p>'+T('no_records')+'</p></div>';
  const isQI=CU.role==='quality_incharge';
  return'<div class="tw"><table><thead><tr><th>Student</th><th>'+T('grade')+'</th><th>'+T('exam_subject')+'</th><th>'+T('absent_date')+'</th><th>'+T('remarks')+'</th><th>Added By</th>'+(isQI?'':'<th>Actions</th>')+'</tr></thead><tbody>'+list.slice().reverse().map(a=>'<tr><td><strong>'+esc(a.studentName)+'</strong></td><td>'+(a.grade||'')+(a.section||'')+'</td><td><span class="badge brd">'+esc(a.subject)+'</span></td><td class="mono" style="font-size:11px">'+esc(a.absentDate)+'</td><td style="font-size:11px;color:var(--tx2)">'+esc(a.remarks||'—')+'</td><td style="font-size:11px;color:var(--tx3)">'+esc(a.addedBy||'')+'</td>'+(isQI?'':'<td><button class="btn bd3 bxs" onclick="delAbs(\''+a.id+'\')">Del</button></td>')+'</td></tr>').join('')+'</tbody></table></div>';
}

function renderAbsByStudent(){
  const abs=DB.get('exam_absents')||[];
  const map={};
  abs.forEach(a=>{
    const k=a.studentId||a.studentName;
    if(!map[k])map[k]={studentId:a.studentId,studentName:a.studentName,grade:a.grade,section:a.section,records:[]};
    map[k].records.push(a);
  });
  const students=Object.values(map).sort((a,b)=>a.studentName.localeCompare(b.studentName));
  document.getElementById('absview').innerHTML='<div class="card"><div style="display:flex;gap:8px;margin-bottom:12px"><input id="absq2" placeholder="🔍 Search by student name…" oninput="fltAbsStu()" style="flex:1;padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px"></div><div style="font-size:11px;color:var(--tx3);margin-bottom:9px">📊 '+students.length+' student(s) absent. Each row shows all subjects that student missed.</div><div id="absstuw">'+buildAbsByStudentTbl(students)+'</div></div>';
  window.fltAbsStu=function(){
    const q=document.getElementById('absq2').value.toLowerCase();
    const filtered=q?students.filter(s=>s.studentName.toLowerCase().includes(q)):students;
    document.getElementById('absstuw').innerHTML=buildAbsByStudentTbl(filtered);
  };
}

function buildAbsByStudentTbl(students){
  if(!students.length)return'<div class="emp"><div class="ei">📵</div><p>No absences recorded</p></div>';
  return'<div class="tw"><table><thead><tr><th>Student</th><th>Class</th><th>Subjects Missed</th><th>Total</th><th>Latest Date</th><th>Actions</th></tr></thead><tbody>'+students.map(s=>{
    const subjects=[...new Set(s.records.map(r=>r.subject))];
    const latestDate=s.records.map(r=>r.absentDate||'').sort().slice(-1)[0]||'—';
    return'<tr><td><strong>'+esc(s.studentName)+'</strong></td><td>'+(s.grade||'')+(s.section||'')+'</td><td><div style="display:flex;gap:4px;flex-wrap:wrap;max-width:380px">'+subjects.map(sj=>'<span class="badge brd">'+esc(sj)+'</span>').join('')+'</div></td><td><span class="badge bpu">'+s.records.length+' absence'+(s.records.length!==1?'s':'')+'</span></td><td class="mono" style="font-size:11px">'+esc(latestDate)+'</td><td><button class="btn bg2 bxs" onclick="vAbsByStu(\''+esc(s.studentId||'').replace(/\'/g,"\\'")+'\',\''+esc(s.studentName).replace(/\'/g,"\\'")+'\')">Details</button></td></tr>';
  }).join('')+'</tbody></table></div>';
}

function vAbsByStu(sid,sname){
  const abs=(DB.get('exam_absents')||[]).filter(a=>(sid&&a.studentId===sid)||a.studentName===sname);
  if(!abs.length)return;
  const sample=abs[0];
  openM('<div class="mh"><h3>📵 Absences — '+esc(sname)+'</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2">'
  +'<div class="al ai">📊 <strong>'+sname+'</strong> (Grade '+(sample.grade||'')+(sample.section||'')+') has <strong>'+abs.length+'</strong> exam absence(s) across <strong>'+(new Set(abs.map(a=>a.subject))).size+'</strong> subject(s).</div>'
  +'<div class="tw"><table><thead><tr><th>Subject</th><th>Date</th><th>Remarks</th><th>Added By</th></tr></thead><tbody>'+abs.slice().sort((a,b)=>(b.absentDate||'').localeCompare(a.absentDate||'')).map(a=>'<tr><td><span class="badge brd">'+esc(a.subject)+'</span></td><td class="mono" style="font-size:11px">'+esc(a.absentDate)+'</td><td style="font-size:11px;color:var(--tx2)">'+esc(a.remarks||'—')+'</td><td style="font-size:11px;color:var(--tx3)">'+esc(a.addedBy||'')+'</td></tr>').join('')+'</tbody></table></div>'
  +'</div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('close')+'</button></div>',true);
}

function renderAbsBySubject(){
  const abs=DB.get('exam_absents')||[];
  const subjects=[...new Set(abs.map(a=>a.subject))].sort();
  document.getElementById('absview').innerHTML='<div class="card"><div style="display:flex;gap:8px;margin-bottom:12px"><select id="abssubj" onchange="fltAbsSub()" style="flex:1;padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px"><option value="">— Select a subject to see all absent students —</option>'+subjects.map(s=>'<option>'+esc(s)+'</option>').join('')+'</select></div><div id="abssubw">'+buildSubjectsList(abs,subjects)+'</div></div>';
  window.fltAbsSub=function(){
    const sj=document.getElementById('abssubj').value;
    if(!sj){document.getElementById('abssubw').innerHTML=buildSubjectsList(abs,subjects);return;}
    const filtered=abs.filter(a=>a.subject===sj);
    document.getElementById('abssubw').innerHTML=buildAbsBySubjectDetail(sj,filtered);
  };
}

function buildSubjectsList(abs,subjects){
  if(!subjects.length)return'<div class="emp"><div class="ei">📚</div><p>No subjects recorded</p></div>';
  return'<div style="font-size:11px;color:var(--tx3);margin-bottom:9px">📚 '+subjects.length+' subject(s) with absences. Click below or use the dropdown.</div><div style="display:flex;gap:7px;flex-wrap:wrap">'+subjects.map(sj=>{
    const count=abs.filter(a=>a.subject===sj).length;
    return'<button class="btn bg2 bsm" onclick="document.getElementById(\'abssubj\').value=\''+esc(sj).replace(/\'/g,"\\'")+'\';fltAbsSub()"><strong>'+esc(sj)+'</strong> <span style="background:var(--ac);color:#fff;padding:2px 7px;border-radius:9px;margin-left:5px;font-size:10px">'+count+'</span></button>';
  }).join('')+'</div>';
}

function buildAbsBySubjectDetail(subject,filtered){
  if(!filtered.length)return'<div class="emp"><p>No absences for this subject</p></div>';
  const studentMap={};
  filtered.forEach(a=>{const k=a.studentId||a.studentName;if(!studentMap[k])studentMap[k]={...a,dates:[]};studentMap[k].dates.push(a.absentDate);});
  const studentRows=Object.values(studentMap);
  return'<div class="al aw" style="margin-bottom:12px"><strong>📚 '+esc(subject)+':</strong> '+studentRows.length+' student(s) absent · '+filtered.length+' record(s)</div>'
  +'<div class="tw"><table><thead><tr><th>Student</th><th>Class</th><th>Date(s) Absent</th><th>Remarks</th></tr></thead><tbody>'+studentRows.map(s=>{
    const recs=filtered.filter(a=>(a.studentId&&a.studentId===s.studentId)||a.studentName===s.studentName);
    return'<tr><td><strong>'+esc(s.studentName)+'</strong></td><td>'+(s.grade||'')+(s.section||'')+'</td><td>'+recs.map(r=>'<span class="mono" style="font-size:11px;display:inline-block;background:var(--sf2);padding:2px 7px;border-radius:6px;margin:1px">'+esc(r.absentDate)+'</span>').join('')+'</td><td style="font-size:11px;color:var(--tx2)">'+recs.map(r=>esc(r.remarks||'—')).filter(r=>r!=='—').join('; ')+'</td></tr>';
  }).join('')+'</tbody></table></div>';
}

// RE-EXAM SCHEDULE — One schedule per student listing all subjects
// they were absent in, with a re-exam date/time per subject.
// Shareable as PDF with the parent (one student, one PDF).
// ═══════════════════════════════════════════════════════════

function rReexam(){
  const canEdit=['academic_supervisor','admin_assistant','superadmin'].includes(CU.role);
  const canShare=['admin_assistant','superadmin','principal','academic_supervisor'].includes(CU.role);
  const canView=canEdit||['principal','vice_principal','student_advisor'].includes(CU.role);
  if(!canView){document.getElementById('pc').innerHTML='<div class="emp"><div class="ei">🔒</div><p>Access restricted</p></div>';return;}
  
  const list=DB.get('reexam_schedules')||[];
  
  document.getElementById('pc').innerHTML='<div class="card" style="margin-bottom:12px"><div class="sh2"><h3>📝 '+T('reexam_schedule')+' ('+list.length+')</h3>'+(canEdit?'<button class="btn bp bsm" onclick="addReexamM()">+ New Schedule for Student</button>':'')+'</div><div style="font-size:11px;color:var(--tx3);margin-top:4px">Build a personalized re-exam schedule for each absent student listing every subject they missed and the new exam date for each.</div></div>'
  
  // View tabs: List | By Date
  +'<div class="card" style="margin-bottom:12px"><div style="display:flex;gap:5px;flex-wrap:wrap"><button id="rxv-list" class="btn bp bsm" onclick="reexView(\'list\')">📋 All Schedules</button><button id="rxv-date" class="btn bg2 bsm" onclick="reexView(\'date\')">📅 By Exam Date</button></div></div>'
  +'<div id="rexview"></div>';
  
  if(!window._rexMode)window._rexMode='list';
  reexView(window._rexMode);
}

function reexView(mode){
  window._rexMode=mode;
  ['list','date'].forEach(k=>{const b=document.getElementById('rxv-'+k);if(b)b.className=b.className.replace('bp','bg2');});
  const a=document.getElementById('rxv-'+mode);if(a)a.className=a.className.replace('bg2','bp');
  if(mode==='list')renderRexList();
  else renderRexByDate();
}

function renderRexList(){
  const list=DB.get('reexam_schedules')||[];
  const canEdit=['academic_supervisor','admin_assistant','superadmin'].includes(CU.role);
  const canShare=['admin_assistant','superadmin','principal','academic_supervisor'].includes(CU.role);
  document.getElementById('rexview').innerHTML='<div class="card"><div style="display:flex;gap:8px;margin-bottom:12px"><input id="rexq" placeholder="🔍 Search by student name…" oninput="fltRexList()" style="flex:1;padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px"></div><div id="rexlistw">'+buildRexList(list,canEdit,canShare)+'</div></div>';
  window.fltRexList=function(){
    const q=document.getElementById('rexq').value.toLowerCase();
    const filtered=q?list.filter(r=>r.studentName.toLowerCase().includes(q)):list;
    document.getElementById('rexlistw').innerHTML=buildRexList(filtered,canEdit,canShare);
  };
}

function buildRexList(list,canEdit,canShare){
  if(!list.length)return'<div class="emp"><div class="ei">📝</div><p>No re-exam schedules created yet</p></div>';
  return'<div class="tw"><table><thead><tr><th>Student</th><th>Class</th><th>Subjects</th><th>Earliest Date</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead><tbody>'+list.slice().reverse().map(r=>{
    const subjs=(r.subjects||[]);
    const dates=subjs.map(s=>s.examDate||'').filter(d=>d).sort();
    const earliest=dates[0]||'—';
    return'<tr><td><strong>'+esc(r.studentName)+'</strong></td><td>'+(r.grade||'')+(r.section||'')+'</td><td><div style="display:flex;gap:3px;flex-wrap:wrap">'+subjs.map(s=>'<span class="badge brd" title="'+esc(s.examDate||'no date')+'">'+esc(s.subject)+'</span>').join('')+' <span style="color:var(--tx3);font-size:10px">('+subjs.length+')</span></div></td><td class="mono" style="font-size:11px">'+esc(earliest)+'</td><td><span class="badge '+(r.status==='Completed'?'bgn':r.status==='In Progress'?'bbl':'bgo')+'">'+(r.status||'Scheduled')+'</span></td><td style="font-size:10px;color:var(--tx3)">'+(r.created||'').split('T')[0]+'<br>'+esc(r.createdByName||'—')+'</td><td style="display:flex;gap:4px;flex-wrap:wrap"><button class="btn bg2 bxs" onclick="vReexam(\''+r.id+'\')">View</button><button class="btn bg2 bxs" onclick="expReexamPDF(\''+r.id+'\')">📄</button>'+(canShare?'<button class="btn bp bxs" onclick="shareReexamWA(\''+r.id+'\')">📱 WA</button>':'')+(canEdit?'<button class="btn bp bxs" onclick="editReexamM(\''+r.id+'\')">Edit</button><button class="btn bd3 bxs" onclick="delReexam(\''+r.id+'\')">Del</button>':'')+'</td></tr>';
  }).join('')+'</tbody></table></div>';
}

function renderRexByDate(){
  const list=DB.get('reexam_schedules')||[];
  // Build flat list: each row = one student + one subject + one date
  const rows=[];
  list.forEach(r=>{(r.subjects||[]).forEach(s=>{
    if(s.examDate)rows.push({scheduleId:r.id,studentName:r.studentName,grade:r.grade,section:r.section,subject:s.subject,examDate:s.examDate,startTime:s.startTime,endTime:s.endTime,venue:s.venue,invigilator:s.invigilator,status:r.status});
  });});
  // Get all unique dates
  const allDates=[...new Set(rows.map(r=>r.examDate))].sort();
  document.getElementById('rexview').innerHTML='<div class="card"><div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap"><label style="font-size:12px;font-weight:600">📅 Pick exam date:</label><input type="date" id="rexdate" onchange="fltRexDate()" value="'+(allDates[0]||'')+'" style="padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px">'+(allDates.length?'<span style="font-size:11px;color:var(--tx3)">('+allDates.length+' date(s) with scheduled exams)</span>':'')+'</div>'
  +(allDates.length?'<div style="margin-bottom:11px"><div style="font-size:11px;color:var(--tx3);margin-bottom:5px">Quick pick:</div><div style="display:flex;gap:5px;flex-wrap:wrap">'+allDates.map(d=>{const c=rows.filter(r=>r.examDate===d).length;return'<button class="btn bg2 bxs" onclick="document.getElementById(\'rexdate\').value=\''+d+'\';fltRexDate()">'+d+' <span style="background:var(--ac);color:#fff;padding:1px 6px;border-radius:8px;margin-left:4px">'+c+'</span></button>';}).join('')+'</div></div>':'')
  +'<div id="rexdatew">'+buildRexByDateTbl(rows,allDates[0]||'')+'</div></div>';
  window.fltRexDate=function(){
    const d=document.getElementById('rexdate').value;
    document.getElementById('rexdatew').innerHTML=buildRexByDateTbl(rows,d);
  };
}

function buildRexByDateTbl(rows,date){
  if(!date)return'<div class="emp"><p style="font-size:12px">Select a date above</p></div>';
  const filtered=rows.filter(r=>r.examDate===date).sort((a,b)=>(a.startTime||'').localeCompare(b.startTime||''));
  if(!filtered.length)return'<div class="emp"><p style="font-size:12px">No re-exams scheduled on '+esc(date)+'</p></div>';
  return'<div class="al aw" style="margin-bottom:11px"><strong>📅 '+esc(date)+':</strong> '+filtered.length+' student-subject combination(s) scheduled</div>'
  +'<div class="tw"><table><thead><tr><th>Student</th><th>Class</th><th>Subject</th><th>Time</th><th>Venue</th><th>Invigilator</th><th>Action</th></tr></thead><tbody>'+filtered.map(r=>'<tr><td><strong>'+esc(r.studentName)+'</strong></td><td>'+(r.grade||'')+(r.section||'')+'</td><td><span class="badge brd">'+esc(r.subject)+'</span></td><td class="mono" style="font-size:11px">'+esc(r.startTime||'—')+(r.endTime?' - '+esc(r.endTime):'')+'</td><td style="font-size:11px">'+esc(r.venue||'—')+'</td><td style="font-size:11px">'+esc(r.invigilator||'—')+'</td><td><button class="btn bg2 bxs" onclick="vReexam(\''+r.scheduleId+'\')">View</button></td></tr>').join('')+'</tbody></table></div>';
}

// ─── Add / Edit form ─────────────────────────────────────────

function addReexamM(){
  // Build map of absent students with their subjects
  const abs=DB.get('exam_absents')||[];
  if(!abs.length){toast('No exam absences recorded yet — record absences first','danger');return;}
  // Find existing schedules to avoid duplicates? Just allow — supervisor can always edit.
  window._rexEdit={isNew:true,subjects:[]};
  renderReexamForm();
}

function editReexamM(id){
  const r=(DB.get('reexam_schedules')||[]).find(x=>x.id===id);if(!r)return;
  window._rexEdit={isNew:false,id,...JSON.parse(JSON.stringify(r))};
  renderReexamForm();
}

function renderReexamForm(){
  const data=window._rexEdit;
  // Build list of students with absences
  const abs=DB.get('exam_absents')||[];
  const stuMap={};
  abs.forEach(a=>{
    const k=a.studentId||a.studentName;
    if(!stuMap[k])stuMap[k]={studentId:a.studentId,studentName:a.studentName,grade:a.grade,section:a.section,subjects:{}};
    if(!stuMap[k].subjects[a.subject])stuMap[k].subjects[a.subject]={subject:a.subject,absentDates:[]};
    stuMap[k].subjects[a.subject].absentDates.push(a.absentDate);
  });
  const absentStudents=Object.values(stuMap).sort((a,b)=>a.studentName.localeCompare(b.studentName));
  
  // For the chosen student, build the subjects list
  const chosenStu=data.studentName?absentStudents.find(s=>(data.studentId&&s.studentId===data.studentId)||s.studentName===data.studentName):null;
  const stuSubjects=chosenStu?Object.values(chosenStu.subjects):[];
  
  // Map existing chosen subjects to data.subjects rows (to preserve dates already set)
  const existingMap={};(data.subjects||[]).forEach(s=>{existingMap[s.subject]=s;});
  
  openM('<div class="mh"><h3>📝 '+(data.isNew?'New':'Edit')+' Re-exam Schedule</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2">'
  +'<div class="al ai">📋 Pick an absent student. The form will load every subject they were absent in. For each subject, set a re-exam date, time, and venue.</div>'
  
  // Step 1: Student picker (autocomplete from absent students only)
  +'<div style="background:var(--sf2);border-radius:var(--r);padding:12px;margin-bottom:12px;border-left:4px solid var(--ac)"><div style="font-size:11px;font-weight:700;color:var(--ac);text-transform:uppercase;margin-bottom:7px">Step 1 · Select Absent Student</div>'
  +(data.isNew?'<div class="fg" style="margin-bottom:0"><label>Student * <span style="font-weight:400;color:var(--tx3);font-size:10px">(only students with recorded absences)</span></label><div style="position:relative"><input id="rex-stu-i" value="'+esc(data.studentName||'')+'" placeholder="🔍 Type student name…" autocomplete="off" oninput="rexStuSearch(this.value)" onblur="setTimeout(()=>{const d=document.getElementById(\'rex-stu-d\');if(d)d.style.display=\'none\'},250)" style="width:100%;padding:9px 11px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px"><div id="rex-stu-d" class="sd"></div></div>'+(chosenStu?'<div class="al ag" style="margin-top:8px;margin-bottom:0;padding:7px 10px">✓ <strong>'+esc(chosenStu.studentName)+'</strong> — Grade '+esc(chosenStu.grade||'')+esc(chosenStu.section||'')+' · '+stuSubjects.length+' subject(s) absent</div>':'')+'</div>':'<div class="al ag" style="margin-bottom:0;padding:7px 10px">Editing schedule for: <strong>'+esc(data.studentName)+'</strong> — Grade '+esc(data.grade||'')+esc(data.section||'')+'</div>')
  +'</div>'
  
  // Step 2: Per-subject re-exam date/time
  +'<div style="background:var(--sf2);border-radius:var(--r);padding:12px;margin-bottom:12px;border-left:4px solid var(--gd)"><div style="font-size:11px;font-weight:700;color:var(--gd);text-transform:uppercase;margin-bottom:9px">Step 2 · Set Re-exam Date for Each Subject</div>'
  +(chosenStu||(!data.isNew&&data.subjects&&data.subjects.length)?(()=>{
    // Use data.subjects if editing, or chosen student's subjects if creating
    const subjects=data.isNew?stuSubjects:(data.subjects||[]);
    if(!subjects.length)return'<div style="font-size:11px;color:var(--tx3);padding:9px;text-align:center">No subjects to schedule</div>';
    return subjects.map((s,idx)=>{
      const existing=existingMap[s.subject]||s;
      const absentDates=s.absentDates||(existing.absentDates||[]);
      return'<div style="background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:5px"><div><strong style="color:var(--ac);font-size:13px">📚 '+esc(s.subject)+'</strong> '+(absentDates.length?'<span style="font-size:10px;color:var(--tx3)">(was absent: '+absentDates.map(d=>esc(d)).join(', ')+')</span>':'')+'</div></div><div class="fr f3" style="margin-bottom:8px"><div class="fg" style="margin-bottom:0"><label>Re-exam Date *</label><input type="date" data-rex-subject="'+esc(s.subject)+'" data-rex-field="examDate" value="'+esc(existing.examDate||'')+'" oninput="updRexSubField(this)"></div><div class="fg" style="margin-bottom:0"><label>Start</label><input type="time" data-rex-subject="'+esc(s.subject)+'" data-rex-field="startTime" value="'+esc(existing.startTime||'')+'" oninput="updRexSubField(this)"></div><div class="fg" style="margin-bottom:0"><label>End</label><input type="time" data-rex-subject="'+esc(s.subject)+'" data-rex-field="endTime" value="'+esc(existing.endTime||'')+'" oninput="updRexSubField(this)"></div></div><div class="fr f2"><div class="fg" style="margin-bottom:0"><label>Venue</label><input data-rex-subject="'+esc(s.subject)+'" data-rex-field="venue" value="'+esc(existing.venue||'')+'" placeholder="e.g. Hall 2, Room 10A" oninput="updRexSubField(this)"></div><div class="fg" style="margin-bottom:0"><label>Invigilator</label><input data-rex-subject="'+esc(s.subject)+'" data-rex-field="invigilator" value="'+esc(existing.invigilator||'')+'" placeholder="Teacher name" oninput="updRexSubField(this)"></div></div></div>';
    }).join('');
  })():'<div style="font-size:11px;color:var(--tx3);text-align:center;padding:9px">⬆️ Pick a student first to see their subjects.</div>')
  +'</div>'
  
  // Status + Notes
  +'<div class="fr f2"><div class="fg"><label>Overall Status</label><select id="rex-status"><option '+(data.status==='Scheduled'||!data.status?'selected':'')+'>Scheduled</option><option '+(data.status==='In Progress'?'selected':'')+'>In Progress</option><option '+(data.status==='Completed'?'selected':'')+'>Completed</option><option '+(data.status==='Postponed'?'selected':'')+'>Postponed</option></select></div><div class="fg"><label>General Notes</label><input id="rex-notes" value="'+esc(data.notes||'')+'" placeholder="Bring calculators, ID card…"></div></div>'
  
  +'</div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="saveReexam()">💾 '+(data.isNew?'Create Schedule':'Save Changes')+' →</button></div>',true);
  
  // Build absent students lookup for autocomplete
  window._rexAbsentStudents=absentStudents;
}

function rexStuSearch(q){
  const d=document.getElementById('rex-stu-d');if(!d)return;
  if(!q.trim()){d.style.display='none';return;}
  const ql=q.toLowerCase();
  const found=(window._rexAbsentStudents||[]).filter(s=>s.studentName.toLowerCase().includes(ql)).slice(0,8);
  if(!found.length){d.style.display='block';d.innerHTML='<div style="padding:9px 12px;font-size:11px;color:var(--tx3)">No student found with that name (in absence records).</div>';return;}
  d.style.display='block';
  d.innerHTML=found.map(s=>{
    const subjCount=Object.keys(s.subjects).length;
    return'<div class="sdi" onmousedown="pickRexStu(\''+esc(s.studentId||'').replace(/\'/g,"\\'")+'\',\''+esc(s.studentName).replace(/\'/g,"\\'")+'\')"><strong>'+esc(s.studentName)+'</strong> <span style="color:var(--tx3);font-size:10px">Gr '+esc(s.grade||'')+esc(s.section||'')+' · '+subjCount+' subject'+(subjCount!==1?'s':'')+'</span></div>';
  }).join('');
}

function pickRexStu(sid,sname){
  const stu=(window._rexAbsentStudents||[]).find(s=>(sid&&s.studentId===sid)||s.studentName===sname);
  if(!stu)return;
  window._rexEdit.studentId=stu.studentId;
  window._rexEdit.studentName=stu.studentName;
  window._rexEdit.grade=stu.grade;
  window._rexEdit.section=stu.section;
  // Initialize subjects array from absences (preserve any already-saved dates)
  const existingMap={};(window._rexEdit.subjects||[]).forEach(s=>{existingMap[s.subject]=s;});
  window._rexEdit.subjects=Object.values(stu.subjects).map(s=>{
    return existingMap[s.subject]||{subject:s.subject,examDate:'',startTime:'',endTime:'',venue:'',invigilator:'',absentDates:s.absentDates};
  });
  renderReexamForm();
}

function updRexSubField(el){
  const subj=el.dataset.rexSubject,field=el.dataset.rexField,val=el.value;
  const data=window._rexEdit;
  if(!data.subjects)data.subjects=[];
  let row=data.subjects.find(s=>s.subject===subj);
  if(!row){row={subject:subj,examDate:'',startTime:'',endTime:'',venue:'',invigilator:''};data.subjects.push(row);}
  row[field]=val;
}

function saveReexam(){
  const data=window._rexEdit;
  if(!data.studentName){toast('Pick a student first','danger');return;}
  if(!data.subjects||!data.subjects.length){toast('No subjects to schedule','danger');return;}
  // Require at least one subject to have an exam date
  const withDates=data.subjects.filter(s=>s.examDate);
  if(!withDates.length){toast('Set a re-exam date for at least one subject','danger');return;}
  data.status=document.getElementById('rex-status').value;
  data.notes=document.getElementById('rex-notes').value.trim();
  
  const list=DB.get('reexam_schedules')||[];
  if(data.isNew){
    list.push({id:nid('rex'),studentId:data.studentId||null,studentName:data.studentName,grade:data.grade||'',section:data.section||'',subjects:data.subjects,status:data.status,notes:data.notes,createdBy:CU.id,createdByName:CU.firstName+' '+CU.lastName,created:new Date().toISOString()});
    logA('Created re-exam schedule for '+data.studentName+' ('+data.subjects.length+' subjects)');
    toast('Re-exam schedule created','success');
  }else{

// ═══════════════════════════════════════════════════════════
// FIREBASE SYNC LAYER
// Wraps DB.set() to push to Firebase Realtime Database.
// Subscribes to all collection changes for live multi-device sync.
// Falls back to pure localStorage if Firebase fails to load.
// ═══════════════════════════════════════════════════════════

// Collections that get synced across devices.
// Session-scoped collections automatically sync ALL their session-suffixed buckets too.
const SYNC_KEYS = [
  'settings','accounts','students','teachers','complaints','tasks','infractions',
  'referrals','class_visits','notebook_checks','activities','activity_reports',
  'early_pickups','announcements','discipline_reports','activity_log','infraction_forms',
  'visit_forms','task_requests','exam_absents','academic_calendar','attendance',
  'student_health','remedial_plans','vp_reports','warning_letters','teacher_achievements','reexam_schedules',
  'sessions','active_session_id','behaviour',
  'schools','recycle_bin','system_appearance','duty_rosters','substitutions'
];

// Helper: is a key a session-scoped storage key like "students_default" or "students_s2024a"?
// We sync these too. Pattern: <scoped_collection>_<sessionId>
function isSessionScopedKey(k){
  if(!Array.isArray(window.SESSION_SCOPED_KEYS||SESSION_SCOPED_KEYS))return false;
  const scopedList=window.SESSION_SCOPED_KEYS||SESSION_SCOPED_KEYS;
  for(const sk of scopedList){
    if(k.startsWith(sk+'_'))return true;
  }
  return false;
}

function shouldSyncKey(k){
  return SYNC_KEYS.includes(k)||isSessionScopedKey(k);
}

// Pages that should auto-refresh when their data changes from another device
const AUTO_REFRESH_MAP = {
  students: ['rStudents'], teachers: ['rTeachers','rTeacherReports','rTeacherAchievements'],
  accounts: ['rAccounts'], complaints: ['rComplaints','rDash'], tasks: ['rTasks','rDash'],
  infractions: ['rInfractions'], referrals: ['rReferrals'], class_visits: ['rClassVisits','rTeacherReports'],
  notebook_checks: ['rNbChecks'], activities: ['rActivities'], activity_reports: ['rActivityReports'],
  early_pickups: ['rPickup'], announcements: ['rAnnouncements','rDash'],
  discipline_reports: ['rDiscipline'], activity_log: ['rActLog','rDash'],
  task_requests: ['rTaskReqs'], exam_absents: ['rExamAbsent'], academic_calendar: ['rCalendar'],
  attendance: ['rAttendance'], student_health: ['rStudentHealth'], remedial_plans: ['rRemedial'],
  vp_reports: ['rVPReports'], warning_letters: ['rWarnings'],
  teacher_achievements: ['rTeacherAchievements'], settings: ['rSettings'],
  reexam_schedules: ['rReexam'],
  duty_rosters: ['rDutyRoster','rMyDuties'], substitutions: ['rSubstitutions','rMyDuties'],
  sessions: ['rSessions'], active_session_id: ['rSessions'],
  recycle_bin: ['rRecycleBin'], schools: ['rSchools']
};

let SYNC_ENABLED = false;
let SYNC_INITIAL_LOAD = false;
let SYNC_ECHO = {}; // remember our own writes so we don't infinite-loop on snapshots

function updateSyncStatus(connected){
  const dot=document.getElementById('syncdot'),txt=document.getElementById('synctext'),ind=document.getElementById('syncind');
  if(!dot||!txt)return;
  if(!window.__FB){dot.style.background='#9aa3b6';txt.textContent='Local';if(ind)ind.title='Firebase not loaded — using local storage only';return;}
  if(connected){dot.style.background='#10a169';txt.textContent='Synced';if(ind)ind.title='Connected to Firebase — changes sync across all devices';}
  else{dot.style.background='#dd6b20';txt.textContent='Offline';if(ind)ind.title='Offline — changes saved locally and will sync when reconnected';}
}

// Wait for Firebase SDK to load (it's async via type=module)
function waitForFirebase(maxMs){
  return new Promise(resolve=>{
    const start=Date.now();
    const check=()=>{
      if(window.__FB&&window.__FB.db){resolve(true);}
      else if(Date.now()-start>maxMs){resolve(false);}
      else{setTimeout(check,80);}
    };
    check();
  });
}

// Pull all collections from Firebase into localStorage on first load
async function syncDownAll(){
  if(!window.__FB)return false;
  const{db,ref,get}=window.__FB;
  try{
    const rootSnap=await get(ref(db,'data'));
    if(rootSnap.exists()){
      const all=rootSnap.val();
      Object.keys(all).forEach(k=>{
        if(shouldSyncKey(k)&&all[k]!==null&&all[k]!==undefined){
          // Firebase stores arrays as objects with numeric keys when sparse — normalize
          let v=all[k];
          if(v&&typeof v==='object'&&!Array.isArray(v)){
            // If all keys are numeric, treat as array
            const keys=Object.keys(v);
            if(keys.length>0&&keys.every(kk=>/^\d+$/.test(kk))){
              const arr=[];keys.sort((a,b)=>+a-+b).forEach(kk=>arr.push(v[kk]));v=arr;
            }
          }
          // Merge backend_admin — keep the NEWER password (by _pwdChangedAt timestamp)
          if(k==='accounts'&&Array.isArray(v)){
            try{
              const localAcc=JSON.parse(localStorage.getItem('sms7_accounts')||'[]');
              const localBA=localAcc.find(a=>a&&a.role==='backend_admin');
              const fbBA=v.find(a=>a&&a.role==='backend_admin');
              if(localBA&&!fbBA){v.unshift(localBA);}
              else if(localBA&&fbBA){
                const localTs=localBA._pwdChangedAt||'';
                const fbTs=fbBA._pwdChangedAt||'';
                if(localTs>fbTs){
                  fbBA.password=localBA.password;
                  fbBA._pwdChangedAt=localTs;
                }
                if(localBA._mustChangePassword&&!fbBA._mustChangePassword&&localTs>=fbTs)fbBA._mustChangePassword=true;
              }
            }catch(e){}
          }
          window.__fbSyncPaused=true;
          localStorage.setItem('sms7_'+k,JSON.stringify(v));
          window.__fbSyncPaused=false;
        }
      });
      console.log('[FB] Initial sync complete — '+Object.keys(all).length+' collections loaded from cloud');
      return true;
    }else{
      console.log('[FB] Empty database — first run. Will upload local data on next write.');
      return false;
    }
  }catch(e){console.error('[FB] Initial sync failed:',e);return false;}
}

// Push entire local DB up to Firebase (used for first-time seeding)
// Push entire local DB up to Firebase (merge, not replace)
// CRITICAL: For each array key, only upload if local has MORE items than Firebase.
// This prevents a fresh device (with just-seeded defaults) from wiping
// the full cloud dataset.
async function syncUpAll(){
  if(!window.__FB)return;
  const{db,ref,update,get}=window.__FB;
  try{
    const data={};
    const rawGet=DB._raw_get||DB.get.bind(DB);
    SYNC_KEYS.forEach(k=>{const v=rawGet(k);if(v!==null&&v!==undefined&&!(Array.isArray(v)&&v.length===0))data[k]=v;});
    for(let i=0;i<localStorage.length;i++){
      const lkey=localStorage.key(i);
      if(!lkey||!lkey.startsWith('sms7_'))continue;
      const k=lkey.substring(5);
      if(isSessionScopedKey(k)){
        const v=rawGet(k);
        if(v!==null&&v!==undefined&&!(Array.isArray(v)&&v.length===0))data[k]=v;
      }
    }
    // SAFETY: for array-typed keys, check Firebase first — if FB has more entries
    // than local, the local copy is stale (probably fresh-seeded). Skip the upload.
    const safeData={};
    for(const k of Object.keys(data)){
      const localVal=data[k];
      if(Array.isArray(localVal)){
        try{
          const snap=await get(ref(db,'data/'+k));
          if(snap.exists()){
            let fbVal=snap.val();
            if(fbVal&&typeof fbVal==='object'&&!Array.isArray(fbVal)){
              const ks=Object.keys(fbVal);
              if(ks.length>0&&ks.every(kk=>/^d+$/.test(kk))){
                const arr=[];ks.sort((a,b)=>+a-+b).forEach(kk=>arr.push(fbVal[kk]));fbVal=arr;
              }else fbVal=Object.values(fbVal);
            }
            if(Array.isArray(fbVal)&&fbVal.length>localVal.length){
              console.log('[FB] Skip upload of "'+k+'" — local has '+localVal.length+' items, cloud has '+fbVal.length);
              continue;
            }
          }
        }catch(e){console.warn('[FB] Pre-upload check failed for '+k+':',e.message);}
      }
      safeData[k]=localVal;
    }
    if(Object.keys(safeData).length){
      await update(ref(db,'data'),safeData);
      console.log('[FB] Bulk upload complete ('+Object.keys(safeData).length+' keys)');
    }
  }catch(e){console.error('[FB] Bulk upload failed:',e);}
}

// Track which keys have failed so we don't spam the console
const FB_FAILED_KEYS=new Set();
function logFBError(k,e){
  // Only show one warning per key to avoid console spam
  if(FB_FAILED_KEYS.has(k))return;
  FB_FAILED_KEYS.add(k);
  if(e.message&&e.message.toLowerCase().includes('permission')){
    console.warn('[FB] Permission denied for "'+k+'". Check your Realtime Database rules at https://console.firebase.google.com — they should allow read/write for your data path.');
  }else{
    console.warn('[FB] Write failed for '+k+':',e.message);
  }
}

// Firebase push is handled by the localStorage.setItem interceptor (near DB definition).
// Expose shouldSyncKey so the interceptor can use it.
window.__shouldSync=shouldSyncKey;

// Subscribe to real-time changes from other devices
function subscribeToCollection(k){
  if(!window.__FB)return;
  const{db,ref,onValue}=window.__FB;
  onValue(ref(db,'data/'+k),(snap)=>{
    if(!SYNC_INITIAL_LOAD)return; // ignore the very first load callback (we handled that with syncDownAll)
    // Suppress echoes of our own writes (within last 1.5s)
    if(SYNC_ECHO[k]&&Date.now()-SYNC_ECHO[k]<1500){return;}
    let v=snap.val();
    if(v===null||v===undefined)return;
    // Normalize array-as-object
    if(v&&typeof v==='object'&&!Array.isArray(v)){
      const keys=Object.keys(v);
      if(keys.length>0&&keys.every(kk=>/^\d+$/.test(kk))){
        const arr=[];keys.sort((a,b)=>+a-+b).forEach(kk=>arr.push(v[kk]));v=arr;
      }
    }
    // Merge backend_admin during real-time account syncs — keep the NEWER password
    if(k==='accounts'&&Array.isArray(v)){
      try{
        const curAcc=JSON.parse(localStorage.getItem('sms7_accounts')||'[]');
        const curBA=curAcc.find(a=>a&&a.role==='backend_admin');
        const incBA=v.find(a=>a&&a.role==='backend_admin');
        if(curBA&&!incBA){v.unshift(curBA);}
        else if(curBA&&incBA){
          const localTs=curBA._pwdChangedAt||'';
          const remoteTs=incBA._pwdChangedAt||'';
          if(localTs>remoteTs){incBA.password=curBA.password;incBA._pwdChangedAt=localTs;}
        }
      }catch(e){}
    }
    window.__fbSyncPaused=true;
    localStorage.setItem('sms7_'+k,JSON.stringify(v));
    window.__fbSyncPaused=false;
    // For session-scoped keys, only refresh if the key matches the ACTIVE session (otherwise we'd refresh with stale data)
    let logicalKey=k;
    if(isSessionScopedKey(k)){
      // Extract the logical collection name (e.g. "students_default" → "students")
      const activeSid=window.__activeSessionId||(typeof getActiveSessionId==='function'?getActiveSessionId():'default');
      const expectedSuffix='_'+activeSid;
      if(!k.endsWith(expectedSuffix))return; // ignore changes to inactive sessions
      logicalKey=k.substring(0,k.length-expectedSuffix.length);
    }
    // If user is currently viewing a page that displays this data, refresh it
    const renderers=AUTO_REFRESH_MAP[logicalKey]||[];
    if(renderers.includes('r'+capitalize(_page||''))||renderers.some(r=>r==='r'+pageToRendererName(_page))){
      try{
        const fnName=renderers.find(r=>typeof window[r]==='function');
        if(fnName){
          // Briefly flash the sync dot blue to indicate incoming change
          const dot=document.getElementById('syncdot');
          if(dot){const orig=dot.style.background;dot.style.background='#3d6ee0';setTimeout(()=>{dot.style.background=orig||'#10a169';},400);}
          window[fnName]();
        }
      }catch(e){console.warn('[FB] Re-render failed:',e);}
    }
    // Always refresh dashboard counters in background if user is viewing dashboard
    if(_page==='dashboard'&&typeof rDash==='function'){try{rDash();}catch(e){}}
  });
}

function pageToRendererName(page){
  if(!page)return '';
  return page.split('_').map(p=>p.charAt(0).toUpperCase()+p.slice(1)).join('');
}

function capitalize(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}

// Boot sequence: wait for Firebase → sync down → run seed/migrate → enable sync → subscribe
async function bootFirebaseSync(){
  updateSyncStatus(false);

  // CRITICAL: Always run seed FIRST so we have a clean starting state.
  // Seed is idempotent (checks sv7 flag) — won't overwrite if already done.
  if(!window.__seedDone){try{window.__doSeedAndStart();}catch(e){console.warn('[FB] Seed error:',e);}window.__seedDone=true;}

  // Wait UP TO 30 seconds for Firebase (was 4s — caused silent local-only mode on slow networks)
  let ok=await waitForFirebase(30000);
  if(!ok){
    console.warn('[FB] Firebase SDK slow to load — will retry in background');
    updateSyncStatus(false);
    (async function retryBoot(){
      while(!window.__FB||!window.__FB.db){await new Promise(r=>setTimeout(r,2000));}
      console.log('[FB] Firebase finally available, completing boot');
      bootFirebaseSync();
    })();
    return;
  }
  // ENABLE SYNC IMMEDIATELY — don't wait for initial sync-down to complete
  window.__SYNC_ON=true;
  SYNC_ENABLED=true;
  try{
  console.log('[FB] SDK loaded. Pulling initial data from cloud…');
  const hadData=await syncDownAll();

  const localAccounts=JSON.parse(localStorage.getItem('sms7_accounts')||'[]');
  const hasOnlyBackend=localAccounts.length===1&&localAccounts[0].role==='backend_admin';
  const hasManyAccounts=localAccounts.length>2;

  if(!hasOnlyBackend&&hasManyAccounts){
    const schools=JSON.parse(localStorage.getItem('sms7_schools')||'[]');
    if(!schools.length||schools.every(s=>s.id==='default_school')){
      console.log('[FB] Detected stale Firebase data. Resetting to clean state.');
      localStorage.removeItem('sms7_sv7');
      localStorage.removeItem('sms7_accounts');
      localStorage.removeItem('sms7_schools');
      localStorage.removeItem('sms7_students');
      localStorage.removeItem('sms7_teachers');
      if(typeof seed==='function')seed();
      await syncUpAll();
    }
  }

  SYNC_INITIAL_LOAD=true;
  SYNC_ENABLED=true;
  window.__SYNC_ON=true;
  console.log('[FB] Pushing local data to cloud…');
  await syncUpAll();
  SYNC_KEYS.forEach(k=>subscribeToCollection(k));
  const subscribed=new Set(SYNC_KEYS);
  for(let i=0;i<localStorage.length;i++){
    const lkey=localStorage.key(i);
    if(!lkey||!lkey.startsWith('sms7_'))continue;
    const k=lkey.substring(5);
    if(isSessionScopedKey(k)&&!subscribed.has(k)){
      subscribeToCollection(k);
      subscribed.add(k);
    }
  }
  console.log('[FB] Real-time sync active for '+subscribed.size+' collections');
  }catch(e){console.error('[FB] Boot error:',e);}
  if(window.__FB&&window.__FB.connected!==undefined){
    updateSyncStatus(window.__FB.connected);
  }else if(window.__FB){
    updateSyncStatus(true);
  }
  if(typeof navigate==='function'&&_page){try{navigate(_page);}catch(e){}}
}

function doExp(fmt){

  if(staffF&&type==='tasks')data=data.filter(t=>t.assignedTo===staffF||t.assignedBy===staffF);
  const cfg={complaints:{h:['Track No','Parent','Phone','Student','Grade','Type','Subtype','Status','Priority','Assigned To','Date'],r:d=>[d.trackNo,d.parentName,d.parentPhone,d.studentName,d.grade+'-'+d.section,d.type,d.subtype,d.status,d.priority,d.assignedName||'Unassigned',(d.created||'').split('T')[0]]},tasks:{h:['Title','Description','Assigned To','Assigned By','Status','Priority','Progress','Due Date'],r:d=>[d.title,d.desc,d.assignedName,d.assignedByName,d.status,d.priority,d.progress+'%',d.dueDate]},infractions:{h:['Student','Grade','Degree','Occurrence','Violation','Procedure','Points Deducted','Description','Guardian Contact','Follow-up Status','Notes','Date','Recorded By','Principal Ack'],r:d=>[d.studentName,d.grade+'-'+d.section,d.degree,d.occurrence||'',d.type,d.procedure||'',d.pointsDeducted||0,d.description,d.guardianContact||'',d.followUpStatus||'',d.actionTaken||'',d.date,d.createdByName,d.principalAck||'']},referrals:{h:['Student','Grade','Reason','From','To','Status','Date'],r:d=>[d.studentName,d.grade+'-'+d.section,d.reason,d.referredByName,d.referredToName,d.status,d.created]},early_pickups:{h:['Student','Grade','Guardian','Phone','Reason','Pickup Time','Status','Date'],r:d=>[d.studentName,d.grade,d.guardianName,d.guardianPhone,d.reason,d.pickupTime,d.status,(d.created||'').split('T')[0]]},exam_absents:{h:['Student','Grade','Section','Subject','Absent Date','Remarks','Added By'],r:d=>[d.studentName,d.grade,d.section||'',d.subject,d.absentDate,d.remarks||'',d.addedBy]},class_visits:{h:['Teacher','Subject','Grade','Date','Rating','Supervisor','Academic Ack','Principal Ack'],r:d=>[d.teacher,d.subject,d.grade+'-'+d.section,d.date,d.rating,d.supervisorName,d.academicAckDate||'',d.principalAckDate||'']},notebook_checks:{h:['Student','Grade','Subject','Notebook','Workbook','Tchr Check','Date'],r:d=>[d.studentName,d.grade+'-'+d.section,d.subject,d.notebookStatus,d.workbookStatus,d.teacherChecking,d.date]},discipline_reports:{h:['Title','Grade','Teacher','Date','Created By','Principal Ack'],r:d=>[d.title,d.grade+'-'+d.section,d.teacher||'',d.date,d.createdByName,d.principalAck||'']},activity_reports:{h:['Activity Name','Teacher Conducted','Activity Date','Submitted By','Submitted On','Additional Note'],r:d=>[d.activityName,d.teacher,d.activityDate,d.createdByName,(d.created||'').split('T')[0],d.additionalNote||'']}}[type];

}

// Boot: detect parent-portal URL parameters EARLY (before Firebase), so users scanning a QR
// see the public form immediately instead of the admin login flash.
// Note: we still let seed()/migrate() run so DB has settings (school name, logo)
// and we still let Firebase boot so parent submissions reach the cloud.
(function(){
  try{
    const p=new URLSearchParams(window.location.search);
    if(p.get('parent')==='1'){window.__earlyPortal='parent';}
    else if(p.get('pickup')==='1'){window.__earlyPortal='pickup';}
  }catch(e){}
})();

window.__doSeedAndStart=function(){
  // Initialize sessions FIRST so DB.get/set is wrapped before any seed runs
  if(typeof initSessions==='function')initSessions();
  seed();
  migrate();
  // Render the right UI based on URL
  if(window.__earlyPortal==='parent'&&typeof checkParentMode==='function'){
    checkParentMode();
  }else if(window.__earlyPortal==='pickup'&&typeof checkPickupMode==='function'){
    checkPickupMode();
  }else if(checkParentMode()){
    // legacy detection in case the URL flag was added differently
  }else if(typeof checkPickupMode==='function'&&checkPickupMode()){
    // legacy detection
  }
  // After login screen renders, refresh session indicator
  if(typeof renderSessionIndicator==='function')setTimeout(renderSessionIndicator,500);
  // Restore session if user was previously logged in (survives page refresh)
  if(!CU&&!window.__earlyPortal){
    const restored=restoreLoginSession();
    if(restored){CU=restored;SAIMP=false;SAR=null;launch();}
  }
};
// CRITICAL: Seed at parse time. If accounts are empty (fresh install or blob URL), clear sv7 so seed runs.
try{
  const existingAccounts=JSON.parse(localStorage.getItem('sms7_accounts')||'[]');
  if(!existingAccounts.length){
    localStorage.removeItem('sms7_sv7'); // force seed to run
  }
  if(typeof initSessions==='function')initSessions();
  seed();
  migrate();
}catch(e){console.warn('[Boot] Early seed error:',e);}
// Firebase mode — also schedule the regular boot path (for non-seed initialization like URL portal detection + Firebase sync)
if(typeof window.__FB!=='undefined'||document.querySelector('script[type="module"]')){
  // Firebase mode — wait briefly, then if firebase didn't take over, fall back to local seed
  setTimeout(()=>{if(!window.__seedDone){window.__doSeedAndStart();window.__seedDone=true;}},5000);
}else{
  // Pure local mode
  window.__doSeedAndStart();
  window.__seedDone=true;
}

function checkPickupMode(){
  const params=new URLSearchParams(window.location.search);
  if(params.get('pickup')!=='1')return false;
  document.body.classList.add('parent-mode');
  const lp=document.getElementById('lp');if(lp)lp.classList.add('hidden');
  const app=document.getElementById('app');if(app)app.classList.add('hidden');

function onPickedByChange(){
  const v=document.getElementById('pup-pickedby').value;
  const other=document.getElementById('pup-pickedby-other');
  if(!other)return;
  // Show "name + phone + id" fields whenever the relationship isn't blank — guardian needs to specify the actual person
  // For "Father"/"Mother" though, we can assume it's the same person filling the form (the guardian themselves)
  // Show extra fields for everyone else, mandatory for "Other"
  if(v&&v!=='Father'&&v!=='Mother'){
    other.style.display='block';
  }else{
    other.style.display='none';
  }
}

function submitPickupRequest(){
  const sn=document.getElementById('pup-sn').value.trim();
  const gr=document.getElementById('pup-gr').value.trim();
  const gn=document.getElementById('pup-gn').value.trim();
  const gp=document.getElementById('pup-gp').value.trim();
  const pickedBy=document.getElementById('pup-pickedby').value;
  const pickedByName=document.getElementById('pup-pickedby-name')?document.getElementById('pup-pickedby-name').value.trim():'';
  const pickedByPhone=document.getElementById('pup-pickedby-phone')?document.getElementById('pup-pickedby-phone').value.trim():'';
  const pickedById=document.getElementById('pup-pickedby-id')?document.getElementById('pup-pickedby-id').value.trim():'';
  const reason=document.getElementById('pup-reason').value;
  const time=document.getElementById('pup-time').value;
  const notes=document.getElementById('pup-notes').value.trim();
  if(!sn||!gn||!gp||!pickedBy||!reason||!time){alert('Please fill all required fields including who will pick up the student');return;}
  // If "Other" is selected, the name field is required
  if(pickedBy!=='Father'&&pickedBy!=='Mother'&&!pickedByName){alert('Please enter the name of the person who will pick up the student');return;}
  // Generate tracking number
  const trackNo='PU-'+Date.now().toString(36).toUpperCase().slice(-7);
  const list=DB.get('early_pickups')||[];
  const id='pu'+Date.now();
  list.push({id,trackNo,studentName:sn,grade:gr||'—',guardianName:gn,guardianPhone:gp,pickedBy,pickedByName:pickedByName||(pickedBy==='Father'||pickedBy==='Mother'?gn:''),pickedByPhone:pickedByPhone||(pickedBy==='Father'||pickedBy==='Mother'?gp:''),pickedById,reason,pickupTime:time,notes,status:'Pending',source:'parent_qr',submittedAt:new Date().toISOString(),created:new Date().toISOString()});
  DB.set('early_pickups',list);
  // Show success page
  const c=document.getElementById('pup-content');
  c.innerHTML='<div style="text-align:center;padding:18px 8px"><div style="font-size:54px;margin-bottom:9px">✅</div><h2 style="font-size:19px;color:var(--tx);margin-bottom:9px">Request Submitted</h2><p style="font-size:12px;color:var(--tx2);margin-bottom:16px;line-height:1.6">Your early pickup request for <strong>'+esc(sn)+'</strong> has been received. Please show the tracking number below to the school admin office. Once approved, you will receive a QR code to show the gate guard.</p>'
  +'<div style="background:var(--ac2);border:2px solid var(--ac);border-radius:10px;padding:16px;margin-bottom:18px"><div style="font-size:10px;color:var(--ac);text-transform:uppercase;font-weight:700;margin-bottom:5px">Tracking Number</div><div class="mono" style="font-size:24px;font-weight:bold;color:var(--ac);letter-spacing:1px">'+trackNo+'</div><div style="font-size:10px;color:var(--tx3);margin-top:5px">Save this — you may need it</div></div>'
  +'<div style="background:var(--sf2);border-radius:8px;padding:11px 13px;font-size:11px;color:var(--tx2);text-align:left;line-height:1.7;margin-bottom:13px"><strong>Pickup will be done by:</strong><br>👤 '+esc(pickedBy==='Father'||pickedBy==='Mother'?(pickedBy+' ('+gn+')'):(pickedBy+' — '+pickedByName))+(pickedByPhone?'<br>📞 '+esc(pickedByPhone):'')+'</div>'
  +'<div style="background:var(--sf2);border-radius:8px;padding:11px 13px;font-size:11px;color:var(--tx2);text-align:left;line-height:1.7;margin-bottom:13px"><strong>What happens next:</strong><br>1. School staff will review your request<br>2. They will verify with you (may call '+esc(gp)+')<br>3. Once approved, the office will give you a QR code<br>4. Show that QR to the gate guard for the student to be released</div>'
  +'<button class="btn bp" style="width:100%;justify-content:center;padding:11px" onclick="renderPickupRequestForm()">+ Submit Another Request</button></div>';
}

// ─── ADMIN PICKUP PAGE — full rebuild ──────────────────────

function rPickup(){
  const canV=['admin_assistant','superadmin','principal','vice_principal','student_advisor'].includes(CU.role);
  if(!canV){document.getElementById('pc').innerHTML='<div class="emp"><div class="ei">🔒</div><p>Access restricted</p></div>';return;}
  
  const pus=DB.get('early_pickups')||[];
  const today=new Date().toISOString().split('T')[0];
  const todayCount=pus.filter(p=>(p.created||'').startsWith(today)).length;
  const pendingCount=pus.filter(p=>p.status==='Pending').length;
  const approvedCount=pus.filter(p=>p.status==='Approved').length;
  const releasedCount=pus.filter(p=>p.status==='Student Released').length;
  
  document.getElementById('pc').innerHTML='<div class="card" style="margin-bottom:12px"><div class="sh2"><h3>🚗 '+T('early_pickup')+' ('+pus.length+')</h3><div style="display:flex;gap:5px;flex-wrap:wrap"><button class="btn bg2 bsm" onclick="navigate(\'pickup_qr\')" title="QR poster for entrance">📱 QR Poster</button><button class="btn bg2 bsm" onclick="expPickupRegisterPDF()" title="Generates a PDF of all records (or filtered if filters are applied). No records are deleted.">📄 Register PDF</button><button class="btn bg2 bsm" onclick="expPickupCSV()" title="Export all records to CSV">📊 Export CSV</button></div></div><div style="font-size:11px;color:var(--tx3);margin-top:4px">Parents submit via QR scan. Verify, approve, generate gate guard QR, and the student can be released. <strong>All records are kept permanently for tracking.</strong></div></div>'
  +'<div class="cg g4" style="margin-bottom:13px"><div class="stat go"><div class="sl2">Pending Review</div><div class="sv">'+pendingCount+'</div><div class="sic">⏳</div></div><div class="stat gn"><div class="sl2">Approved</div><div class="sv">'+approvedCount+'</div><div class="sic">✓</div></div><div class="stat tl"><div class="sl2">Released</div><div class="sv">'+releasedCount+'</div><div class="sic">🚪</div></div><div class="stat bl"><div class="sl2">Today</div><div class="sv">'+todayCount+'</div><div class="sb3">'+today+'</div><div class="sic">📅</div></div></div>'
  +'<div class="card" style="margin-bottom:12px"><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><input id="puq" placeholder="🔍 Search by student, guardian, tracking number, or phone…" oninput="fltPu2()" style="flex:1;min-width:230px;padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px"><input type="date" id="pud" onchange="fltPu2()" style="padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px"><button class="btn bg2 bsm" onclick="document.getElementById(\'pud\').value=\''+today+'\';fltPu2()">Today</button><button class="btn bg2 bsm" onclick="document.getElementById(\'pud\').value=\'\';fltPu2()">All Dates</button></div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)">'+['All','Pending','Approved','Student Released','Rejected'].map((s,i)=>{const cnt=s==='All'?pus.length:pus.filter(p=>p.status===s).length;return'<button class="btn '+(s==='All'?'bp':'bg2')+' bsm puf" onclick="fltPuStatus(\''+s+'\',this)">'+s+' <span style="background:rgba(255,255,255,0.25);padding:1px 7px;border-radius:9px;margin-left:5px;font-size:10px">'+cnt+'</span></button>';}).join('')+'</div></div>'
  +'<div id="puw" class="card">'+bPuTbl(pus)+'</div>';
  
  // Active filter state
  window._puFilter={status:'All',q:'',date:''};
  window.fltPuStatus=function(s,el){
    document.querySelectorAll('.puf').forEach(b=>{b.className=b.className.replace('bp','bg2');});
    el.className=el.className.replace('bg2','bp');
    window._puFilter.status=s;
    applyPuFilters();
  };
  window.fltPu2=function(){
    window._puFilter.q=document.getElementById('puq').value.toLowerCase().trim();
    window._puFilter.date=document.getElementById('pud').value;
    applyPuFilters();
  };
  window.applyPuFilters=function(){
    let list=DB.get('early_pickups')||[];
    const f=window._puFilter;
    if(f.status&&f.status!=='All')list=list.filter(p=>p.status===f.status);
    if(f.q)list=list.filter(p=>((p.studentName||'')+' '+(p.guardianName||'')+' '+(p.trackNo||'')+' '+(p.guardianPhone||'')+' '+(p.grade||'')).toLowerCase().includes(f.q));
    if(f.date)list=list.filter(p=>(p.created||'').startsWith(f.date));
    document.getElementById('puw').innerHTML=bPuTbl(list);
  };
}

function bPuTbl(list){

function notifyParentRelease(id){

  const p=list[i];

  // Ensure QR has been issued so the URL is stable

    list[i].qrIssuedAt=new Date().toISOString();

      +'— '+(s.schoolName||'School')+(s.schoolNameAr?'\n  '+s.schoolNameAr:'');
  }
  
  // Track that notification was attempted
  list[i].releaseNotifiedAt=new Date().toISOString();
  list[i].releaseNotifiedBy=CU.firstName+' '+CU.lastName;
  DB.set('early_pickups',list);
  logA('Sent '+(isReleased?'release':'approval')+' notification with QR to parent for '+p.studentName);
  
  // Show preview modal with QR + editable message
  // NOTE: We always use wa.me/<phone>?text=... which opens WhatsApp DIRECTLY at the parent's chat.
  // Web Share API was tried but it opens a generic share sheet, losing the phone-number target.
  // The parent receives the text immediately; admin attaches the auto-downloaded QR with 1 tap (📎).
  openM('<div class="mh"><h3>📲 Notify Parent — '+(isReleased?'Student Released':'Pickup Approved')+'</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2">'

// Always opens WhatsApp at the parent's specific number using wa.me/<phone>?text=...
// This is the ONLY URL format that targets a specific contact directly.
function sendReleaseWA(id){
  const msg=document.getElementById('rel-msg').value.trim();
  if(!msg){toast('Message cannot be empty','danger');return;}
  const phone=window._relPhone;
  if(!phone){toast('Phone number missing — cannot send','danger');return;}
  const qrUrl=window._relQRImgUrl;
  const fname='pickup_QR_'+window._relTrackNo+'.png';
  
  // CRITICAL: Open WhatsApp FIRST inside the user-gesture click handler.
  // Some browsers block `window.open()` if it follows a download trigger.
  const url='https://wa.me/'+phone+'?text='+encodeURIComponent(msg);
  // window.open with _blank works on both mobile and desktop — opens WhatsApp app on mobile via the redirect, and a new tab on desktop. 
  // We do NOT use window.location.href because it would replace the admin app and confuse users.
  const waWindow=window.open(url,'_blank','noopener,noreferrer');
  if(!waWindow){
    // popup blocked — fall back to programmatic anchor click which is harder to block
    const link=document.createElement('a');
    link.href=url;
    link.target='_blank';
    link.rel='noopener noreferrer';
    document.body.appendChild(link);
    link.click();
    setTimeout(()=>{try{document.body.removeChild(link);}catch(e){}},200);
  }
  
  // Now trigger the QR download AFTER the WhatsApp tab has been spawned
  setTimeout(()=>{
    const a=document.createElement('a');
    a.href=qrUrl;
    a.download=fname;
    a.target='_blank';
    a.rel='noopener';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{try{document.body.removeChild(a);}catch(e){}},200);
  },300);
  
  closeM();
  toast('WhatsApp chat opened with parent · QR downloading. Attach with 📎 in WhatsApp.','success');
  rPickup();
}

// Helper: find the teacher record matching the current user
function getMyTeacherRecord(){
  if(CU.role!=='teacher')return null;
  const teachers=DB.get('teachers')||[];
  // Match by linked teacherId on account, or by full name
  if(CU.teacherId){
    const found=teachers.find(t=>t.id===CU.teacherId);
    if(found)return found;
  }
  // Fallback: match by full name
  const fullName=(CU.firstName+' '+CU.lastName).trim().toLowerCase();
  return teachers.find(t=>{
    const tName=((t.firstName||'')+' '+(t.lastName||'')).trim().toLowerCase();
    return tName===fullName;
  })||null;
}

// Helper: get records linked to this teacher (by name or by teacherId field on records)
function getMyTeacherLinkedRecords(collection,fieldNames){
  const me=getMyTeacherRecord();
  const list=DB.get(collection)||[];
  const myFullName=((CU.firstName||'')+' '+(CU.lastName||'')).trim().toLowerCase();
  return list.filter(r=>{
    for(const f of fieldNames){
      const v=r[f];
      if(!v)continue;
      // If the field stores an ID and matches our teacher record id
      if(me&&v===me.id)return true;
      // If the field stores a name string
      if(typeof v==='string'&&v.trim().toLowerCase()===myFullName)return true;
      if(typeof v==='string'&&me&&v.trim().toLowerCase()===((me.firstName||'')+' '+(me.lastName||'')).trim().toLowerCase())return true;
    }
    return false;
  });
}

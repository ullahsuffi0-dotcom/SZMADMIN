function myWarningReplyM(id){
  const w=(DB.get('warning_letters')||[]).find(x=>x.id===id);if(!w)return;
  openM('<div class="mh"><h3>📎 Submit Reply to Warning Letter</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2">'
  +'<div class="al ai">📋 Submit your written response to: <strong>'+esc(w.subject||w.type)+'</strong>. Both your typed reply and an uploaded file (if any) will be saved for the principal\'s review.</div>'
  +'<div class="fg"><label>Your Reply / Response</label><textarea id="my-warning-reply" placeholder="Write your acknowledgment, explanation, or response here…" style="min-height:160px"></textarea></div>'
  +'<div class="fg"><label>Attach File (optional, e.g. PDF of your written reply)</label><input type="file" id="my-warning-file" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" style="padding:6px"><div style="font-size:10px;color:var(--tx3);margin-top:3px">Max 1MB. Will be stored with the warning letter record.</div></div>'
  +'</div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="saveMyWarningReply(\''+id+'\')">📤 Submit Reply →</button></div>');
}

function saveMyWarningReply(id){
  const text=document.getElementById('my-warning-reply').value.trim();
  const fileInput=document.getElementById('my-warning-file');
  if(!text&&!fileInput.files.length){toast('Please write a reply or attach a file','danger');return;}
  
  const list=DB.get('warning_letters')||[];
  const i=list.findIndex(w=>w.id===id);if(i<0)return;
  
  const finalize=(attachmentData)=>{
    list[i].replyText=text;
    list[i].replyAttachment=attachmentData||list[i].replyAttachment||null;
    list[i].replyDate=new Date().toISOString();
    list[i].repliedBy=CU.firstName+' '+CU.lastName;
    DB.set('warning_letters',list);
    logA('Submitted reply to warning letter: '+(list[i].subject||list[i].type));
    toast('Reply submitted','success');
    closeM();
    rMyWarnings();
  };
  
  if(fileInput.files.length){
    const f=fileInput.files[0];
    if(f.size>1024*1024){toast('File must be under 1MB','danger');return;}
    const r=new FileReader();
    r.onload=e=>finalize({name:f.name,type:f.type,size:f.size,data:e.target.result});
    r.readAsDataURL(f);
  }else{
    finalize();
  }
}

// ═══════════════════════════════════════════════════════════
// ACADEMIC SESSIONS — Super Admin manages distinct academic periods
// All session-scoped collections use composite keys: <key>_<sessionId>
// DB.get/set are wrapped to transparently route reads/writes by active session
// ═══════════════════════════════════════════════════════════

// Collections that are scoped per session (have their own data per session)
const SESSION_SCOPED_KEYS=[
  'students','teachers',
  'complaints','tasks','task_requests',
  'infractions','referrals','behaviour',
  'class_visits','notebook_checks',
  'activities','activity_reports',
  'discipline','exam_absents','reexam_schedules',
  'announcements',
  'daily_attendance','student_health',
  'remedial_plans','vp_reports','warning_letters',
  'teacher_achievements','early_pickups',
  'duty_rosters','substitutions'
];

// Collections that are GLOBAL (shared across all sessions)
// accounts (staff users), settings, activity_log, sessions list, calendar
// These are intentionally NOT in SESSION_SCOPED_KEYS

function getActiveSessionId(){
  const s=DB._raw_get?DB._raw_get('active_session_id'):JSON.parse(localStorage.getItem('sms7_active_session_id')||'null');
  return s||'default';
}

function setActiveSessionId(id){
  if(DB._raw_set)DB._raw_set('active_session_id',id);
  else localStorage.setItem('sms7_active_session_id',JSON.stringify(id));
  window.__activeSessionId=id;
}

function getActiveSession(){
  const sessions=DB._raw_get?(DB._raw_get('sessions')||[]):(JSON.parse(localStorage.getItem('sms7_sessions')||'[]'));
  const id=getActiveSessionId();
  return sessions.find(s=>s.id===id)||sessions[0]||null;
}

function getAllSessions(){
  return (DB._raw_get?DB._raw_get('sessions'):(JSON.parse(localStorage.getItem('sms7_sessions')||'null')))||[];
}

// Wrap DB.get and DB.set to route session-scoped reads/writes
(function wrapDB(){
  if(DB._wrapped)return;
  const origGet=DB.get.bind(DB);
  const origSet=DB.set.bind(DB);
  // Save raw access for sessions module itself
  DB._raw_get=origGet;
  DB._raw_set=origSet;
  DB.get=function(k){
    if(SESSION_SCOPED_KEYS.includes(k)){
      const sid=window.__activeSessionId||getActiveSessionId();
      return origGet(k+'_'+sid);
    }
    return origGet(k);
  };
  DB.set=function(k,v){
    if(SESSION_SCOPED_KEYS.includes(k)){
      const sid=window.__activeSessionId||getActiveSessionId();
      return origSet(k+'_'+sid,v);
    }
    return origSet(k,v);
  };
  DB._wrapped=true;
})();

// Initialize sessions on first run
function initSessions(){
  // Safe raw accessors — DB._raw_set may not exist during early boot (before wrapDB runs)
  const _rGet=DB._raw_get||function(k){try{return JSON.parse(localStorage.getItem('sms7_'+k)||'null')}catch(e){return null}};
  const _rSet=DB._raw_set||function(k,v){try{localStorage.setItem('sms7_'+k,JSON.stringify(v))}catch(e){}};
  const sessions=getAllSessions();
  if(!sessions.length){
    const today=new Date().toISOString().split('T')[0];
    const future=new Date();future.setFullYear(future.getFullYear()+1);
    const defaultSession={
      id:'default',
      name:'Default Session',
      startDate:today,
      endDate:future.toISOString().split('T')[0],
      created:new Date().toISOString(),
      createdBy:'system',
      isActive:true
    };
    _rSet('sessions',[defaultSession]);
    setActiveSessionId('default');
    SESSION_SCOPED_KEYS.forEach(k=>{
      const flat=_rGet(k);
      if(flat&&Array.isArray(flat)&&flat.length){
        const bucketed=_rGet(k+'_default');
        if(!bucketed||!bucketed.length){
          _rSet(k+'_default',flat);
        }
      }
    });
    if(typeof logA==='function'&&typeof CU!=='undefined'&&CU)logA('Initialized default academic session');
  }else{
    if(!getActiveSessionId()){
      setActiveSessionId(sessions[0].id);
    }
    window.__activeSessionId=getActiveSessionId();
  }
}

// Run init right after DB is ready (but before app boot uses it)
if(typeof window!=='undefined'){
  window.__activeSessionId=getActiveSessionId();
}

function saveSession(){
  const name=document.getElementById('ses-name').value.trim();
  const startDate=document.getElementById('ses-start').value;
  const endDate=document.getElementById('ses-end').value;
  const initMode=document.querySelector('input[name="ses-init"]:checked').value;
  const activate=document.getElementById('ses-activate').checked;
  if(!name||!startDate||!endDate){toast('Name, start date, and end date are required','danger');return;}
  if(endDate<=startDate){toast('End date must be after start date','danger');return;}
  
  const sessions=getAllSessions();
  // Generate a clean id from the name + timestamp
  const sid='s'+Date.now().toString(36);
  const newSession={
    id:sid,
    name,
    startDate,
    endDate,
    created:new Date().toISOString(),
    createdBy:CU.firstName+' '+CU.lastName,
    isActive:false
  };
  sessions.push(newSession);
  DB._raw_set('sessions',sessions);
  
  // Initialize all session-scoped collections as empty arrays
  SESSION_SCOPED_KEYS.forEach(k=>{
    DB._raw_set(k+'_'+sid,[]);
  });
  
  // If "copy" mode chosen, copy students and/or teachers
  if(initMode==='copy'){
    const sourceId=document.getElementById('ses-copy-from').value;
    if(sourceId){
      const copyStudents=document.getElementById('ses-copy-students').checked;
      const copyTeachers=document.getElementById('ses-copy-teachers').checked;
      if(copyStudents){
        const src=DB._raw_get('students_'+sourceId)||[];
        // Deep copy with new IDs to keep them separate from source
        const copied=src.map(s=>({...s,id:'st'+Date.now()+Math.random().toString(36).slice(2,7),sessionCopiedFrom:sourceId,created:new Date().toISOString()}));
        DB._raw_set('students_'+sid,copied);
      }
      if(copyTeachers){
        const src=DB._raw_get('teachers_'+sourceId)||[];
        const copied=src.map(t=>({...t,id:'tch'+Date.now()+Math.random().toString(36).slice(2,7),sessionCopiedFrom:sourceId,created:new Date().toISOString()}));
        DB._raw_set('teachers_'+sid,copied);
      }
    }
  }
  
  // Activate if asked
  if(activate){
    setActiveSessionId(sid);
    // Update the isActive flag on all sessions
    sessions.forEach(s=>s.isActive=(s.id===sid));

// ─── DELETE SESSION ────────────────────────────────────────

function delSession(id){
  if(id===getActiveSessionId()){toast('Cannot delete the active session — switch first','danger');return;}
  if(id==='default'){toast('Cannot delete the default session','danger');return;}
  const sessions=getAllSessions();
  const s=sessions.find(x=>x.id===id);if(!s)return;
  if(!confirm('⚠️ DELETE SESSION "'+s.name+'"?\n\nThis will permanently delete ALL students, teachers, attendance, complaints, and records associated with this session. This CANNOT be undone.\n\nType the session name in the next prompt to confirm.'))return;
  const typed=prompt('Type "'+s.name+'" exactly to confirm deletion:');
  if(typed!==s.name){toast('Session name did not match — deletion cancelled','danger');return;}
  // Capture all session data into recycle bin before deleting
  if(typeof recycleBinAdd==='function'){
    recycleBinAdd('sessions',[Object.assign({},s,{_sessionData:true})]);
    SESSION_SCOPED_KEYS.forEach(k=>{
      const data=DB._raw_get(k+'_'+id)||[];
      if(Array.isArray(data)&&data.length)recycleBinAdd(k,data);
    });
  }
  // Delete all session-scoped data
  SESSION_SCOPED_KEYS.forEach(k=>{
    DB._raw_set(k+'_'+id,null);
    try{localStorage.removeItem('sms7_'+k+'_'+id);}catch(e){}
  });
  const filtered=sessions.filter(x=>x.id!==id);
  DB._raw_set('sessions',filtered);
  logA('DELETED session: '+s.name);
  toast('Session "'+s.name+'" deleted','danger');
  rSessions();
}

// DUTY ROSTER + SUBSTITUTIONS
// Admin Assistant builds daily duty rosters (Sun–Thu)
// Principal/VP see full roster, Teachers see only their own duties
// VP manages substitutions when teachers are absent
// ═══════════════════════════════════════════════════════════

// Duty schedule template
// Each slot has a fixed set of "spots" (areas/locations). Admin assigns teachers per spot.
const DUTY_SLOTS=[
  {id:'morning_early',label:'Morning Duty (6:30 – 7:45)',time:'6:30 – 7:45',spots:['Assembly Area','Play Ground (Class 8-12)']},
  {id:'morning_late',label:'Morning Duty (7:00 – 7:45)',time:'7:00 – 7:45',spots:['Gate (Play Ground)','Red & Yellow Area','Blue / Green Area','Rear Gate','Main Gate']},
  {id:'first_break',label:'First Break (9:15 – 9:30)',time:'9:15 – 9:30',spots:['Admin Corridor','Under the Shed','Canteen']},
  {id:'second_break',label:'Second Break (10:00 – 10:15)',time:'10:00 – 10:15',spots:['Admin Corridor','Under the Shed','Canteen','Class 8-12']},
  {id:'salah_time',label:'Salah Time (12:30 – 12:45)',time:'12:30 – 12:45',spots:['Blue Area','Green Area','Salah Area','Class 8-12']},
  {id:'going_time',label:'Going Time (13:30 – 13:45)',time:'13:30 – 13:45',spots:['Rear Gate (Till Last Bus Leaves)','Nokhba Playground','Class 5B Corridor','Corridor next to Abu Al Saud','Corridor','Gate (Play Ground) Till Last Boy','Under the Shed','Under the Shed (Till Last Boy)','Main Gate','Class 8-12 (Till Last Boy)']},
  {id:'special_combined',label:'Special Class Duty — Combined Classes (12:45 onwards)',time:'12:45 onwards',isClassDuty:true,spots:[]}
];

const DUTY_DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday'];

// ─── HELPERS ──────────────────────────────────────────────

function getRosterForDate(date){
  // Date is YYYY-MM-DD. Returns a roster object {date, day, slots:{slotId:{spotName:[teacherNames]}}, classDuties:[{class,room,teacher}]}
  const all=DB.get('duty_rosters')||[];
  return all.find(r=>r.date===date)||null;
}

function getDayOfWeek(dateStr){
  if(!dateStr)return null;
  const d=new Date(dateStr+'T00:00:00');
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  return days[d.getDay()];
}

function isWorkDay(dateStr){
  const d=getDayOfWeek(dateStr);
  return DUTY_DAYS.includes(d);
}

// All assignments for one teacher on a given date — flatten the roster
function getMyDutiesForDate(roster,teacherName){
  if(!roster)return [];
  const myName=(teacherName||'').trim().toLowerCase();
  const duties=[];
  DUTY_SLOTS.forEach(slot=>{
    if(slot.isClassDuty)return;
    const slotData=(roster.slots||{})[slot.id]||{};
    slot.spots.forEach(spot=>{
      const assigned=slotData[spot]||[];
      assigned.forEach(tName=>{
        if((tName||'').trim().toLowerCase()===myName){
          duties.push({slotId:slot.id,slotLabel:slot.label,time:slot.time,spot,type:'duty'});
        }
      });
    });
  });
  // Class duties
  (roster.classDuties||[]).forEach(c=>{
    if((c.teacher||'').trim().toLowerCase()===myName){
      duties.push({slotId:'special_combined',slotLabel:'Special Class Duty',time:'12:45 onwards',spot:'Class '+c.classes+' (in '+c.room+')',type:'class_duty'});
    }
  });
  return duties;
}

// ─── DUTY ROSTER PAGE — Admin Assistant builds, Principal/VP view ─────

function rDutyRoster(){
  const canEdit=['admin_assistant','superadmin'].includes(CU.role);
  const canView=['admin_assistant','superadmin','principal','vice_principal'].includes(CU.role);
  if(!canView){document.getElementById('pc').innerHTML='<div class="emp"><div class="ei">🔒</div><p>Access restricted</p></div>';return;}
  
  // Default to today (or next Sun-Thu day if today is Fri/Sat)
  if(!window._rosterDate){
    const today=new Date();
    let d=today;
    let safety=7;
    while(safety-->0&&!DUTY_DAYS.includes(['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()])){
      d.setDate(d.getDate()+1);
    }
    window._rosterDate=d.toISOString().split('T')[0];
  }
  
  // GUARD: if there's already a working roster being edited for THIS date, don't blow it away on cloud re-render
  // Only the date picker UI gets re-built; the body keeps in-progress edits
  const isReentry=(window._workingRoster&&window._workingRoster.date===window._rosterDate&&document.getElementById('roster-body'));
  
  document.getElementById('pc').innerHTML='<div class="card" style="margin-bottom:12px"><div class="sh2"><h3>📋 Daily Duty Roster</h3></div><div style="font-size:11px;color:var(--tx3);margin-top:4px">'+(canEdit?'Build the daily duty roster (Sunday to Thursday). Teachers will see their own assigned duties on their dashboard.':'View the school\'s daily duty assignments.')+'</div></div>'
  +'<div class="card" style="margin-bottom:12px"><div style="display:flex;gap:9px;align-items:center;flex-wrap:wrap"><label style="font-size:12px;font-weight:600">📅 Date:</label><input type="date" id="rd-date" value="'+window._rosterDate+'" onchange="onRosterDateChange()" style="padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px">'
  +'<button class="btn bg2 bsm" onclick="rdShiftDate(-1)">← Prev day</button><button class="btn bg2 bsm" onclick="rdShiftDate(1)">Next day →</button><button class="btn bg2 bsm" onclick="rdToday()">Today</button>'
  +(canEdit?'<button class="btn bg2 bsm" onclick="rdCopyPrev()" title="Copy yesterday\'s roster">📋 Copy Prev Day</button><button class="btn bg2 bsm" onclick="exportRosterPDF()">📄 Print PDF</button>':'<button class="btn bg2 bsm" onclick="exportRosterPDF()">📄 Print PDF</button>')
  +'</div></div>'
  +'<div id="roster-body"></div>';
  rdRender();
}

function rdShiftDate(delta){
  // Clear working roster — we're moving to a different date
  delete window._workingRoster;
  const d=new Date(window._rosterDate+'T00:00:00');
  d.setDate(d.getDate()+delta);
  window._rosterDate=d.toISOString().split('T')[0];
  document.getElementById('rd-date').value=window._rosterDate;
  rdRender();
}

function rdToday(){
  delete window._workingRoster;
  window._rosterDate=new Date().toISOString().split('T')[0];
  document.getElementById('rd-date').value=window._rosterDate;
  rdRender();
}

function onRosterDateChange(){
  delete window._workingRoster;
  window._rosterDate=document.getElementById('rd-date').value;
  rdRender();
}

function rdRender(){
  const date=window._rosterDate;
  const day=getDayOfWeek(date);
  const isWork=isWorkDay(date);
  const canEdit=['admin_assistant','superadmin'].includes(CU.role);
  const settings=DB.get('settings')||{};
  
  // CRITICAL: Use the in-memory working roster if it's already initialized for this date.
  // Otherwise load from DB. This prevents losing in-progress edits when re-rendering
  // (e.g., when adding a teacher and the UI re-renders before save).
  let roster;
  if(window._workingRoster&&window._workingRoster.date===date){
    roster=window._workingRoster;
  }else{
    roster=getRosterForDate(date);
    if(!roster){
      roster={date,day,slots:{},classDuties:[]};
      DUTY_SLOTS.forEach(s=>{if(!s.isClassDuty){roster.slots[s.id]={};s.spots.forEach(sp=>roster.slots[s.id][sp]=[]);}});
    }else{
      // Make sure all expected slots/spots exist (defensive — older rosters may be missing newer spots)
      if(!roster.slots)roster.slots={};
      DUTY_SLOTS.forEach(s=>{if(!s.isClassDuty){if(!roster.slots[s.id])roster.slots[s.id]={};s.spots.forEach(sp=>{if(!roster.slots[s.id][sp])roster.slots[s.id][sp]=[];});}});
      if(!roster.classDuties)roster.classDuties=[];
    }
    // Set this as the working copy
    window._workingRoster=JSON.parse(JSON.stringify(roster));
    roster=window._workingRoster;
  }
  
  let html='<div class="card" style="margin-bottom:13px;text-align:center;padding:16px;background:linear-gradient(135deg,var(--ac2),var(--sf2))"><div style="font-size:14px;font-weight:600;color:var(--tx)">'+esc(settings.schoolName||'School')+'</div><div style="font-size:18px;font-weight:bold;color:var(--ac);margin-top:5px">DAILY DUTY ROSTER · '+esc(day||'—')+' · '+esc(date)+'</div>'+(!isWork?'<div class="al aw" style="margin-top:9px;margin-bottom:0">⚠️ '+esc(day)+' is not a typical working day. Roster editing is still allowed.</div>':'')+(canEdit?'<div style="margin-top:9px;font-size:11px;color:var(--tx3)">💡 Type a teacher\'s name in any input → click a suggestion to add. Click 💾 Save when done.</div>':'')+'</div>';
  
  // Render each duty slot
  DUTY_SLOTS.forEach(slot=>{
    if(slot.isClassDuty){
      // Special section for class duties
      html+=renderClassDutySection(roster,slot,canEdit);
    }else{
      html+=renderDutySlot(roster,slot,canEdit);
    }
  });
  
  if(canEdit){
    html+='<div style="text-align:center;margin-top:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn bg2" onclick="rdReload()" title="Reload last saved version (discards unsaved changes)">↺ Reload Saved</button><button class="btn bp" onclick="saveRoster()" style="padding:11px 24px">💾 Save Roster →</button></div>';
  }
  
  document.getElementById('roster-body').innerHTML=html;
}

  if(!confirm('Discard any unsaved changes and reload the last saved roster for this date?'))return;
  delete window._workingRoster;
  rdRender();

// ─── EDITOR ACTIONS ──────────────────────────────────────

function dutyTchSearch(el,slotId,spot){
  const q=el.value.toLowerCase().trim();
  if(!q){
    // Remove any existing dropdown
    const existing=el.parentElement.querySelector('.tch-suggest');
    if(existing)existing.remove();
    return;
  }
  const teachers=DB.get('teachers')||[];
  const accountTeachers=(DB.get('accounts')||[]).filter(a=>a.role==='teacher');
  // Combine and dedupe by full name
  const allNames=new Set();
  const items=[];
  teachers.forEach(t=>{const n=((t.firstName||'')+' '+(t.lastName||'')).trim();if(n&&!allNames.has(n.toLowerCase())){allNames.add(n.toLowerCase());items.push({name:n,subject:t.subject||''});}});

  const matches=items.filter(it=>it.name.toLowerCase().includes(q)).slice(0,8);
  
  let dd=el.parentElement.querySelector('.tch-suggest');
  if(!dd){
    dd=document.createElement('div');
    dd.className='tch-suggest';
    dd.style.cssText='position:absolute;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);max-height:180px;overflow-y:auto;z-index:10;min-width:230px;box-shadow:var(--sh);margin-top:30px';

    el.parentElement.appendChild(dd);
  }
  if(!matches.length){dd.innerHTML='<div style="padding:8px 11px;font-size:11px;color:var(--tx3)">No matches. Press Enter to add as-is.</div>';}
  else{
    dd.innerHTML=matches.map(it=>'<div style="padding:7px 11px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--bd)" onmousedown="addTeacherToSpot(\''+slotId+'\',\''+escJs(spot)+'\',\''+escJs(it.name)+'\')"><strong>'+esc(it.name)+'</strong>'+(it.subject?' <span style="color:var(--tx3);font-size:10px">— '+esc(it.subject)+'</span>':'')+'</div>').join('');
  }
  // Allow Enter to add typed value
  el.onkeydown=(e)=>{
    if(e.key==='Enter'){
      e.preventDefault();
      const v=el.value.trim();
      if(v)addTeacherToSpot(slotId,spot,v);

function addTeacherToSpot(slotId,spot,name){
  if(!window._workingRoster)window._workingRoster={date:window._rosterDate,day:getDayOfWeek(window._rosterDate),slots:{},classDuties:[]};
  const r=window._workingRoster;
  if(!r.slots)r.slots={};
  if(!r.slots[slotId])r.slots[slotId]={};
  if(!r.slots[slotId][spot])r.slots[slotId][spot]=[];
  // Avoid duplicates
  if(r.slots[slotId][spot].some(t=>(t||'').toLowerCase()===name.toLowerCase())){
    toast(name+' already assigned to this spot','danger');
    return;
  }
  r.slots[slotId][spot].push(name);
  rdRender(); // Re-render UI
}

function rmTeacherFromSpot(slotId,spot,index){
  const r=window._workingRoster;
  if(!r||!r.slots||!r.slots[slotId]||!r.slots[slotId][spot])return;
  r.slots[slotId][spot].splice(index,1);
  rdRender();
}

function saveRoster(){
  let r=window._workingRoster;
  // FALLBACK: if working roster is somehow missing (e.g. Firebase sync cleared it), rebuild from current DB state for this date
  // This guarantees Save always works.
  if(!r){
    const date=window._rosterDate;
    if(!date){toast('No date selected — please pick a date first','danger');return;}
    r=getRosterForDate(date);
    if(!r){
      // Empty roster — build from template
      r={date,day:getDayOfWeek(date),slots:{},classDuties:[]};
      DUTY_SLOTS.forEach(s=>{if(!s.isClassDuty){r.slots[s.id]={};s.spots.forEach(sp=>{r.slots[s.id][sp]=[];});}});
    }
    console.warn('[Roster] Working copy was missing — using DB snapshot for save');
  }
  
  // Make sure the structure is well-formed before saving (defensive)
  if(!r.date)r.date=window._rosterDate;
  if(!r.day)r.day=getDayOfWeek(r.date);
  if(!r.slots)r.slots={};
  if(!r.classDuties)r.classDuties=[];
  
  r.updatedAt=new Date().toISOString();
  r.updatedBy=(CU.firstName||'')+' '+(CU.lastName||'');
  // Filter out blank class duties
  r.classDuties=(r.classDuties||[]).filter(c=>c.classes||c.room||c.teacher);
  
  try{
    const list=DB.get('duty_rosters')||[];
    const i=list.findIndex(x=>x.date===r.date);
    if(i>=0){
      list[i]=r;
    }else{
      r.createdAt=r.createdAt||new Date().toISOString();
      r.createdBy=r.createdBy||((CU.firstName||'')+' '+(CU.lastName||''));
      list.push(r);
    }
    DB.set('duty_rosters',list);
    
    // Verify the write actually landed
    const verify=DB.get('duty_rosters')||[];
    const saved=verify.find(x=>x.date===r.date);
    if(!saved){
      toast('Save verification failed — please try again','danger');
      console.error('[Roster] Save failed to persist:',r);
      return;
    }
    
    logA('Saved duty roster for '+r.date);
    
    // Count total assignments for toast feedback
    let totalAssigned=0;
    Object.values(r.slots||{}).forEach(slot=>{
      if(slot&&typeof slot==='object')Object.values(slot).forEach(arr=>{if(Array.isArray(arr))totalAssigned+=arr.length;});
    });
    totalAssigned+=(r.classDuties||[]).filter(c=>c.teacher).length;
    
    toast('✓ Roster saved for '+r.date+' · '+totalAssigned+' assignment(s)','success');
    
    // Clear working copy so next render pulls fresh from DB
    delete window._workingRoster;
    rdRender();
  }catch(e){
    console.error('[Roster] Save error:',e);
    toast('Failed to save: '+(e.message||'unknown error'),'danger');
  }
}

function rdCopyPrev(){
  const date=window._rosterDate;
  // Find previous workday
  const d=new Date(date+'T00:00:00');
  let prev=null;
  for(let i=1;i<=14;i++){
    d.setDate(d.getDate()-1);
    const ds=d.toISOString().split('T')[0];
    if(isWorkDay(ds)){
      const r=getRosterForDate(ds);
      if(r&&((Object.values(r.slots||{}).some(s=>Object.values(s).some(arr=>arr.length)))||(r.classDuties||[]).length)){
        prev=r;
        break;
      }
    }
  }
  if(!prev){toast('No previous roster found in the last 14 days','danger');return;}
  if(!confirm('Copy duties from '+prev.date+' ('+prev.day+') to '+date+'? This will overwrite any existing entries for '+date+'.'))return;
  // Set working roster (don't save yet — let user review then click Save)
  window._workingRoster={
    date,day:getDayOfWeek(date),
    slots:JSON.parse(JSON.stringify(prev.slots||{})),
    classDuties:JSON.parse(JSON.stringify(prev.classDuties||[])),
    copiedFrom:prev.date
  };
  toast('Copied from '+prev.date+' — review and click Save','info');
  rdRender();
}

    const subj=document.getElementById('sub-subj-p'+p).value.trim();
    const sub=document.getElementById('sub-tch-p'+p).value;
    // A row counts as filled if it has a substitute teacher AND a class
    if(sub&&cls){
      if(sub===absentName){toast('Period '+p+': substitute cannot be the same as absent teacher','danger');return;}
      validCount++;
      newRecords.push({
        id:'sub'+Date.now()+'_p'+p,
        date,day:getDayOfWeek(date),
        period:'Period '+p,
        periodNumber:p,
        class:cls,subject:subj,
        absentName,substituteName:sub,notes,
        assignedById:CU.id,assignedByName:CU.firstName+' '+CU.lastName,
        created:new Date().toISOString()
      });
    }
  }
  
  if(!validCount){toast('Fill at least one period with both Class and Substitute Teacher','danger');return;}
  
  // Save all records
  newRecords.forEach(r=>list.push(r));
  DB.set('substitutions',list);
  logA('Created '+validCount+' substitution(s) for '+absentName+' on '+date);
  toast(validCount+' substitution(s) recorded — substitutes will see them on their dashboards','success');
  closeM();
  rSubstitutions();
}

function expSubScheduleDayPDF(date){
  // Date can be passed in or chosen via prompt
  if(!date){
    const today=new Date().toISOString().split('T')[0];
    date=prompt('Enter date for the substitution schedule (YYYY-MM-DD):',today);
    if(!date)return;
  }
  const subs=(DB.get('substitutions')||[]).filter(s=>s.date===date);
  if(!subs.length){toast('No substitutions recorded for '+date,'danger');return;}
  const settings=DB.get('settings')||{};
  const day=getDayOfWeek(date);
  
  // Group by absent teacher → period grid
  const byAbsent={};
  subs.forEach(s=>{
    if(!byAbsent[s.absentName])byAbsent[s.absentName]={absentName:s.absentName,periods:{}};
    const p=s.periodNumber||parseInt((s.period||'').match(/\d+/)?.[0])||0;
    byAbsent[s.absentName].periods[p]={
      class:s.class||'—',
      subject:s.subject||'',
      substitute:s.substituteName||'—',
      notes:s.notes||''
    };
  });
  const sortedAbsent=Object.values(byAbsent).sort((a,b)=>a.absentName.localeCompare(b.absentName));
  
  const w=window.open('','_blank');
  let body='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Substitution Schedule — '+date+'</title><style>@page{size:A4 landscape;margin:10mm}body{font-family:Arial,sans-serif;color:#1a3a5c;font-size:10px;line-height:1.4}.title-bar{background:#1a5f7a;color:#fff;text-align:center;padding:9px;border-radius:5px;margin-bottom:11px;font-size:14px;font-weight:bold}.summary{background:#e4ecfb;padding:8px 13px;border-radius:5px;margin-bottom:10px;font-size:11px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}table{width:100%;border-collapse:collapse;margin-bottom:9px;font-size:10px}th{background:#1a5f7a;color:#fff;padding:7px 6px;text-align:center;font-size:10px;font-weight:bold;border:1px solid #14506a}td{padding:7px 6px;border:1px solid #ddd;vertical-align:top;text-align:center}td.absent-cell{background:#fce0e0;font-weight:bold;color:#a52424;text-align:left}td.period-cell{background:#f0f4f8}td.empty-cell{background:#f9f9f9;color:#aaa;font-style:italic}.notes-row{background:#fef3c7;font-size:9px;color:#7a4d00;padding:4px 6px;border:1px solid #ddd;text-align:left}.foot{margin-top:14px;font-size:9px;color:#888;text-align:center;border-top:1px solid #ddd;padding-top:7px}@media print{button{display:none}}</style></head><body>'+pdfHeaderHTML({subtitle:'Substitution Schedule — '+day+' · '+date})+'<div class="title-bar">📋 SUBSTITUTION SCHEDULE · '+day.toUpperCase()+' · '+date+'</div><div class="summary"><div><strong>Total Absent Teachers:</strong> '+sortedAbsent.length+'</div><div><strong>Total Substitution Slots:</strong> '+subs.length+'</div><div><strong>Generated:</strong> '+new Date().toLocaleString()+'</div></div>';
  
  // Build a single table per absent teacher with all 7 periods
  body+='<table><thead><tr><th style="width:160px;text-align:left">Absent Teacher</th>';
  for(let p=1;p<=7;p++)body+='<th>Period '+p+'</th>';
  body+='</tr></thead><tbody>';
  
  sortedAbsent.forEach(t=>{
    body+='<tr><td class="absent-cell">❌ '+esc(t.absentName)+'</td>';
    for(let p=1;p<=7;p++){
      const cell=t.periods[p];
      if(cell){
        body+='<td class="period-cell"><strong>'+esc(cell.class)+'</strong>'+(cell.subject?'<br><span style="font-size:9px;color:#555">'+esc(cell.subject)+'</span>':'')+'<hr style="margin:3px 0;border:none;border-top:1px dashed #aaa"><span style="color:#1a5f7a;font-weight:600">→ '+esc(cell.substitute)+'</span></td>';
      }else{
        body+='<td class="empty-cell">—</td>';
      }
    }
    body+='</tr>';
    // If this teacher had any notes, add a notes row underneath
    const teacherNotes=Object.values(t.periods).map(p=>p.notes).filter(n=>n).join(' · ');
    if(teacherNotes){
      body+='<tr><td colspan="8" class="notes-row">📝 '+esc(teacherNotes)+'</td></tr>';
    }
  });
  
  body+='</tbody></table>';
  body+='<div class="foot">Generated from '+esc(settings.schoolName||'School')+(subs[0]&&subs[0].assignedByName?' · Recorded by '+esc(subs[0].assignedByName):'')+'</div><button onclick="window.print()" style="margin-top:14px;padding:8px 16px;background:#1a5f7a;color:#fff;border:none;border-radius:4px;cursor:pointer">🖨️ Print / Save as PDF</button></body></html>';
  
  w.document.write(body);
  w.document.close();
  setTimeout(()=>{try{w.print();}catch(e){}},700);
  toast('Schedule PDF generated','success');
}

function ssShUpdate(){
  const date=document.getElementById('ssh-date').value;
  const settings=DB.get('settings')||{};
  const subs=(DB.get('substitutions')||[]).filter(s=>s.date===date);
  const day=getDayOfWeek(date);
  
  // Build the message
  let msg='*'+(settings.schoolName||'School')+'*\n';
  msg+='📋 *Substitution Schedule*\n';
  msg+='📅 '+(day||'')+' · '+date+'\n\n';
  
  // Group by absent teacher
  const byAbsent={};
  subs.forEach(s=>{
    if(!byAbsent[s.absentName])byAbsent[s.absentName]=[];
    byAbsent[s.absentName].push(s);
  });
  
  Object.entries(byAbsent).sort(([a],[b])=>a.localeCompare(b)).forEach(([absent,arr])=>{
    msg+='❌ *'+absent+'* (absent)\n';
    arr.sort((a,b)=>(a.periodNumber||0)-(b.periodNumber||0)).forEach(s=>{
      msg+='  • '+(s.period||'—')+' · '+(s.class||'—')+(s.subject?' ('+s.subject+')':'')+' → '+s.substituteName+'\n';
    });
    msg+='\n';
  });
  
  msg+='Total: '+subs.length+' substitution(s) for '+Object.keys(byAbsent).length+' absent teacher(s).\n';
  msg+='📎 PDF attached.';
  
  // Preview block (read-only)
  document.getElementById('ssh-preview').textContent=msg;
  // Editable textarea
  document.getElementById('ssh-msg').value=msg;
}

function ssShSend(){
  const date=document.getElementById('ssh-date').value;
  const phone=(document.getElementById('ssh-phone').value||'').trim();
  const msg=document.getElementById('ssh-msg').value.trim();
  if(!msg){toast('Message cannot be empty','danger');return;}
  
  // Step 1: Open WhatsApp FIRST inside the user-gesture (so it's not blocked)
  const cleanPh=phone?cleanPhone(phone):'';
  const url='https://wa.me/'+cleanPh+'?text='+encodeURIComponent(msg);
  const waWindow=window.open(url,'_blank','noopener,noreferrer');
  if(!waWindow){
    // Popup blocked — try anchor click
    const link=document.createElement('a');
    link.href=url;link.target='_blank';link.rel='noopener noreferrer';
    document.body.appendChild(link);link.click();
    setTimeout(()=>{try{document.body.removeChild(link);}catch(e){}},200);
  }
  
  // Step 2: Trigger PDF download after a tiny delay
  setTimeout(()=>{expSubScheduleDayPDF(date);},400);
  
  closeM();
  toast('WhatsApp opened. The PDF is downloading — attach it with 📎 in WhatsApp.','success');
}

function procTchAccImp(){
  const file=document.getElementById('tcha-file').files[0];
  if(!file){toast('Please select a CSV file','danger');return;}
  
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result;
    // Skip header row
    const lines=text.split(/\r?\n/).filter(l=>l.trim()).slice(1);
    if(!lines.length){toast('CSV is empty or only has a header row','danger');return;}
    
    const teachers=DB.get('teachers')||[];
    const accounts=DB.get('accounts')||[];
    const existingUsernames=new Set(accounts.map(a=>a.username.toLowerCase()));
    const existingTeacherNames=new Set(teachers.map(t=>(t.name||'').trim().toLowerCase()));
    
    let createdTch=0,createdAcc=0,skipped=0,duplicatesT=0,duplicatesA=0;
    const importedNames=[];
    
    lines.forEach((line,idx)=>{
      // Parse CSV row (basic — handles quoted values)
      const cols=parseCsvRow(line);
      const name=(cols[0]||'').trim();
      const subject=(cols[1]||'').trim();
      const phone=(cols[2]||'').trim();
      
      if(!name){skipped++;return;}
      
      // Generate first/last name split
      const nameParts=name.split(/\s+/);
      const firstName=nameParts[0]||name;
      const lastName=nameParts.slice(1).join(' ')||'';
      
      // 1) Add teacher record if not exists
      const nameLower=name.toLowerCase();
      if(existingTeacherNames.has(nameLower)){
        duplicatesT++;
      }else{
        teachers.push({
          id:'tch'+Date.now()+'_'+idx,
          name,
          firstName,lastName,
          employeeId:'',
          subject,
          department:'',
          phone,
          email:'',
          note:'',
          active:true,
          created:new Date().toISOString().split('T')[0]
        });
        existingTeacherNames.add(nameLower);
        createdTch++;
      }
      
      // 2) Create login account if not exists
      // Generate username from first name (lowercase, no special chars)
      let baseUsername=firstName.toLowerCase().replace(/[^a-z0-9]/g,'');
      if(!baseUsername)baseUsername='teacher';
      let username=baseUsername;
      let counter=2;
      while(existingUsernames.has(username.toLowerCase())){
        username=baseUsername+counter;
        counter++;
        if(counter>999)break;
      }
      
      if(existingUsernames.has(username.toLowerCase())){
        duplicatesA++;
      }else{
        const account={
          id:'u'+Date.now()+'_'+idx,
          username,
          password:hashPasswordSync('teacher@123'),
          role:'teacher',
          firstName,lastName,
          email:'',
          phone,
          active:true,
          created:new Date().toISOString().split('T')[0],
          theme:'blue',
          lang:'en',
          _mustChangePassword:true
        };
        accounts.push(account);
        existingUsernames.add(username.toLowerCase());
        createdAcc++;
        importedNames.push({name,username,subject,phone});
      }
    });
    
    DB.set('teachers',teachers);
    DB.set('accounts',accounts);
    // Async upgrade: replace sync hashes with SHA-256
    hashPassword('teacher@123').then(h=>{
      const ac=DB.get('accounts')||[];
      let changed=false;
      ac.forEach(a=>{if(a.password&&a.password.startsWith('fnv1a_')&&a.role==='teacher'){a.password=h;changed=true;}});
      if(changed)DB.set('accounts',ac);
    });
    logA('Imported '+createdTch+' teacher record(s) and '+createdAcc+' account(s)');
    closeM();
    
    // Show summary modal with credentials list
    showImportSummary(importedNames,{createdTch,createdAcc,skipped,duplicatesT,duplicatesA});
  };
  reader.readAsText(file);
}

// Robust CSV row parser — handles "quoted, values" with commas inside
function parseCsvRow(line){
  const result=[];
  let inQuotes=false,cur='';
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){
      if(inQuotes&&line[i+1]==='"'){cur+='"';i++;}
      else{inQuotes=!inQuotes;}
    }else if(ch===','&&!inQuotes){
      result.push(cur);cur='';
    }else{
      cur+=ch;
    }
  }
  result.push(cur);
  return result;
}

function saveQuickExtraRoles(accountId){
  const wrap=document.getElementById('qer-list');
  if(!wrap)return;
  const selected=[];
  wrap.querySelectorAll('input[type="checkbox"]:checked').forEach(cb=>{selected.push(cb.value);});
  
  const accounts=DB.get('accounts')||[];
  const i=accounts.findIndex(a=>a.id===accountId);
  if(i<0)return;
  
  if(selected.length){
    accounts[i].extraRoles=selected;
  }else{
    delete accounts[i].extraRoles;
  }
  accounts[i].updated=new Date().toISOString();
  DB.set('accounts',accounts);
  
  logA('Updated extra roles for '+accounts[i].username+': '+(selected.length?selected.map(r=>rL(r)).join(', '):'(none)'));
  toast(selected.length?'Extra roles updated · '+selected.length+' role(s) assigned':'Extra roles cleared','success');
  
  // If editing the currently-logged-in user, update CU and refresh switcher
  if(CU&&CU.id===accountId){
    if(selected.length)CU.extraRoles=selected;
    else delete CU.extraRoles;
    if(typeof renderRoleSwitcher==='function')renderRoleSwitcher();
  }
  
  closeM();
  // Refresh whichever page they came from
  if(_page==='teachers'&&typeof rTeachers==='function')rTeachers();
  else if(_page==='accounts'&&typeof rAccounts==='function')rAccounts();
}

// Get the active role for the current user (falls back to their primary role)
function getActiveRole(){
  if(!CU)return null;
  return window._activeRoleOverride||CU.role;
}

// Get all roles available to the current user
function getMyAvailableRoles(){
  if(!CU)return [];
  // ALWAYS include the primary (original) role + current role + all extras.
  // _origRole is set during a switch so the user can switch BACK to their primary role.
  const primary=CU._origRole||CU.role;
  const roles=[primary];
  // Include current active role if different (it's almost always in extraRoles already, but be safe)
  if(CU.role&&!roles.includes(CU.role))roles.push(CU.role);
  // Include all configured extra roles
  if(Array.isArray(CU.extraRoles)){
    CU.extraRoles.forEach(r=>{if(r&&!roles.includes(r))roles.push(r);});
  }
  return roles;
}

// Switch the active role (re-render the app without re-logging in)
function switchActiveRole(newRole){
  const avail=getMyAvailableRoles();
  if(!avail.includes(newRole)){toast('You don\'t have access to that role','danger');return;}
  
  // Capture the primary role on first switch
  if(!CU._origRole)CU._origRole=CU.role;
  
  // If switching back to primary, we can clear the override
  if(newRole===CU._origRole){
    window._activeRoleOverride=null;
    try{sessionStorage.removeItem('sms7_active_role_override');}catch(e){}
  }else{
    window._activeRoleOverride=newRole;
    try{sessionStorage.setItem('sms7_active_role_override',newRole);}catch(e){}
  }
  
  // Update CU.role to the new active role (so all role-check code throughout the app works)
  CU.role=newRole;
  
  logA('Switched active role to: '+rL(newRole));
  toast(newRole===CU._origRole?'Back to primary role: '+rL(newRole):'Now acting as: '+rL(newRole),'success');
  
  // Rebuild navigation (which is role-based)
  if(typeof buildNav==='function')buildNav();
  // Go to dashboard
  if(typeof navigate==='function')navigate('dashboard');
  // Update the role display in the sidebar
  const sbur=document.getElementById('sbur');if(sbur)sbur.textContent=rL(newRole);
  // Re-render the role switcher itself (to show the new active role)
  if(typeof renderRoleSwitcher==='function')renderRoleSwitcher();
}

// Restore active role on page load if there's a session-saved override
function restoreActiveRoleOnLoad(){
  if(!CU)return;
  try{
    const saved=sessionStorage.getItem('sms7_active_role_override');
    if(saved&&saved!==CU.role){
      const avail=getMyAvailableRoles();
      if(avail.includes(saved)){
        CU._origRole=CU.role;
        CU.role=saved;
        window._activeRoleOverride=saved;
      }
    }
  }catch(e){}
}

// Render the role switcher in the topbar — only visible when extraRoles exist
function renderRoleSwitcher(){
  // Only show if user has more than one available role
  const avail=getMyAvailableRoles();
  // Always use the ORIGINAL (primary) role + extras to build the switcher list
  const primary=CU._origRole||CU.role;
  const allRoles=[primary,...(Array.isArray(CU.extraRoles)?CU.extraRoles:[])];
  if(allRoles.length<=1)return;
  
  const currentRole=CU.role; // currently active
  let sw=document.getElementById('role-switcher');
  if(!sw){
    sw=document.createElement('div');
    sw.id='role-switcher';
    sw.className='tbg';
    sw.style.cssText='display:flex;align-items:center;gap:5px;cursor:pointer;position:relative;font-size:11px';
    sw.title='Switch your active role (no need to log out)';
    // Insert before the date element in topbar (or before session indicator if it exists)
    const tbd=document.getElementById('tbd');
    const sesInd=document.getElementById('ses-ind');
    const insertBefore=sesInd||tbd;
    if(insertBefore&&insertBefore.parentNode){insertBefore.parentNode.insertBefore(sw,insertBefore);}
  }
  sw.innerHTML='<span style="color:var(--pu)">🎭</span><span><strong>'+esc(rL(currentRole))+'</strong></span><span style="opacity:.6">▾</span>';
  sw.onclick=(e)=>{e.stopPropagation();showRoleSwitcherMenu(sw,allRoles,currentRole);};
}

function showRoleSwitcherMenu(anchor,roles,currentRole){
  // Remove any existing menu
  const existing=document.getElementById('role-switcher-menu');
  if(existing){existing.remove();return;}
  
  const menu=document.createElement('div');

// ─── SOFT-DELETE / RECYCLE BIN ────────────────────────────

const RECYCLE_TTL_DAYS=30;

function recycleBinAdd(collectionKey,removedItems){
  if(!removedItems||!removedItems.length)return;
  const newEntries=removedItems.map((item,idx)=>({
    id:'rec'+Date.now()+'_'+idx+'_'+Math.random().toString(36).slice(2,7),
    collection:collectionKey,
    item,
    deletedAt:new Date().toISOString(),
    deletedBy:CU?(CU.firstName+' '+CU.lastName):'system',
    deletedById:CU?CU.id:null,
    schoolId:typeof getActiveSchoolId==='function'?getActiveSchoolId():'default_school'
  }));
  const localBin=DB._raw_get('recycle_bin')||[];
  const localIds=new Set(localBin.map(e=>e.id));
  newEntries.forEach(e=>{if(!localIds.has(e.id))localBin.push(e);});
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-RECYCLE_TTL_DAYS);
  const localFiltered=localBin.filter(e=>new Date(e.deletedAt)>cutoff);
  DB._raw_set('recycle_bin',localFiltered);
  if(window.__FB&&window.__FB.db){
    (async function(){
      try{
        const{db,ref,get,set}=window.__FB;
        const snap=await get(ref(db,'data/recycle_bin'));
        let cloudBin=snap.exists()?snap.val():[];
        if(cloudBin&&typeof cloudBin==='object'&&!Array.isArray(cloudBin)){
          const ks=Object.keys(cloudBin);
          if(ks.length>0&&ks.every(k=>/^\d+$/.test(k))){const a=[];ks.sort((x,y)=>+x-+y).forEach(k=>a.push(cloudBin[k]));cloudBin=a;}else cloudBin=Object.values(cloudBin);
        }
        if(!Array.isArray(cloudBin))cloudBin=[];
        const seen=new Set();
        const merged=[];
        [...cloudBin,...localBin,...newEntries].forEach(e=>{if(e&&e.id&&!seen.has(e.id)){seen.add(e.id);merged.push(e);}});
        const finalFiltered=merged.filter(e=>new Date(e.deletedAt)>cutoff);
        await set(ref(db,'data/recycle_bin'),finalFiltered);
        window.__fbSyncPaused=true;
        localStorage.setItem('sms7_recycle_bin',JSON.stringify(finalFiltered));
        window.__fbSyncPaused=false;
        console.log('[FB] Recycle bin merged: '+finalFiltered.length+' total entries');
      }catch(e){console.warn('[FB] Recycle bin merge failed:',e);}
    })();
  }
}

(function installRecycleHook(){
  if(DB._recycleHooked)return;
  const origSet=DB.set.bind(DB);
  // Keys to track for recycle-bin soft-delete — session-scoped AND global array collections
  const RECYCLE_TRACKED_KEYS=['accounts','academic_calendar','announcements','infraction_forms','visit_forms','schools','sessions'];
  DB.set=function(k,v){
    const isTracked=Array.isArray(v)&&(
      (typeof SESSION_SCOPED_KEYS!=='undefined'&&SESSION_SCOPED_KEYS.includes(k))||
      RECYCLE_TRACKED_KEYS.includes(k)
    );
    if(isTracked){
      try{
        const prev=RECYCLE_TRACKED_KEYS.includes(k)?(DB._raw_get?DB._raw_get(k):null):DB.get(k);
        if(Array.isArray(prev)&&prev.length>v.length){
          const newIds=new Set(v.map(x=>x&&x.id).filter(Boolean));
          const removed=prev.filter(x=>x&&x.id&&!newIds.has(x.id));
          if(removed.length){
            const cleanRemoved=removed.filter(x=>!x._restored);
            if(cleanRemoved.length)recycleBinAdd(k,cleanRemoved);
          }
        }
      }catch(e){console.warn('Recycle hook error:',e);}
    }
    return origSet(k,v);
  };
  DB._recycleHooked=true;
})();

// ─── BACKEND ADMIN BROADCAST (real-time control) ─────────
// Backend Admin can push commands to all connected client devices via Firebase.
// Clients listen for broadcasts and execute them (force reload, lock school, push announcement).
(function initBackendBroadcast(){
  if(!window.__FB)return;
  function listenForBroadcasts(){
    if(!window.__FB||!window.__FB.db)return;
    const{db,ref,onValue}=window.__FB;
    onValue(ref(db,'broadcasts/global'),(snap)=>{
      const cmd=snap.val();
      if(!cmd||!cmd.ts)return;
      if(Date.now()-cmd.ts>30000)return;
      if(cmd.action==='reload'){toast('System update — reloading...','info');setTimeout(()=>location.reload(),2000);}
      else if(cmd.action==='lock_school'&&CU&&CU.schoolId===cmd.schoolId){
        toast('Your school has been locked by the administrator','danger');
        doLogout();
      }
      else if(cmd.action==='announcement'&&cmd.message){toast(cmd.message,'info');}
    });
    // Per-school broadcasts
    if(typeof CU!=='undefined'&&CU&&CU.schoolId){
      onValue(ref(db,'broadcasts/'+CU.schoolId),(snap)=>{
        const cmd=snap.val();
        if(!cmd||!cmd.ts||Date.now()-cmd.ts>30000)return;
        if(cmd.action==='reload'){toast('School update — reloading...','info');setTimeout(()=>location.reload(),2000);}
        else if(cmd.action==='logout'){toast('Session ended by administrator','danger');doLogout();}
      });
    }
  }
  setTimeout(listenForBroadcasts,2000);
})();
// Backend Admin sends a broadcast
function sendBroadcast(target,action,extra){
  if(!window.__FB||!window.__FB.db)return;
  const{db,ref,set}=window.__FB;
  const cmd=Object.assign({action,ts:Date.now(),sentBy:CU?CU.id:'system'},extra||{});
  set(ref(db,'broadcasts/'+target),cmd).then(()=>{
    toast('Broadcast sent: '+action,'success');
  }).catch(e=>{toast('Broadcast failed: '+e.message,'danger');});
}

function saveSchoolEdit(id){

function switchSchool(id){
  const s=getAllSchools().find(x=>x.id===id);if(!s)return;
  if(!confirm('Switch to school "'+s.name+'"?\n\nThe page will reload to show this school\'s data.'))return;
  DB._raw_set('active_school_id',id);
  logA('Backend Admin switched active school to: '+s.name);
  toast('Active school: '+s.name,'success');
  setTimeout(()=>location.reload(),700);
}

function delSchool(id){
  const schools=getAllSchools();
  const s=schools.find(x=>x.id===id);if(!s)return;
  if(s.id===getActiveSchoolId()){toast('Cannot delete the active school','danger');return;}
  if(!confirm('⚠️ DELETE school "'+s.name+'"?'))return;
  const typed=prompt('Type "'+s.name+'" to confirm:');
  if(typed!==s.name){toast('Name did not match','danger');return;}
  // Add school to recycle bin before removing
  if(typeof recycleBinAdd==='function'){recycleBinAdd('schools',[s]);}
  const filtered=schools.filter(x=>x.id!==id);
  DB._raw_set('schools',filtered);
  // Push deletion to Firebase directly to prevent stale data restoring on refresh
  if(window.__FB&&window.__SYNC_ON){
    try{var{db,ref,set}=window.__FB;set(ref(db,'data/schools'),filtered.length?filtered:null).catch(function(e){console.warn('[FB] School delete sync failed:',e);});}catch(e){}
  }
  logA('DELETED school: '+s.name);
  toast('School deleted','danger');
  rSchools();
}

async function rRecycleBin(){
  if(!['backend_admin','superadmin'].includes(CU.role)){
    document.getElementById('pc').innerHTML='<div class="emp"><div class="ei">🔒</div><p>Access restricted</p></div>';
    return;
  }
  // FORCE fresh pull from Firebase so backend admin sees deletions from any device in the world
  if(window.__FB&&window.__FB.db){
    try{
      const{db,ref,get}=window.__FB;
      const snap=await get(ref(db,'data/recycle_bin'));
      if(snap.exists()){
        let v=snap.val();
        if(v&&typeof v==='object'&&!Array.isArray(v)){
          const ks=Object.keys(v);
          if(ks.length>0&&ks.every(k=>/^\d+$/.test(k))){const a=[];ks.sort((x,y)=>+x-+y).forEach(k=>a.push(v[k]));v=a;}
        }
        if(Array.isArray(v)){
          window.__fbSyncPaused=true;
          localStorage.setItem('sms7_recycle_bin',JSON.stringify(v));
          window.__fbSyncPaused=false;
        }
      }
    }catch(e){console.warn('[FB] Recycle bin pull failed:',e);}
  }
  const bin=DB._raw_get('recycle_bin')||[];
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-RECYCLE_TTL_DAYS);
  const active=bin.filter(e=>new Date(e.deletedAt)>cutoff);
  if(active.length!==bin.length)DB._raw_set('recycle_bin',active);
  const byCol={};
  active.forEach(e=>{if(!byCol[e.collection])byCol[e.collection]=[];byCol[e.collection].push(e);});
  document.getElementById('pc').innerHTML='<div class="card" style="margin-bottom:13px"><div class="sh2"><h3>♻️ Recycle Bin ('+active.length+')</h3><div style="display:flex;gap:6px"><button class="btn bg2 bsm" onclick="rRecycleBin()">🔄 Refresh</button>'+(active.length?'<button class="btn bd3 bsm" onclick="emptyRecycleBin()">🗑️ Empty All</button>':'')+'</div></div><div style="font-size:11px;color:var(--tx3);margin-top:4px">Deleted items are kept here for '+RECYCLE_TTL_DAYS+' days. Shows deletions from ALL schools and devices.</div></div>'
  +(active.length?Object.entries(byCol).sort(([a],[b])=>a.localeCompare(b)).map(([col,entries])=>{
    return'<div class="card" style="margin-bottom:11px"><div class="sh2"><h3>📦 '+esc(col.replace(/_/g,' ').replace(/\b\w/g,m=>m.toUpperCase()))+' ('+entries.length+')</h3><button class="btn bg2 bxs" onclick="restoreAllFromBin(\''+col+'\')">↩️ Restore All</button></div><div class="tw"><table><thead><tr><th>Item</th><th>Deleted</th><th>By</th><th>Days Left</th><th>Actions</th></tr></thead><tbody>'+entries.slice().sort((a,b)=>(b.deletedAt||'').localeCompare(a.deletedAt||'')).map(e=>{
      const daysLeft=Math.max(0,RECYCLE_TTL_DAYS-Math.floor((Date.now()-new Date(e.deletedAt).getTime())/86400000));
      const item=e.item||{};
      let label=item.name||item.title||item.studentName||item.subject||item.trackNo;
      if(!label&&item.firstName)label=item.firstName+' '+(item.lastName||'');
      if(!label)label=item.id||'(no label)';
      return'<tr><td style="font-size:11px"><strong>'+esc(label)+'</strong>'+(item.id?'<br><code style="font-size:9px;color:var(--tx3)">'+esc(item.id)+'</code>':'')+'</td><td style="font-size:10px;color:var(--tx3)">'+(e.deletedAt||'').split('T')[0]+'<br><span style="font-size:9px">'+((e.deletedAt||'').split('T')[1]||'').slice(0,5)+'</span></td><td style="font-size:11px">'+esc(e.deletedBy||'—')+'</td><td><span class="badge '+(daysLeft<=3?'brd':daysLeft<=7?'bgo':'bbl')+'">'+daysLeft+'d</span></td><td style="display:flex;gap:4px"><button class="btn bp bxs" onclick="restoreFromBin(\''+e.id+'\')">↩️ Restore</button><button class="btn bg2 bxs" onclick="viewBinItem(\''+e.id+'\')">View</button><button class="btn bd3 bxs" onclick="purgeBinItem(\''+e.id+'\')">🗑️</button></td></tr>';
    }).join('')+'</tbody></table></div></div>';
  }).join(''):'<div class="emp"><div class="ei">♻️</div><p>Recycle bin is empty</p><div style="font-size:11px;color:var(--tx3);margin-top:5px">Deleted records appear here for 30 days before being permanently removed.</div></div>');
}

function restoreFromBin(id){
  const bin=DB._raw_get('recycle_bin')||[];
  const entry=bin.find(e=>e.id===id);
  if(!entry)return;
  const collection=entry.collection;
  const sid=window.__activeSessionId||(typeof getActiveSessionId==='function'?getActiveSessionId():'default');
  const storageKey=(typeof SESSION_SCOPED_KEYS!=='undefined'&&SESSION_SCOPED_KEYS.includes(collection))?collection+'_'+sid:collection;
  const fullList=DB._raw_get(storageKey)||[];
  if(entry.item.id&&fullList.some(x=>x.id===entry.item.id)){toast('Item already exists','danger');return;}
  const restored={...entry.item,_restored:true,_restoredAt:new Date().toISOString(),_restoredBy:CU.firstName+' '+CU.lastName};
  fullList.push(restored);
  DB._raw_set(storageKey,fullList);
  DB._raw_set('recycle_bin',bin.filter(e=>e.id!==id));
  logA('Restored '+collection+' item');
  toast('Item restored','success');
  rRecycleBin();
}

function restoreAllFromBin(collection){
  const bin=DB._raw_get('recycle_bin')||[];
  const entries=bin.filter(e=>e.collection===collection);
  if(!entries.length)return;
  if(!confirm('Restore all '+entries.length+' item(s) from '+collection+'?'))return;
  entries.forEach(e=>restoreFromBin(e.id));
}

function viewBinItem(id){
  const bin=DB._raw_get('recycle_bin')||[];
  const e=bin.find(x=>x.id===id);if(!e)return;
  openM('<div class="mh"><h3>📦 Recycled Item</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2">'
  +'<div class="cg g2" style="margin-bottom:12px;font-size:12px"><div><div style="font-size:10px;color:var(--tx3)">Collection</div><div style="font-weight:600">'+esc(e.collection)+'</div></div><div><div style="font-size:10px;color:var(--tx3)">Deleted</div><div style="font-weight:600">'+esc(e.deletedAt||'')+'</div></div><div><div style="font-size:10px;color:var(--tx3)">By</div><div style="font-weight:600">'+esc(e.deletedBy||'—')+'</div></div></div>'
  +'<div class="fg" style="margin-bottom:0"><label>Item Data (JSON)</label><pre style="background:var(--sf2);padding:11px;border-radius:var(--rs);font-size:11px;line-height:1.5;max-height:340px;overflow-y:auto;white-space:pre-wrap">'+esc(JSON.stringify(e.item,null,2))+'</pre></div>'

function purgeBinItem(id){
  if(!confirm('Permanently delete this item?'))return;
  const bin=DB._raw_get('recycle_bin')||[];
  DB._raw_set('recycle_bin',bin.filter(e=>e.id!==id));

function emptyRecycleBin(){
  if(!confirm('⚠️ Permanently delete ALL items? Cannot be undone.'))return;
  DB._raw_set('recycle_bin',[]);

}

function permEditM(accountId){

  if(window._workingPermsAccountId!==accountId){

function permSet(pageId,level){

// ═══ APPENDED: Multi-School Module ═══
// ═══════════════════════════════════════════════════════════
// MULTI-SCHOOL ENHANCEMENT
// 
// Adds true per-school data isolation:
// - DB.set/get for school-scoped keys is prefixed with active school ID
// - Storage keys become "<schoolId>__<key>" (e.g. "sch_abc__students_default")
// - Backend Admin switching school changes the prefix → sees that school's data
// - Schools and a few system keys remain GLOBAL (no prefix)
// - New schools auto-seed with their own sessions, settings, default accounts
// ═══════════════════════════════════════════════════════════

// Keys that stay GLOBAL (not scoped per-school)
const GLOBAL_KEYS=[
  'schools',              // the schools registry itself
  'active_school_id',     // which school is active
  'system_appearance',    // global UI customization
  'recycle_bin',          // shared (entries record their schoolId)
  'sv7',                  // seed-version marker (per browser)
  'sb_seed_marker'        // multi-school seed tracker (used below)
];

// Backend Admin account is global (lives in 'accounts' table without school prefix).
// All OTHER staff accounts have a schoolId field and live under the school's accounts table.

function isGlobalKey(k){
  if(GLOBAL_KEYS.includes(k))return true;
  // Recycle bin sub-keys
  if(k.startsWith('recycle_'))return true;
  return false;
}

// Get currently active school id (for Backend Admin, set explicitly; for everyone else, their account's schoolId)
function getCurrentSchoolId(){
  if(typeof CU!=='undefined'&&CU){
    if(CU.role==='backend_admin'){
      // Backend Admin sees whichever school they've selected
      return localStorage.getItem('sms7_active_school_id')||'default_school';
    }
    // Regular staff are bound to their school
    return CU.schoolId||'default_school';
  }
  return localStorage.getItem('sms7_active_school_id')||'default_school';
}

// Wrap DB.set/get one more level to add school scoping above session scoping.
// This wraps the EXISTING (already session-wrapped) DB, so the chain becomes:
//   user calls DB.get('students')
//   → school wrapper: route to school-scoped key
//   → session wrapper: route to session-scoped key
//   → raw storage / Firebase
(function wrapDBWithSchool(){
  if(DB._schoolWrapped)return;
  // Capture the current set/get (already session-wrapped from earlier)
  const sessionGet=DB.get.bind(DB);
  const sessionSet=DB.set.bind(DB);
  const rawGet=DB._raw_get;
  const rawSet=DB._raw_set;
  
  // Helper: get the school-prefixed key
  function schoolKey(k){
    if(isGlobalKey(k))return k;
    // Accounts is mostly global EXCEPT we want per-school staff accounts.
    // We use 'accounts' for global (backend admin), 'school_accounts' for per-school staff.
    // To keep backward compat, we keep 'accounts' global and add school filtering at read time.
    if(k==='accounts')return k; // global
    const sid=getCurrentSchoolId();
    if(!sid||sid==='default_school')return k; // default school uses unprefixed keys for backward compatibility
    return sid+'__'+k;
  }
  
  // Wrap session-aware get
  DB.get=function(k){
    const realKey=schoolKey(k);
    if(realKey===k){
      // Global or default school — call through to session wrapper
      return sessionGet(k);
    }
    // School-scoped — bypass the session wrapper since the school prefix already isolates,
    // but we still need session scoping within the school. Use raw access with manual session suffix.
    // For session-scoped keys: read <schoolId>__<key>_<sessionId>
    if(typeof SESSION_SCOPED_KEYS!=='undefined'&&SESSION_SCOPED_KEYS.includes(k)){
      const sid=window.__activeSessionId||(typeof getActiveSessionId==='function'?getActiveSessionId():'default');
      return rawGet(realKey+'_'+sid);
    }
    return rawGet(realKey);
  };
  
  DB.set=function(k,v){
    const realKey=schoolKey(k);
    if(realKey===k){
      return sessionSet(k,v);
    }
    if(typeof SESSION_SCOPED_KEYS!=='undefined'&&SESSION_SCOPED_KEYS.includes(k)){
      const sid=window.__activeSessionId||(typeof getActiveSessionId==='function'?getActiveSessionId():'default');
      return rawSet(realKey+'_'+sid,v);
    }
    return rawSet(realKey,v);
  };
  
  DB._schoolWrapped=true;
  DB._sessionGet=sessionGet;
  DB._sessionSet=sessionSet;
  
  console.log('[Multi-School] DB wrapped — current school: '+getCurrentSchoolId());
})();

// ─── SCHOOL-AWARE ACCOUNT FILTERING ───────────────────────
// 'accounts' is global, but we want each school to see only its own accounts
// (except backend_admin which is system-wide).

function getAccountsForSchool(schoolId){
  const all=(DB._raw_get?DB._raw_get('accounts'):JSON.parse(localStorage.getItem('sms7_accounts')||'[]'))||[];
  if(!schoolId)return all;
  return all.filter(a=>{
    if(a.role==='backend_admin')return true; // backend admin appears in every school's list (so they can be edited)
    return a.schoolId===schoolId||(schoolId==='default_school'&&!a.schoolId);
  });
}

// Wrap accounts read: when CU exists, scope to their school automatically
const _origDBGet=DB.get;
DB.get=function(k){
  if(k==='accounts'&&typeof CU!=='undefined'&&CU&&CU.role!=='backend_admin'){
    // Regular users see only their school's accounts
    return getAccountsForSchool(CU.schoolId||'default_school');
  }
  if(k==='accounts'&&typeof CU!=='undefined'&&CU&&CU.role==='backend_admin'){
    // Backend admin sees ALL accounts across all schools — no restrictions
    const allRaw=(DB._raw_get?DB._raw_get('accounts'):JSON.parse(localStorage.getItem('sms7_accounts')||'[]'))||[];
    return allRaw;
  }
  return _origDBGet(k);
};

// Wrap accounts write: preserve other schools' accounts when writing
const _origDBSet=DB.set;
DB.set=function(k,v){
  if(k==='accounts'&&Array.isArray(v)&&typeof CU!=='undefined'&&CU){
    if(CU.role==='backend_admin'){
      // Backend admin sees ALL accounts — write directly without merge
      return _origDBSet(k,v);
    }
    // Regular staff: merge back with other schools' accounts
    const allRaw=(DB._raw_get?DB._raw_get('accounts'):JSON.parse(localStorage.getItem('sms7_accounts')||'[]'))||[];
    const myScope=CU.schoolId||'default_school';
    const otherSchools=allRaw.filter(a=>{
      if(a.role==='backend_admin')return false;
      if(myScope==='default_school'){
        return a.schoolId&&a.schoolId!=='default_school';
      }
      return a.schoolId!==myScope;
    });
    const backendAdmins=allRaw.filter(a=>a.role==='backend_admin');
    const stamped=v.map(a=>{
      if(a.role==='backend_admin')return a;
      if(!a.schoolId)return{...a,schoolId:myScope};
      return a;
    });
    const stampedNoBA=stamped.filter(a=>a.role!=='backend_admin');
    const baInStamped=stamped.filter(a=>a.role==='backend_admin');
    const finalBA=baInStamped.length?baInStamped:backendAdmins;
    const merged=[...finalBA,...otherSchools,...stampedNoBA];
    return _origDBSet(k,merged);
  }
  return _origDBSet(k,v);
};

// ─── NEW SCHOOL: AUTO-INITIALIZE ──────────────────────────
// When Backend Admin creates a new school, fully populate it with:
// - A default Super Admin account (already done in saveNewSchool)
// - A default settings record
// - A default session
// - Empty collections ready to use
// All under the new school's prefix.

function initializeNewSchool(schoolId,schoolName){
  // Switch to the new school temporarily for raw writes
  // We use _raw_set with the schoolId prefix directly so we don't depend on getCurrentSchoolId
  const rs=DB._raw_set;
  
  // 1) Settings for this school
  rs(schoolId+'__settings',{
    schoolName:schoolName,
    schoolNameAr:'',
    city:'',
    academicYear:new Date().getFullYear()+'-'+(new Date().getFullYear()+1),
    logo:'🎓',
    liveMode:false
  });
  
  // 2) Default session
  const today=new Date().toISOString().split('T')[0];
  const future=new Date();future.setFullYear(future.getFullYear()+1);
  const defaultSessionId='default';
  rs(schoolId+'__sessions',[{
    id:defaultSessionId,
    name:'Default Session',
    startDate:today,
    endDate:future.toISOString().split('T')[0],
    created:new Date().toISOString(),
    createdBy:CU?(CU.firstName+' '+CU.lastName):'system',
    isActive:true
  }]);
  rs(schoolId+'__active_session_id',defaultSessionId);
  
  // 3) Empty collections (session-scoped — use the default session bucket)
  const emptyCollections=['students','teachers','complaints','tasks','task_requests',
    'infractions','referrals','behaviour','class_visits','notebook_checks',
    'activities','activity_reports','discipline','exam_absents','reexam_schedules',
    'announcements','daily_attendance','student_health','remedial_plans','vp_reports',
    'warning_letters','teacher_achievements','early_pickups','duty_rosters','substitutions'];
  emptyCollections.forEach(coll=>{
    rs(schoolId+'__'+coll+'_'+defaultSessionId,[]);
  });
  
  // 4) Academic calendar (global within the school)
  rs(schoolId+'__academic_calendar',[]);
  
  // 5) Mark this school as initialized
  rs(schoolId+'__initialized',true);
  
  console.log('[Multi-School] Initialized new school: '+schoolId+' ('+schoolName+')');
}

async function saveAccountForSchool(schoolId){
  const fn=document.getElementById('nas-fn').value.trim();
  const ln=document.getElementById('nas-ln').value.trim();
  const u=document.getElementById('nas-u').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const p=document.getElementById('nas-p').value.trim();
  const r=document.getElementById('nas-r').value;
  const e=document.getElementById('nas-e').value.trim();
  const ph=document.getElementById('nas-ph').value.trim();
  if(!fn||!u||!p||!r){toast('First name, username, password, and role are required','danger');return;}
  const all=DB._raw_get('accounts')||[];
  if(all.some(a=>a.username.toLowerCase()===u.toLowerCase())){toast('Username already exists','danger');return;}
  all.push({
    id:'u_'+Date.now().toString(36),
    username:u,password:await hashPassword(p),role:r,
    firstName:fn,lastName:ln,
    email:e,phone:ph,
    active:true,
    theme:'blue',lang:'en',
    schoolId:schoolId,
    created:new Date().toISOString().split('T')[0]
  });
  DB._raw_set('accounts',all);
  logA('Backend Admin created '+r+' account "'+u+'" for school '+schoolId);
  toast('Account created','success');
  closeM();
  setTimeout(()=>viewSchoolAccounts(schoolId),50);
}

async function saveAccountEditForSchool(accId,schoolId){
  const all=DB._raw_get('accounts')||[];
  const i=all.findIndex(x=>x.id===accId);if(i<0)return;
  all[i].firstName=document.getElementById('eas-fn').value.trim();
  all[i].lastName=document.getElementById('eas-ln').value.trim();
  all[i].username=document.getElementById('eas-u').value.trim();
  const newPw=document.getElementById('eas-p').value.trim();
  if(newPw){
    all[i].password=await hashPassword(newPw);
    all[i]._pwdChangedAt=new Date().toISOString();
    delete all[i]._mustChangePassword;
  }
  all[i].role=document.getElementById('eas-r').value;
  all[i].email=document.getElementById('eas-e').value.trim();
  all[i].phone=document.getElementById('eas-ph').value.trim();
  all[i].active=document.getElementById('eas-active').checked;
  DB._raw_set('accounts',all);
  logA('Backend Admin edited account '+all[i].username);
  toast('Account updated','success');
  closeM();
  setTimeout(()=>viewSchoolAccounts(schoolId),50);
}

function delAccountForSchool(accId,schoolId){
  const all=DB._raw_get('accounts')||[];
  const a=all.find(x=>x.id===accId);if(!a)return;
  if(!confirm('Delete account "'+a.username+'"?'))return;
  if(typeof recycleBinAdd==='function')recycleBinAdd('accounts',[a]);
  DB._raw_set('accounts',all.filter(x=>x.id!==accId));
  logA('Backend Admin deleted account '+a.username);
  toast('Account deleted','danger');
  setTimeout(()=>viewSchoolAccounts(schoolId),50);
}

// ─── BACKEND ADMIN IMPERSONATION: ACT AS SCHOOL'S SUPER ADMIN ─
// When Backend Admin switches to a school, they should have FULL access to that school's
// data — students, teachers, complaints, infractions, all features.
// The cleanest way: when Backend Admin clicks "Switch To", we set their CU.role to 'superadmin'
// for that school's session. They keep the role-switcher to return to backend_admin view.

(function(){
  if(typeof window.switchSchool!=='function')return;
  const origSwitch=window.switchSchool;
  window.switchSchool=function(id){
    const schools=getAllSchools();
    const s=schools.find(x=>x.id===id);
    if(!s)return;
    if(!confirm('Switch to "'+s.name+'"?\n\nYou will be logged in as the Super Admin of this school. The page will reload.'))return;
    // Auto-initialize if needed
    if(!DB._raw_get(id+'__initialized')&&id!=='default_school'){
      initializeNewSchool(id,s.name);
    }
    DB._raw_set('active_school_id',id);
    // Set a marker so on reload we know to elevate Backend Admin's session to Super Admin of this school
    if(CU&&CU.role==='backend_admin'){
      try{sessionStorage.setItem('sms7_ba_school_session',JSON.stringify({schoolId:id,baAccountId:CU.id,baUsername:CU.username}));}catch(e){}
    }
    logA('Backend Admin switched to school: '+s.name);
    toast('Switching to '+s.name+'…','success');
    setTimeout(()=>location.reload(),700);
  };
})();

// On boot, if Backend Admin had switched to a school, restore that session as Super Admin
(function(){
  const origLaunch=window.launch;
  if(typeof origLaunch!=='function')return;
  window.launch=function(){
    origLaunch.apply(this,arguments);
    // Check for Backend Admin school-session restoration
    try{
      const sess=sessionStorage.getItem('sms7_ba_school_session');
      if(!sess||!CU||CU.role!=='backend_admin')return;
      const info=JSON.parse(sess);
      if(info.baAccountId!==CU.id)return;
      // Elevate this session to Super Admin of the target school
      CU._origRole='backend_admin';
      CU._origUsername=CU.username;
      CU._baActingAsSchool=info.schoolId;
      CU.role='superadmin';
      const schools=getAllSchools();
      const school=schools.find(s=>s.id===info.schoolId);
      if(school){
        const sbur=document.getElementById('sbur');if(sbur)sbur.textContent='Backend Admin → '+school.name+' (as Super Admin)';
        // Update sidebar avatar + show a banner
        showBackendAdminSchoolBanner(school);
      }
      // Rebuild nav for Super Admin view
      if(typeof buildNav==='function')buildNav();
      if(typeof navigate==='function')navigate('dashboard');
    }catch(e){console.warn('BA session restore error:',e);}
  };
})();

  // Add a persistent banner at the top showing "You're Backend Admin acting as Super Admin of <school>"
  let banner=document.getElementById('ba-school-banner');
  if(!banner){

function exitBackendAdminSchool(){

// LIVE MULTI-SCHOOL + CROSS-SCHOOL PERMISSION MANAGER
//
// 1. Schools stay "live all the time" — Backend Admin can switch schools
//    instantly without reload via a top-bar school picker.

//    in that school, and sets per-page Hidden/View/Full for each one.

// ─── LIVE SCHOOL SWITCHER (no reload) ─────────────────────

function switchSchoolLive(newSchoolId){
  if(!CU||CU.role!=='backend_admin'&&CU._origRole!=='backend_admin'){
    toast('Only Backend Admin can switch schools','danger');return;
  }
  const schools=getAllSchools();
  const school=schools.find(s=>s.id===newSchoolId);
  if(!school){toast('School not found','danger');return;}
  
  // Auto-initialize if needed
  if(!DB._raw_get(newSchoolId+'__initialized')&&newSchoolId!=='default_school'){
    if(typeof initializeNewSchool==='function')initializeNewSchool(newSchoolId,school.name);
  }
  
  // Set active school
  DB._raw_set('active_school_id',newSchoolId);
  
  // Update banner
  updateBackendAdminBanner(school);
  
  // Update sidebar role label to reflect new context
  const sbur=document.getElementById('sbur');
  if(sbur){
    if(newSchoolId==='default_school'){
      // Back in Backend Admin's own view if we have origRole, else show "Backend Admin"
      sbur.textContent='Backend Admin';
    }else{
      sbur.textContent='Backend Admin → '+school.name;
    }
  }
  
  // Update topbar school picker
  renderSchoolPicker();
  
  // Re-render current page so it shows the new school's data
  if(typeof navigate==='function'&&window._page){
    navigate(window._page);
  }
  
  logA('Backend Admin switched live to school: '+school.name);
  toast('Now viewing: '+school.name,'success');
}

// Render a school picker in the topbar (Backend Admin only)
function renderSchoolPicker(){
  if(!CU||(CU.role!=='backend_admin'&&CU._origRole!=='backend_admin'))return;
  const schools=getAllSchools();
  if(schools.length<=1)return; // only show picker when multiple schools exist
  
  const activeId=getActiveSchoolId();
  let picker=document.getElementById('ba-school-picker');
  if(!picker){
    picker=document.createElement('div');
    picker.id='ba-school-picker';
    picker.style.cssText='display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:linear-gradient(135deg,#9d4edd,#5a189a);color:#fff;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;margin-right:8px';
    // Insert into topbar before date
    const tbd=document.getElementById('tbd');
    const tbav=document.getElementById('tbav');
    const insertBefore=tbd||tbav;
    if(insertBefore&&insertBefore.parentNode){
      insertBefore.parentNode.insertBefore(picker,insertBefore);
    }
  }
  const active=schools.find(s=>s.id===activeId)||schools[0];
  picker.innerHTML='🏫 <span>'+esc(active.name)+'</span> ▾';
  picker.onclick=(e)=>{e.stopPropagation();showSchoolPickerMenu(picker);};
}

function showSchoolPickerMenu(anchor){
  const existing=document.getElementById('ba-school-picker-menu');
  if(existing){existing.remove();return;}
  const schools=getAllSchools();
  const activeId=getActiveSchoolId();
  const menu=document.createElement('div');
  menu.id='ba-school-picker-menu';
  menu.style.cssText='position:absolute;top:100%;left:0;margin-top:5px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);box-shadow:0 6px 24px rgba(0,0,0,.3);z-index:1000;min-width:280px;overflow:hidden;max-height:380px;overflow-y:auto';
  menu.innerHTML='<div style="padding:8px 12px;background:linear-gradient(135deg,#9d4edd,#5a189a);color:#fff;font-size:10px;text-transform:uppercase;font-weight:700">🏫 Switch School (Live)</div>'
    +schools.map(s=>{
      const isAct=s.id===activeId;
      // Count this school's staff
      const accs=DB._raw_get('accounts')||[];
      const acCount=accs.filter(a=>{
        if(a.role==='backend_admin')return false;
        if(s.id==='default_school')return!a.schoolId||a.schoolId==='default_school';
        return a.schoolId===s.id;
      }).length;
      return'<div onclick="switchSchoolLive(\''+s.id+'\');document.getElementById(\'ba-school-picker-menu\').remove()" style="padding:10px 13px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;gap:8px;'+(isAct?'background:var(--ac2);color:var(--ac);font-weight:600':'')+'" onmouseover="this.style.background=\''+(isAct?'var(--ac2)':'var(--sf2)')+'\'" onmouseout="this.style.background=\''+(isAct?'var(--ac2)':'transparent')+'\'"><div><div>'+esc(s.logo||'🎓')+' <strong>'+esc(s.name)+'</strong></div><div style="font-size:10px;color:var(--tx3);margin-top:2px">'+esc(s.city||'—')+' · '+acCount+' staff</div></div>'+(isAct?'<span style="font-size:10px;background:var(--ac);color:#fff;padding:2px 7px;border-radius:8px">✓ Active</span>':'')+'</div>';
    }).join('')
    +'<div onclick="document.getElementById(\'ba-school-picker-menu\').remove();navigate(\'schools\')" style="padding:9px 13px;cursor:pointer;font-size:11px;background:var(--sf2);color:var(--ac);font-weight:600;text-align:center">⚙️ Manage Schools →</div>';
  anchor.appendChild(menu);
  setTimeout(()=>{
    const close=(e)=>{if(!menu.contains(e.target)&&e.target!==anchor&&!anchor.contains(e.target)){menu.remove();document.removeEventListener('click',close);}};
    document.addEventListener('click',close);

  const selectedSchool=selectedSchoolId==='__all__'?{id:'__all__',name:'All Schools',logo:'🌐'}:(schools.find(s=>s.id===selectedSchoolId)||schools[0]);

    document.getElementById('pc').innerHTML='<div class="emp"><div class="ei">🏫</div><p>No schools available. Create one first.</p></div>';
    return;

      if(selectedSchoolId==='__all__')return true;
      if(selectedSchoolId==='default_school')return!a.schoolId||a.schoolId==='default_school';
      return a.schoolId===selectedSchoolId||(!a.schoolId&&selectedSchoolId==='default_school');

  +(schoolStaff.length?'<div class="card"><div class="sh2"><h3>👥 '+(selectedSchoolId==='__all__'?'All Staff Across All Schools':'Staff in '+esc(selectedSchool?selectedSchool.name:''))+'</h3></div><div class="tw"><table><thead><tr><th>Staff Member</th><th>Role</th>'+(selectedSchoolId==='__all__'?'<th>School</th>':'')+'<th>Status</th><th>Permission Overrides</th><th>Actions</th></tr></thead><tbody>'+schoolStaff.map(a=>{

function permMgrToggleActive(accId,schoolId){
  const all=DB._raw_get('accounts')||[];
  const i=all.findIndex(a=>a.id===accId);
  if(i<0)return;
  const newState=!all[i].active;
  if(!confirm((newState?'Enable':'Disable')+' account "'+all[i].username+'"?\n\n'+(newState?'They will be able to log in again.':'They will not be able to log in until re-enabled.')))return;
  all[i].active=newState;
  DB._raw_set('accounts',all);
  logA('Backend Admin '+(newState?'enabled':'disabled')+' account: '+all[i].username);
  toast('Account '+(newState?'enabled':'disabled'),newState?'success':'danger');
  window._permMgrSchoolId=schoolId;
  rPermissionManager();
}

function permMgrDeleteStaff(accId,schoolId){
  const all=DB._raw_get('accounts')||[];
  const a=all.find(x=>x.id===accId);
  if(!a)return;
  if(!confirm('⚠️ DELETE account "'+a.username+'"?'))return;
  if(typeof recycleBinAdd==='function')recycleBinAdd('accounts',[a]);
  DB._raw_set('accounts',all.filter(x=>x.id!==accId));
  logA('Backend Admin deleted account: '+a.username);
  toast('Account deleted','danger');
  window._permMgrSchoolId=schoolId;
  rPermissionManager();
}

// Per-staff permission editor (richer than the old permEditM — covers more pages, includes "edit" mode)
function permMgrEditStaff(accId,schoolId){
  const all=DB._raw_get('accounts')||[];
  const a=all.find(x=>x.id===accId);
  if(!a)return;
  
  if(window._workingPermsAccountId!==accId){
    window._workingPerms=JSON.parse(JSON.stringify(a.permissions||{}));
    window._workingPermsAccountId=accId;
    window._workingPermsSchoolId=schoolId;
  }
  const working=window._workingPerms||{};
  
  // Use the same PAGE_LABELS and PERM_GROUPS from the existing rPermissions code
  const labels=typeof PAGE_LABELS!=='undefined'?PAGE_LABELS:{};
  const groups=typeof PERM_GROUPS!=='undefined'?PERM_GROUPS:[
    {name:'All Pages',pages:Object.keys(labels)}
  ];
  
  let body='<div class="mh"><h3>🛡️ Permissions: '+esc((a.firstName||'')+' '+(a.lastName||''))+'</h3><button class="mc" onclick="closeM();permMgrClearState()">×</button></div><div class="mb2">'
    +'<div class="al ai">📋 <strong>Role:</strong> '+esc(rL(a.role))+(Array.isArray(a.extraRoles)&&a.extraRoles.length?' (+'+a.extraRoles.map(r=>rL(r)).join(', ')+')':'')+'<br>'
    +'<span style="color:#d63838;font-weight:600">Hidden</span> = page invisible · '
    +'<span style="color:#dd6b20;font-weight:600">View</span> = read-only · '
    +'<span style="color:#10a169;font-weight:600">Full</span> = normal access</div>'
    +(a.role==='superadmin'?'<div class="al aw" style="margin-bottom:11px">⚡ <strong>Auto-Cascade:</strong> When you hide or restrict a page for this Super Admin, the same restriction is automatically applied to <strong>all other staff</strong> in this school. If Super Admin can\'t see it, nobody in the school can see it.</div>':'')
    +'<div style="display:flex;gap:6px;margin-bottom:11px;flex-wrap:wrap"><button class="btn bg2 bxs" onclick="permMgrSetAll(\'view\')">All View-Only</button><button class="btn bg2 bxs" onclick="permMgrSetAll(\'hidden\')">All Hidden</button><button class="btn bg2 bxs" onclick="permMgrClearAll()">Clear All</button></div>';
  
  groups.forEach(g=>{
    body+='<div class="card" style="margin-bottom:9px;padding:9px"><div style="font-size:11px;font-weight:700;color:var(--ac);background:var(--ac2);padding:5px 9px;border-radius:var(--rs);margin-bottom:7px;text-transform:uppercase">'+g.name+'</div>';
    g.pages.forEach(p=>{
      const val=working[p]||'full';
      const label=labels[p]||p;
      body+='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 4px;border-bottom:1px solid var(--bd);font-size:12px;gap:9px"><span style="flex:1">'+esc(label)+'</span><div style="display:flex;gap:3px">'+['hidden','view','full'].map(opt=>{
        const colors={hidden:'#d63838',view:'#dd6b20',full:'#10a169'};
        const active=val===opt;
        return'<button onclick="permMgrSet(\''+p+'\',\''+opt+'\')" style="padding:3px 10px;border:1.5px solid '+(active?colors[opt]:'var(--bd)')+';background:'+(active?colors[opt]:'transparent')+';color:'+(active?'#fff':'var(--tx2)')+';border-radius:var(--rs);font-size:10px;cursor:pointer;font-weight:600;text-transform:uppercase">'+(opt==='hidden'?'Hidden':opt==='view'?'View':'Full')+'</button>';
      }).join('')+'</div></div>';
    });
    body+='</div>';
  });
  
  body+='</div><div class="mf"><button class="btn bg2" onclick="closeM();permMgrClearState()">'+T('cancel')+'</button><button class="btn bp" onclick="permMgrSave(\''+accId+'\',\''+schoolId+'\')">💾 Save Permissions →</button></div>';
  openM(body,true);
}

function permMgrClearState(){
  delete window._workingPerms;
  delete window._workingPermsAccountId;
  delete window._workingPermsSchoolId;
}

function permMgrSet(pageId,level){
  if(!window._workingPerms)window._workingPerms={};
  if(level==='full')delete window._workingPerms[pageId];
  else window._workingPerms[pageId]=level;
  permMgrEditStaff(window._workingPermsAccountId,window._workingPermsSchoolId);
}

function permMgrSetAll(level){
  if(!window._workingPerms)window._workingPerms={};
  const groups=typeof PERM_GROUPS!=='undefined'?PERM_GROUPS:[];
  groups.forEach(g=>g.pages.forEach(p=>{
    if(level==='full')delete window._workingPerms[p];
    else window._workingPerms[p]=level;
  }));
  permMgrEditStaff(window._workingPermsAccountId,window._workingPermsSchoolId);
}

function permMgrClearAll(){
  window._workingPerms={};
  permMgrEditStaff(window._workingPermsAccountId,window._workingPermsSchoolId);
}

function permMgrSave(accId,schoolId){
  const all=DB._raw_get('accounts')||[];
  const i=all.findIndex(a=>a.id===accId);
  if(i<0)return;
  const perms=window._workingPerms||{};
  if(Object.keys(perms).length)all[i].permissions=perms;
  else delete all[i].permissions;
  
  // ═══ AUTO-CASCADE: If this is the Super Admin, apply hidden/view restrictions to ALL other staff in the same school
  const savedAccount=all[i];
  if(savedAccount.role==='superadmin'){
    const hiddenPages=Object.keys(perms).filter(p=>perms[p]==='hidden');
    const viewPages=Object.keys(perms).filter(p=>perms[p]==='view');
    if(hiddenPages.length||viewPages.length){
      // Find all OTHER staff in the same school (exclude superadmin and backend_admin)
      const schoolStaff=all.filter(a=>
        a.id!==accId&&
        a.role!=='backend_admin'&&
        a.role!=='superadmin'&&
        ((schoolId==='default_school'&&(!a.schoolId||a.schoolId==='default_school'))||a.schoolId===schoolId)
      );
      let cascadeCount=0;
      schoolStaff.forEach(staff=>{
        if(!staff.permissions)staff.permissions={};
        // Hidden pages cascade: if SA can't see it, nobody can
        hiddenPages.forEach(p=>{
          staff.permissions[p]='hidden';
        });
        // View-only pages cascade: staff gets at MOST view access (don't upgrade if already hidden)
        viewPages.forEach(p=>{
          if(staff.permissions[p]!=='hidden'){
            staff.permissions[p]='view';
          }
        });
        cascadeCount++;
      });
      if(cascadeCount>0){
        toast('Permissions cascaded to '+cascadeCount+' staff member(s)','info');
      }
    }
  }
  
  DB._raw_set('accounts',all);
  logA('Backend Admin updated permissions for '+all[i].username+' ('+Object.keys(perms).length+' override(s))'+(savedAccount.role==='superadmin'?' [cascaded to all school staff]':''));
  toast('Permissions saved · '+Object.keys(perms).length+' override(s)','success');
  // If this account is the currently logged-in user, refresh CU
  if(CU&&CU.id===accId){
    if(Object.keys(perms).length)CU.permissions=perms;
    else delete CU.permissions;
    if(typeof buildNav==='function')buildNav();
  }
  permMgrClearState();
  closeM();
  window._permMgrSchoolId=schoolId;
  rPermissionManager();
}

function createDefaultAccountsForSchool(schoolId,schoolName){
  const all=DB._raw_get('accounts')||[];
  // Generate a short suffix to make usernames unique across schools
  const suffix='_'+schoolId.slice(-6).replace(/[^a-z0-9]/g,'');
  const created=[];
  SCHOOL_DEFAULT_ACCOUNTS.forEach((tmpl,idx)=>{
    const username=schoolId==='default_school'
      ? (tmpl.username+(tmpl.scope?'_'+tmpl.scope.toLowerCase().replace(/[^a-z]/g,'').slice(0,3):''))
      : tmpl.username+suffix;
    // Skip if username already taken
    if(all.some(a=>a.username===username))return;
    const acc={
      id:'sa_'+schoolId.slice(-6)+'_'+idx+'_'+Date.now().toString(36),
      username,
      password:tmpl.role==='superadmin'?'admin123':'staff@123',
      role:tmpl.role,
      firstName:tmpl.firstName,
      lastName:tmpl.lastName,
      email:'',
      phone:'',
      active:true,
      theme:tmpl.theme||'blue',
      lang:'en',
      schoolId,
      created:new Date().toISOString().split('T')[0]
    };
    if(tmpl.scope)acc.scope=tmpl.scope;
    all.push(acc);
    created.push(acc);
  });
  DB._raw_set('accounts',all);
  console.log('[Multi-School] Created '+created.length+' default accounts for school: '+schoolName);
  return created;
}

  // For each role, append accessible custom pages to its nav
  Object.keys(NAV).forEach(role=>{

    pages.forEach(p=>{

      if(!roles.includes(role))return;
      const navItem={id:'custom_'+p.id,i:p.icon||'📄',k:'custom_'+p.id,_customLabel:p.name};
      if(!NAV[role].some(item=>item.id===navItem.id)){

  // Backend admin's nav: add ALL custom pages from current school
  if(NAV.backend_admin){
    pages.forEach(p=>{
      const navItem={id:'custom_'+p.id,i:p.icon||'📄',k:'custom_'+p.id,_customLabel:p.name};
      if(!NAV.backend_admin.some(item=>item.id===navItem.id)){

function customPageAddM(pageId){
  const sid=getActiveSchoolId();
  const page=getCustomPages(sid).find(p=>p.id===pageId);

  const formHTML=page.fields.map(f=>{
    let input='';

    }
    else if(f.type==='date')input='<input type="date" id="cf-'+f.key+'">';
    else if(f.type==='number')input='<input type="number" id="cf-'+f.key+'">';
    else input='<input type="text" id="cf-'+f.key+'"'+(f.placeholder?' placeholder="'+esc(f.placeholder)+'"':'')+'>';
    return'<div class="fg"><label>'+esc(f.label)+(f.required?' *':'')+'</label>'+input+'</div>';
  }).join('');

function customPageSave(pageId){
  const sid=getActiveSchoolId();
  const page=getCustomPages(sid).find(p=>p.id===pageId);
  if(!page)return;
  const data={id:'rec_'+Date.now().toString(36),created:new Date().toISOString(),createdBy:CU.firstName+' '+CU.lastName};
  for(const f of page.fields){
    const el=document.getElementById('cf-'+f.key);
    if(!el)continue;
    data[f.key]=el.value.trim();
    if(f.required&&!data[f.key]){toast(f.label+' is required','danger');return;}
  }
  const list=DB._raw_get(sid+'__custom_'+pageId)||[];
  list.push(data);
  DB._raw_set(sid+'__custom_'+pageId,list);
  logA('Added '+page.name+' record');
  toast('Record saved','success');
  closeM();
  renderCustomPage(pageId);
}

    const v=rec[f.key]||'';
    let input='';
    if(f.type==='textarea')input='<textarea id="cfe-'+f.key+'" rows="3">'+esc(v)+'</textarea>';
    else if(f.type==='select'){
      input='<select id="cfe-'+f.key+'"><option value="">— Choose —</option>'+(f.options||[]).map(o=>'<option value="'+esc(o)+'"'+(o===v?' selected':'')+'>'+esc(o)+'</option>').join('')+'</select>';
    }
    else if(f.type==='date')input='<input type="date" id="cfe-'+f.key+'" value="'+esc(v)+'">';
    else if(f.type==='number')input='<input type="number" id="cfe-'+f.key+'" value="'+esc(v)+'">';
    else input='<input type="text" id="cfe-'+f.key+'" value="'+esc(v)+'">';
    return'<div class="fg"><label>'+esc(f.label)+(f.required?' *':'')+'</label>'+input+'</div>';
  }).join('');
  openM('<div class="mh"><h3>✏️ Edit '+esc(page.name)+' Record</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2">'+formHTML+'</div><div class="mf"><button class="btn bg2" onclick="closeM()">'+T('cancel')+'</button><button class="btn bp" onclick="customPageSaveEdit(\''+pageId+'\',\''+recId+'\')">💾 Save</button></div>');
}

function customPageSaveEdit(pageId,recId){
  const sid=getActiveSchoolId();
  const page=getCustomPages(sid).find(p=>p.id===pageId);
  const list=DB._raw_get(sid+'__custom_'+pageId)||[];
  const i=list.findIndex(r=>r.id===recId);
  if(i<0)return;
  for(const f of page.fields){
    const el=document.getElementById('cfe-'+f.key);
    if(!el)continue;
    list[i][f.key]=el.value.trim();
    if(f.required&&!list[i][f.key]){toast(f.label+' is required','danger');return;}
  }
  list[i].updated=new Date().toISOString();
  DB._raw_set(sid+'__custom_'+pageId,list);
  toast('Record updated','success');
  closeM();
  renderCustomPage(pageId);
}

function customPageViewM(pageId,recId){
  const sid=getActiveSchoolId();
  const page=getCustomPages(sid).find(p=>p.id===pageId);
  const list=DB._raw_get(sid+'__custom_'+pageId)||[];
  const rec=list.find(r=>r.id===recId);
  if(!rec)return;
  const rows=page.fields.map(f=>'<tr><td style="font-weight:600;color:var(--tx3);padding:7px 0;border-bottom:1px solid var(--bd);width:30%">'+esc(f.label)+'</td><td style="padding:7px 0;border-bottom:1px solid var(--bd);white-space:pre-wrap">'+esc(rec[f.key]||'—')+'</td></tr>').join('');
  openM('<div class="mh"><h3>👁️ '+esc(page.name)+' Record</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb2"><table style="width:100%;font-size:12px">'+rows+'<tr><td style="font-weight:600;color:var(--tx3);padding:7px 0">Created</td><td style="padding:7px 0">'+esc((rec.created||'').split('T')[0])+' by '+esc(rec.createdBy||'—')+'</td></tr></table></div><div class="mf"><button class="btn bg2" onclick="closeM()">Close</button></div>');
}

function customPageDel(pageId,recId){
  if(!confirm('Delete this record? It can be restored from the Recycle Bin.'))return;
  const sid=getActiveSchoolId();
  const list=DB._raw_get(sid+'__custom_'+pageId)||[];
  const removed=list.find(r=>r.id===recId);
  if(removed&&typeof recycleBinAdd==='function')recycleBinAdd('custom_'+pageId,[removed]);
  DB._raw_set(sid+'__custom_'+pageId,list.filter(r=>r.id!==recId));
  toast('Record deleted','danger');
  renderCustomPage(pageId);
}

// ─── 4. CUSTOM JS INJECTION (per-school) ─────────────────

function getSchoolCustomJS(schoolId){
  return DB._raw_get(schoolId+'__custom_js')||'';
}

function setSchoolCustomJS(schoolId,code){
  DB._raw_set(schoolId+'__custom_js',code||'');
}

function runSchoolCustomJS(){
  const sid=getActiveSchoolId();
  const code=getSchoolCustomJS(sid);
  if(!code)return;
  try{
    // Run in a sandboxed-ish wrapper — has access to DB, CU, navigate, toast, etc.
    // We use a Function constructor so the code can't capture lexical scope from THIS module.
    const fn=new Function('DB','CU','navigate','toast','logA','esc','openM','closeM','T',code);
    fn(DB,CU,window.navigate,toast,logA,esc,openM,closeM,T);
    console.log('[Custom JS] Executed for school: '+sid);
  }catch(e){
    console.error('[Custom JS] Error in school custom code:',e);
  }
}

// Run custom JS on launch
(function(){
  const origLaunch=window.launch;
  if(typeof origLaunch!=='function')return;
  window.launch=function(){
    origLaunch.apply(this,arguments);
    setTimeout(()=>{
      injectCustomPagesIntoNav();
      if(typeof buildNav==='function')buildNav();
      try{runSchoolCustomJS();}catch(e){}
    },200);
  };
})();

// Re-run + re-inject when school switches live
(function(){
  if(typeof window.switchSchoolLive!=='function')return;
  const origSwitch=window.switchSchoolLive;
  window.switchSchoolLive=function(newId){
    origSwitch.apply(this,arguments);
    setTimeout(()=>{
      injectCustomPagesIntoNav();
      if(typeof buildNav==='function')buildNav();
      try{runSchoolCustomJS();}catch(e){}
    },200);
  };
})();

function cmClearEdit(){
  delete window._cmEditingPage;
  delete window._cmEditingSchoolId;
  delete window._cmEditingFieldIdx;
}

function cmToggleRole(which,role,checked){
  const p=window._cmEditingPage;
  if(!p)return;
  const key=which==='view'?'roles':'editRoles';
  if(checked){if(!p[key].includes(role))p[key].push(role);}
  else{p[key]=p[key].filter(r=>r!==role);}
  cmRenderPageEditor();
}

function cmAddField(){
  window._cmEditingFieldIdx=-1;
  cmRenderFieldEditor({key:'',label:'',type:'text',required:false,placeholder:'',options:[]});
}

function cmEditFieldM(idx){
  const p=window._cmEditingPage;
  if(!p||!p.fields[idx])return;
  window._cmEditingFieldIdx=idx;
  cmRenderFieldEditor(p.fields[idx]);
}

function cmDelField(idx){
  const p=window._cmEditingPage;
  if(!p)return;
  if(!confirm('Remove field "'+(p.fields[idx]||{}).label+'"?'))return;
  p.fields.splice(idx,1);
  cmRenderPageEditor();
}

function cmRenderFieldEditor(f){
  // Show nested modal for editing one field
  const html='<div class="mh" style="background:var(--ac3)"><h3>📋 '+(window._cmEditingFieldIdx>=0?'Edit':'Add')+' Field</h3><button class="mc" onclick="cmBackToPageEditor()">×</button></div><div class="mb2">'

    +'<div class="fg" id="cmf-options-wrap" style="display:'+(f.type==='select'?'block':'none')+'"><label>Dropdown Options (one per line)</label><textarea id="cmf-options" rows="4" placeholder="Option 1\nOption 2\nOption 3">'+esc((f.options||[]).join('\n'))+'</textarea></div>'
    +'<div class="fg" style="margin-bottom:0"><label><input type="checkbox" id="cmf-showInList" '+(f.showInList!==false?'checked':'')+' style="accent-color:var(--ac)">Show in list view</label></div>'
    +'</div><div class="mf"><button class="btn bg2" onclick="cmBackToPageEditor()">Back</button><button class="btn bp" onclick="cmSaveField()">💾 Save Field</button></div>';

function cmFieldTypeChange(t){
  const wrap=document.getElementById('cmf-options-wrap');
  if(wrap)wrap.style.display=(t==='select'?'block':'none');
}

function cmBackToPageEditor(){
  cmRenderPageEditor();
}

function cmSaveField(){
  const p=window._cmEditingPage;
  if(!p)return;
  const label=document.getElementById('cmf-label').value.trim();
  const keyRaw=document.getElementById('cmf-key').value.trim();
  const key=keyRaw.toLowerCase().replace(/[^a-z0-9_]/g,'_');
  if(!label||!key){toast('Label and Key are required','danger');return;}
  const type=document.getElementById('cmf-type').value;
  const required=document.getElementById('cmf-required').checked;
  const placeholder=document.getElementById('cmf-placeholder').value.trim();
  const showInList=document.getElementById('cmf-showInList').checked;
  const newField={label,key,type,required,placeholder,showInList};
  if(type==='select'){
    const optsRaw=document.getElementById('cmf-options').value.trim();
    newField.options=optsRaw.split('\n').map(s=>s.trim()).filter(Boolean);
  }
  // Check key uniqueness
  const idx=window._cmEditingFieldIdx;
  if(p.fields.some((f,i)=>f.key===key&&i!==idx)){toast('Key "'+key+'" already used','danger');return;}
  if(idx>=0){
    p.fields[idx]=newField;
  }else{
    p.fields.push(newField);
  }
  cmRenderPageEditor();
}

function cmSavePage(){
  const p=window._cmEditingPage;
  const schoolId=window._cmEditingSchoolId;
  if(!p||!schoolId)return;
  p.name=document.getElementById('cmp-name').value.trim();
  p.icon=document.getElementById('cmp-icon').value.trim()||'📄';
  p.description=document.getElementById('cmp-desc').value.trim();
  if(!p.name){toast('Page name is required','danger');return;}
  if(!p.fields.length){toast('Add at least one field','danger');return;}

// Internal state: stores Backend Admin's "real" identity while they're impersonating a school
// Stored in sessionStorage so it survives page navigation within the same tab.

function getBAImpersonationState(){
  try{
    const raw=sessionStorage.getItem('sms7_ba_impersonation');
    if(!raw)return null;
    return JSON.parse(raw);
  }catch(e){return null;}
}

function setBAImpersonationState(state){
  try{
    if(state)sessionStorage.setItem('sms7_ba_impersonation',JSON.stringify(state));
    else sessionStorage.removeItem('sms7_ba_impersonation');
  }catch(e){}
}

// Open a school as its Super Admin (without logout)
// — Saves the Backend Admin's real identity to sessionStorage
// — Switches CU to a synthetic Super Admin for that school
// — Sets active school
// — Re-renders nav + dashboard
function openSchoolAsSuperAdmin(schoolId){
  if(!CU){toast('Not logged in','danger');return;}
  // Must be Backend Admin OR already-impersonating-as-Super Admin
  const realRole=getBAImpersonationState()?'backend_admin':CU.role;
  if(realRole!=='backend_admin'){
    toast('Only Backend Admin can open schools this way','danger');
    return;
  }
  
  const schools=getAllSchools();
  const school=schools.find(s=>s.id===schoolId);
  if(!school){toast('School not found','danger');return;}
  
  // Auto-initialize if needed
  if(!DB._raw_get(schoolId+'__initialized')&&schoolId!=='default_school'){
    if(typeof initializeNewSchool==='function')initializeNewSchool(schoolId,school.name);
  }
  
  // Find or create a Super Admin for this school
  const accounts=DB._raw_get('accounts')||[];
  let schoolSA=accounts.find(a=>a.role==='superadmin'&&(
    (schoolId==='default_school'&&(!a.schoolId||a.schoolId==='default_school'))||
    a.schoolId===schoolId
  ));
  
  if(!schoolSA){
    // Auto-create one (rare — usually created when school was added)
    schoolSA={
      id:'sa_auto_'+schoolId.slice(-6)+'_'+Date.now().toString(36),
      username:'superadmin_'+schoolId.slice(-6),
      password:hashPasswordSync('admin123'),
      role:'superadmin',
      firstName:'Super',
      lastName:'Admin',
      email:'',phone:'',
      active:true,
      theme:school.theme||'blue',
      lang:'en',
      _mustChangePassword:true,
      schoolId,
      created:new Date().toISOString().split('T')[0]
    };
    accounts.push(schoolSA);
    DB._raw_set('accounts',accounts);
  }
  
  // Save the real Backend Admin identity so we can return to it
  const ba=findBackendAdminAccount()||CU;
  setBAImpersonationState({
    baAccountId:ba.id,
    baUsername:ba.username,
    schoolId,
    schoolName:school.name,
    startedAt:new Date().toISOString()
  });
  
  // Set active school
  DB._raw_set('active_school_id',schoolId);
  
  // Switch CU to the school's Super Admin (but mark we're impersonating)
  CU={...schoolSA,_impersonating:true,_baAccountId:ba.id,_baUsername:ba.username};
  
  // Update sidebar
  const sbun=document.getElementById('sbun');
  if(sbun)sbun.textContent=schoolSA.firstName+' '+schoolSA.lastName;
  const sbur=document.getElementById('sbur');
  if(sbur)sbur.textContent='Super Admin · '+school.name;
  const sbav=document.getElementById('sbav');
  if(sbav)sbav.textContent=((schoolSA.firstName[0]||'S')+(schoolSA.lastName[0]||'A')).toUpperCase();
  
  // Rebuild nav for Super Admin role
  if(typeof buildNav==='function')buildNav();
  
  // Show persistent banner
  showImpersonationBanner(school);
  
  // Navigate to dashboard
  if(typeof navigate==='function')navigate('dashboard');
  
  logA('Backend Admin '+ba.username+' opened school '+school.name+' as Super Admin');
  toast('Opened '+school.name+' as Super Admin — full access','success');
}

function findBackendAdminAccount(){
  const accounts=DB._raw_get('accounts')||[];
  return accounts.find(a=>a.role==='backend_admin');
}

// Return to Backend Admin view (exit impersonation)
function returnToBackendAdmin(){
  const state=getBAImpersonationState();
  if(!state){toast('Not currently impersonating','danger');return;}
  
  const accounts=DB._raw_get('accounts')||[];
  const ba=accounts.find(a=>a.id===state.baAccountId)||accounts.find(a=>a.role==='backend_admin');
  if(!ba){toast('Backend Admin account not found','danger');return;}
  
  // Restore Backend Admin as current user
  CU={...ba};
  
  // Reset active school to default (Backend Admin's home view)
  DB._raw_set('active_school_id','default_school');
  
  // Clear impersonation state
  setBAImpersonationState(null);
  
  // Update sidebar
  const sbun=document.getElementById('sbun');
  if(sbun)sbun.textContent=ba.firstName+' '+ba.lastName;
  const sbur=document.getElementById('sbur');
  if(sbur)sbur.textContent='Backend Admin';
  const sbav=document.getElementById('sbav');
  if(sbav)sbav.textContent=((ba.firstName[0]||'B')+(ba.lastName[0]||'A')).toUpperCase();
  
  // Hide impersonation banner
  hideImpersonationBanner();
  
  // Rebuild nav for Backend Admin
  if(typeof buildNav==='function')buildNav();
  
  // Re-render school picker
  if(typeof renderSchoolPicker==='function')renderSchoolPicker();
  
  // Go to Backend Admin's dashboard
  if(typeof navigate==='function')navigate('dashboard');
  
  logA('Backend Admin returned to control panel');
  toast('Returned to Backend Admin view','success');
}

// ─── PART 2: STRICT MODULE VISIBILITY ENFORCEMENT ─────────
// Hidden modules must NOT appear:
//   • In the sidebar nav (already wrapped buildNav, but reinforce)
//   • As the default page on login (route to dashboard instead)
//   • Via direct navigate() calls
//   • Even if a user knows the page ID

// Check if a module is visible for the active user in the active school
function isModuleVisibleForCurrentUser(moduleId){
  if(!CU)return false;
  // Backend Admin always sees everything (so they can re-enable)
  if(CU.role==='backend_admin'&&!CU._impersonating)return true;
  // When impersonating, treat as that school's Super Admin (respect toggles)
  if(typeof isModuleEnabled==='function'){
    return isModuleEnabled(moduleId);
  }
  return true;
}

// Wrap navigate one more time to enforce module visibility
(function(){
  if(typeof window.navigate!=='function')return;
  const origNav=window.navigate;
  window.navigate=function(page){
    // Backend Admin (real, non-impersonating) can navigate anywhere
    if(CU&&CU.role==='backend_admin'&&!CU._impersonating){
      return origNav.apply(this,arguments);
    }
    // For everyone else: enforce module toggle
    if(typeof page==='string'&&typeof isModuleEnabled==='function'){
      // Allow always-on pages that aren't in the toggle list (my_profile, custom pages, system pages)
      const alwaysAllowed=['dashboard','my_profile','activity_log','export_data','settings'];
      const isCustom=page.startsWith('custom_');
      const isInToggleList=typeof ALL_MODULES!=='undefined'&&ALL_MODULES.some(m=>m.id===page);
      if(!alwaysAllowed.includes(page)&&!isCustom&&isInToggleList){
        if(!isModuleEnabled(page)){
          toast('This module is not enabled for your school','danger');
          // Redirect to dashboard instead
          if(window._page!=='dashboard')return origNav.call(this,'dashboard');
          return;
        }
      }
    }
    return origNav.apply(this,arguments);
  };
})();

                tag.style.cssText='background:#d63838;color:#fff;font-size:8px;padding:1px 5px;border-radius:6px;margin-left:auto;font-weight:700';
                it.appendChild(tag);
              }
            });
          }
        });
      }
      return;
    }
    // Non-Backend-Admin users (including BA when impersonating): hide disabled modules completely
    origBuild.apply(this,arguments);
    if(typeof getSchoolModuleToggles==='function'&&typeof ALL_MODULES!=='undefined'){
      const sid=getActiveSchoolId();
      const toggles=getSchoolModuleToggles(sid);
      ALL_MODULES.forEach(m=>{
        if(toggles[m.id]===false){
          const items=document.querySelectorAll('.sb-it[data-page="'+m.id+'"]');
          items.forEach(it=>{it.style.display='none';});
        }
      });
    }
    // Also hide pages with permissions=hidden (from Permission Manager)
    if(CU&&CU.permissions){
      Object.keys(CU.permissions).forEach(p=>{
        if(CU.permissions[p]==='hidden'){
          document.querySelectorAll('.sb-it[data-page="'+p+'"]').forEach(it=>{it.style.display='none';});
        }
      });
    }
  };
})();

// Hide module toggles from CU's launch flow: if their default page is disabled, route to dashboard
(function(){
  const origLaunch=window.launch;
  if(typeof origLaunch!=='function')return;
  window.launch=function(){
    origLaunch.apply(this,arguments);
    // After launch, if the currently visible page is a disabled module, redirect to dashboard
    setTimeout(()=>{
      if(!CU||CU.role==='backend_admin')return;
      const currentPage=window._page;
      if(!currentPage||currentPage==='dashboard')return;
      if(typeof isModuleEnabled==='function'&&typeof ALL_MODULES!=='undefined'){
        const isInList=ALL_MODULES.some(m=>m.id===currentPage);
        if(isInList&&!isModuleEnabled(currentPage)){
          navigate('dashboard');
        }
      }
    },300);
  };
})();

function ttShowWizard(d){

    {n:'Subjects',done:d.subjects.length>0},

  document.getElementById('pc').innerHTML=`
<div style="max-width:860px;margin:0 auto">
  <div class="card" style="margin-bottom:13px;background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;padding:18px 20px">

  ${d.savedConfigs&&d.savedConfigs.length?`<div class="card" style="margin-top:11px;padding:12px 16px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;font-weight:600;color:var(--tx3)">📂 Previous Configurations (${d.savedConfigs.length})</span><button onclick="ttLoadPrevConfig()" class="btn bg2 bsm">Load Previous Data</button></div></div>`:''}

function ttStep6(d){
  // Matrix: rows = subjects, cols = classes, cells = weekly periods count
  const weeklyTotal={};
  d.groups.forEach(g=>{d.classes.filter(c=>c.groupId===g.id).forEach(c=>{weeklyTotal[c.id]=(g.periods||7)*TT_DAYS.length;});});
  
  const subRows=d.subjects.map(s=>{
    const c=TT_PAL[s.ci%TT_PAL.length];
    const cells=d.classes.map(cl=>{
      const key=s.id+'_'+cl.id;
      const val=d.weeklyPeriods[key]||0;
      return`<td style="padding:3px"><input type="number" min="0" max="20" value="${val}" id="ttwp-${key}" onchange="ttSetWP('${key}',this.value)" style="width:40px;font-size:11px;padding:3px 4px;text-align:center;background:${val>0?c.bg:'var(--sf2)'};border:1px solid ${val>0?c.bd:'var(--bd)'};border-radius:3px;color:${val>0?c.tx:'var(--tx)'}"></td>`;
    }).join('');
    return`<tr><td style="padding:5px 8px;font-weight:600;font-size:11px;white-space:nowrap;background:${c.bg};color:${c.tx};border-left:3px solid ${c.bd}">${esc(s.name)}</td>${cells}</tr>`;
  }).join('');
  
  const classTotals=d.classes.map(cl=>{
    const total=d.subjects.reduce((sum,s)=>sum+(d.weeklyPeriods[s.id+'_'+cl.id]||0),0);
    const target=weeklyTotal[cl.id]||35;
    const ok=total===target;
    return`<td style="padding:3px;text-align:center"><span style="font-size:10px;font-weight:700;color:${ok?'#16a34a':total>target?'#ef4444':'#d97706'}">${total}/${target}</span></td>`;
  }).join('');
  
  return`<h4 style="margin:0 0 11px">📊 Weekly Periods per Subject</h4>
    <div style="font-size:12px;color:var(--tx3);margin-bottom:11px">How many periods per week does each subject get in each class?</div>
    <div style="overflow-x:auto;margin-bottom:11px">
      <table style="border-collapse:collapse;font-size:11px">
        <thead><tr><th style="padding:5px 8px;text-align:left;background:var(--sf2)">Subject</th>${d.classes.map(cl=>`<th style="padding:5px 4px;text-align:center;background:var(--sf2);font-size:10px;min-width:44px">${esc(cl.name)}</th>`).join('')}</tr></thead>
        <tbody>${subRows}</tbody>
        <tfoot><tr><td style="padding:5px 8px;font-weight:700;font-size:10px">Total</td>${classTotals}</tr></tfoot>

      <button onclick="ttSaveStep6()" class="btn bp">Save & Next →</button>

}

// ─── GENERATOR ───────────────────────────────────────────
function ttDoGenerate(){
  const d=ttD();
  toast('Generating clash-free timetable…','info');
  setTimeout(()=>{
    try{
      d.grid=ttRunGen(d);d.generated=true;
      ttS(d);toast('✅ Timetable generated!','success');
      ttShowEditor();
    }catch(e){toast('Error: '+e.message,'danger');console.error(e);}
  },100);
}

function ttRunGen(d){
  const grid={};const busy={};
  d.classes.forEach(c=>{grid[c.id]={};TT_DAYS.forEach(day=>{grid[c.id][day]={};});});
  const isBusy=(tid,day,p)=>!!busy[tid+'_'+day+'_'+p];
  const setBusy=(tid,day,p)=>{if(tid)busy[tid+'_'+day+'_'+p]=true;};
  
  // Place merged classes first (same teacher, same period for N classes)
  (d.mergedClasses||[]).forEach(m=>{
    let placed=0;const ppw=d.weeklyPeriods[m.subjectId+'_'+m.classIds[0]]||0;
    for(let day=0;day<TT_DAYS.length&&placed<ppw;day++){
      const grp=d.groups.find(g=>g.id===(d.classes.find(c=>c.id===m.classIds[0])||{}).groupId)||d.groups[0];
      for(let p=1;p<=(grp?.periods||7)&&placed<ppw;p++){
        if(isBusy(m.teacherId,TT_DAYS[day],p))continue;
        let allFree=m.classIds.every(cid=>!grid[cid]?.[TT_DAYS[day]]?.[p]);
        if(!allFree)continue;
        m.classIds.forEach(cid=>{grid[cid][TT_DAYS[day]][p]={type:'normal',subjectId:m.subjectId,teacherId:m.teacherId,merged:true};});
        setBusy(m.teacherId,TT_DAYS[day],p);placed++;
      }
    }
  });
  
  // Place paired subjects
  (d.pairedSubjects||[]).forEach(pair=>{
    pair.classIds.forEach(cid=>{
      const grp=d.groups.find(g=>g.id===(d.classes.find(c=>c.id===cid)||{}).groupId)||d.groups[0];
      const ppw=Math.max(...pair.slots.map(sl=>d.weeklyPeriods[sl.subjectId+'_'+cid]||0));
      let placed=0;
      for(let day=0;day<TT_DAYS.length&&placed<ppw;day++){
        for(let p=1;p<=(grp?.periods||7)&&placed<ppw;p++){
          if(grid[cid]?.[TT_DAYS[day]]?.[p])continue;
          let teachersFree=pair.slots.every(sl=>!sl.teacherId||!isBusy(sl.teacherId,TT_DAYS[day],p));
          if(!teachersFree)continue;
          grid[cid][TT_DAYS[day]][p]={type:'split',slots:pair.slots.map(sl=>({subjectId:sl.subjectId,teacherId:sl.teacherId}))};
          pair.slots.forEach(sl=>{if(sl.teacherId)setBusy(sl.teacherId,TT_DAYS[day],p);});
          placed++;
        }
      }
    });
  });
  
  // Build demands
  const demands={};
  d.classes.forEach(c=>{
    demands[c.id]=[];
    d.subjects.forEach(s=>{
      const ppw=d.weeklyPeriods[s.id+'_'+c.id]||0;
      // Subtract already-placed (merged/paired)
      let already=0;
      TT_DAYS.forEach(day=>{
        const grp=d.groups.find(g=>g.id===c.groupId)||d.groups[0];
        for(let p=1;p<=(grp?.periods||7);p++){
          const slot=grid[c.id]?.[day]?.[p];
          if(!slot)continue;
          if(slot.type==='normal'&&slot.subjectId===s.id)already++;
          if(slot.type==='split'&&slot.slots.some(sl=>sl.subjectId===s.id))already++;
        }
      });
      // Find teacher for this subject+class
      const tch=d.teachers.find(t=>t.subjects.some(sa=>sa.subjectId===s.id&&sa.classIds.includes(c.id)));
      const need=Math.max(0,ppw-already);
      for(let i=0;i<need;i++)demands[c.id].push({sid:s.id,tid:tch?tch.id:''});
    });
  });
  
  // 10 attempts with shuffle
  let best=null,bestScore=-1;
  for(let att=0;att<10;att++){
    const g=JSON.parse(JSON.stringify(grid));
    const tb=JSON.parse(JSON.stringify(busy));
    const dem={};d.classes.forEach(c=>{dem[c.id]=demands[c.id].slice().sort(()=>Math.random()-.5);});
    let filled=0;
    const maxPer=d.groups.reduce((m,gr)=>Math.max(m,gr.periods||7),0);
    for(let p=1;p<=maxPer;p++){
      d.classes.forEach(c=>{
        const grp=d.groups.find(gr=>gr.id===c.groupId)||d.groups[0];
        if((grp?.periods||7)<p)return;
        TT_DAYS.forEach(day=>{
          if(g[c.id]?.[day]?.[p])return;
          const avail=dem[c.id].filter(x=>!x._u&&!(x.tid&&tb[x.tid+'_'+day+'_'+p]));
          avail.sort((a,b)=>{
            const aT=Object.values(g[c.id][day]||{}).filter(v=>v?.subjectId===a.sid).length;
            const bT=Object.values(g[c.id][day]||{}).filter(v=>v?.subjectId===b.sid).length;
            return aT-bT;
          });
          if(avail.length){
            const ch=avail[0];
            g[c.id][day][p]={type:'normal',subjectId:ch.sid,teacherId:ch.tid};
            if(ch.tid)tb[ch.tid+'_'+day+'_'+p]=c.id;
            const idx=dem[c.id].findIndex(x=>x.sid===ch.sid&&x.tid===ch.tid&&!x._u);
            if(idx>=0)dem[c.id][idx]._u=true;
            filled++;
          }
        });
      });
    }
    if(filled>bestScore){bestScore=filled;best=JSON.parse(JSON.stringify(g));}
  }
  return best||grid;
}

      <div class="fg"><label>CSV File</label><input type="file" id="tt-csv" accept=".csv,.txt"></div>
    </div>
    <div class="mf"><button class="btn bg2" onclick="closeM()">Cancel</button><button class="btn bp" onclick="ttDoCSV()">📥 Import</button></div>`);

function ttDoCSV(){
  const file=document.getElementById('tt-csv')?.files[0];if(!file){toast('Select file','danger');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim()).slice(1);
    const d=ttD();let added=0;
    lines.forEach((line,idx)=>{
      const cols=ttCSVR(line);const name=(cols[0]||'').trim();const short=(cols[1]||'').trim();
      const subject=(cols[2]||'').trim();const classesRaw=(cols[3]||'').trim();
      if(!name||!subject)return;
      let sub=d.subjects.find(s=>s.name.toLowerCase()===subject.toLowerCase());
      if(!sub){sub={id:'s'+Date.now().toString(36)+'_'+idx,name:subject,short:subject.slice(0,4).toUpperCase(),ci:d.subjects.length%TT_PAL.length};d.subjects.push(sub);}
      let tch=d.teachers.find(t=>t.name.toLowerCase()===name.toLowerCase());
      if(!tch){tch={id:'t'+Date.now().toString(36)+'_'+idx,name,short:short||name.slice(0,3).toUpperCase(),subjects:[]};d.teachers.push(tch);added++;}
      let sa=tch.subjects.find(x=>x.subjectId===sub.id);
      if(!sa){sa={subjectId:sub.id,classIds:[]};tch.subjects.push(sa);}
      classesRaw.split(/[,;]/).map(s=>s.trim()).filter(Boolean).forEach(cn=>{
        let cls=d.classes.find(c=>c.name.toLowerCase()===cn.toLowerCase());
        if(cls&&!sa.classIds.includes(cls.id))sa.classIds.push(cls.id);
      });
    });
    ttS(d);closeM();toast(added+' teachers imported','success');ttShowWizard(d);
  };
  reader.readAsText(file);
}
function ttCSVR(line){const r=[];let q=false,c='';for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}r.push(c);return r;}

function ttCalcTime(period,cls,d){
  const grp=d.groups.find(g=>g.id===cls.groupId)||d.groups[0];
  const[h,m]=(d.schoolStart||'07:30').split(':').map(Number);
  let total=h*60+m;const dur=grp?.periodMins||40;
  for(let p=1;p<period;p++){total+=dur;const br=(grp?.breaks||[]).find(b=>b.after===p);if(br)total+=br.min||0;}
  return`${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
}

function ttRenderSlot(slot,d){
  if(!slot)return`<div style="height:48px;display:flex;align-items:center;justify-content:center;color:#cbd5e1;border:1.5px dashed var(--bd);border-radius:3px">+</div>`;

    return`<div style="height:48px;display:flex;gap:1px">${(slot.slots||[]).map(sl=>{
      const sub=d.subjects.find(s=>s.id===sl.subjectId);const tch=d.teachers.find(t=>t.id===sl.teacherId);
      const col=sub?TT_PAL[sub.ci%TT_PAL.length]:TT_PAL[0];

}

    let h=`<th class="dy" style="min-width:60px;background:#1e3a5f;color:#fff">Day</th>`;
    for(let p=1;p<=(grp?.periods||7);p++){const t=ttCalcTime(p,cls,d);h+=`<th>P${p}<br><span style="font-size:7px;font-weight:400">${t}</span></th>`;const br=breaks.find(b=>b.after===p);if(br)h+=`<th class="brk">${esc(br.name)}${br.time?'<br>'+br.time:''}</th>`;}
    const rows=TT_DAYS.map(day=>{let cells=`<td class="dy">${day}</td>`;for(let p=1;p<=(grp?.periods||7);p++){const slot=clsG[day]?.[p];if(!slot){cells+=`<td class="em">—</td>`;}else if(slot.type==='normal'){const sub=d.subjects.find(x=>x.id===slot.subjectId);const tch=d.teachers.find(x=>x.id===slot.teacherId);const col=sub?TT_PAL[sub.ci%TT_PAL.length]:TT_PAL[0];cells+=`<td style="background:${col.bg}"><strong style="color:${col.tx}">${esc(sub?sub.short||sub.name:'?')}</strong><br><span style="font-size:7px;color:${col.tx}">${esc(tch?tch.short||tch.name:'?')}</span></td>`;}else if(slot.type==='split'){cells+=`<td style="padding:0"><div class="sp">${(slot.slots||[]).map(sl=>{const sub=d.subjects.find(x=>x.id===sl.subjectId);const tch=d.teachers.find(x=>x.id===sl.teacherId);const col=sub?TT_PAL[sub.ci%TT_PAL.length]:TT_PAL[0];return`<div class="sh" style="background:${col.bg}"><strong style="color:${col.tx}">${esc(sub?sub.short||sub.name:'?')}</strong><br><span style="font-size:7px;color:${col.tx}">${esc(tch?tch.short||tch.name:'?')}</span></div>`;}).join('')}</div></td>`;}const br=breaks.find(b=>b.after===p);if(br)cells+=`<td class="brk">☕</td>`;}return`<tr>${cells}</tr>`;}).join('');
    return`<h2>${esc(cls.name)}</h2><table><thead><tr>${h}</tr></thead><tbody>${rows}</tbody></table>`;
  }
  function tchTbl(tch){
    let total=0;const tG={};
    d.classes.forEach(c=>{TT_DAYS.forEach(day=>{Object.entries((d.grid[c.id]||{})[day]||{}).forEach(([p,slot])=>{let f=null;if(slot?.type==='normal'&&slot.teacherId===tch.id)f={cn:c.name,sid:slot.subjectId};if(slot?.type==='split')(slot.slots||[]).forEach(sl=>{if(sl.teacherId===tch.id)f={cn:c.name,sid:sl.subjectId};});if(f){if(!tG[day])tG[day]={};tG[day][parseInt(p)]=f;total++;}});});});
    const maxP=d.groups.reduce((m,g)=>Math.max(m,g.periods||7),0);
    let h=`<th class="dy" style="background:#1e3a5f;color:#fff">Day</th>`;for(let p=1;p<=maxP;p++)h+=`<th>P${p}</th>`;
    const rows=TT_DAYS.map(day=>{let cells=`<td class="dy">${day}</td>`;for(let p=1;p<=maxP;p++){const cell=(tG[day]||{})[p];if(!cell){cells+=`<td class="em">—</td>`;continue;}const sub=d.subjects.find(x=>x.id===cell.sid);const col=sub?TT_PAL[sub.ci%TT_PAL.length]:TT_PAL[0];cells+=`<td style="background:${col.bg}"><strong style="color:${col.tx};font-size:9px">${esc(sub?sub.name:'?')}</strong><br><span style="font-size:7px;color:${col.tx}">${esc(cell.cn)}</span></td>`;}return`<tr>${cells}</tr>`;}).join('');
    return`<h2>${esc(tch.name)} — ${total} periods/week</h2><table><thead><tr>${h}</tr></thead><tbody>${rows}</tbody></table>`;
  }

  let body='';
  if(type==='ac'){body=hdr+'<h1>All Classes</h1>';d.classes.forEach((c,i)=>{body+=(i?'<div class="pb"></div>':'')+clsTbl(c);});}
  else if(type==='cs'){
    const maxP=d.groups.reduce((m,g)=>Math.max(m,g.periods||7),0);
    let th=`<th style="text-align:left">Class</th>${TT_DAYS.map(day=>`<th colspan="${maxP}" style="background:#1a3a5c">${day}</th>`).join('')}`;
    let th2=`<th></th>${TT_DAYS.map(()=>[...Array(maxP)].map((_,i)=>`<th class="dy" style="font-size:7px">P${i+1}</th>`).join('')).join('')}`;
    const rows=d.classes.map(c=>{let cells=`<td style="font-weight:700;text-align:left;padding-left:5px;font-size:9px">${esc(c.name)}</td>`;TT_DAYS.forEach(day=>{for(let p=1;p<=maxP;p++){const slot=(d.grid[c.id]||{})[day]?.[p];if(!slot){cells+=`<td class="em">—</td>`;continue;}if(slot.type==='normal'){const sub=d.subjects.find(x=>x.id===slot.subjectId);const col=sub?TT_PAL[sub.ci%TT_PAL.length]:TT_PAL[0];cells+=`<td style="background:${col.bg};font-size:8px"><strong style="color:${col.tx}">${esc(sub?sub.short||sub.name.slice(0,5):'?')}</strong></td>`;}else cells+=`<td style="font-size:7px">SP</td>`;}});return`<tr>${cells}</tr>`;}).join('');
    body=hdr+'<h1>Classes Summary</h1><table><thead><tr>'+th+'</tr><tr>'+th2+'</tr></thead><tbody>'+rows+'</tbody></table>';
  }else if(type==='at'){body=hdr+'<h1>All Teachers</h1>';d.teachers.forEach((t,i)=>{body+=(i?'<div class="pb"></div>':'')+tchTbl(t);});}
  else if(type==='ts'){
    const maxP=d.groups.reduce((m,g)=>Math.max(m,g.periods||7),0);
    let th=`<th style="text-align:left">Teacher</th>${TT_DAYS.map(day=>`<th colspan="${maxP}" style="background:#1a3a5c">${day}</th>`).join('')}<th>Total</th>`;
    let th2=`<th></th>${TT_DAYS.map(()=>[...Array(maxP)].map((_,i)=>`<th class="dy" style="font-size:7px">P${i+1}</th>`).join('')).join('')}<th></th>`;
    const rows=d.teachers.map(tch=>{let total=0;let cells=`<td style="font-weight:700;text-align:left;padding:3px 5px;font-size:9px">${esc(tch.name)}</td>`;TT_DAYS.forEach(day=>{for(let p=1;p<=maxP;p++){let f=null;d.classes.forEach(c=>{const slot=(d.grid[c.id]||{})[day]?.[p];if(!slot)return;if(slot.type==='normal'&&slot.teacherId===tch.id)f={cn:c.name,sid:slot.subjectId};if(slot.type==='split')(slot.slots||[]).forEach(sl=>{if(sl.teacherId===tch.id)f={cn:c.name,sid:sl.subjectId};});});if(!f){cells+=`<td class="em">—</td>`;continue;}const sub=d.subjects.find(x=>x.id===f.sid);const col=sub?TT_PAL[sub.ci%TT_PAL.length]:TT_PAL[0];cells+=`<td style="background:${col.bg};font-size:8px"><strong style="color:${col.tx}">${esc(sub?sub.short||sub.name.slice(0,5):'?')}</strong><br><span style="font-size:7px;color:${col.tx}">${esc(f.cn)}</span></td>`;total++;}});cells+=`<td style="font-weight:700;text-align:center;background:#dcfce7;color:#14532d">${total}</td>`;return`<tr>${cells}</tr>`;}).join('');
    body=hdr+'<h1>Teachers Summary</h1><table><thead><tr>'+th+'</tr><tr>'+th2+'</tr></thead><tbody>'+rows+'</tbody></table>';
  }
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Timetable</title><style>${css}</style></head><body>${body}<br><button onclick="window.print()" style="padding:9px 20px;background:#1e3a5f;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:13px">🖨 Print / Save PDF</button></body></html>`);
  w.document.close();setTimeout(()=>{try{w.print();}catch(e){}},800);
}

// ═══ FINAL ENFORCEMENT: PERMISSIONS + MODULE TOGGLES ═════
// This runs LAST so it definitively hides tabs that Backend Admin marked hidden.

(function finalEnforcement(){
  
  // Helper: get Super Admin's permissions for the current school (for cascade)
  function getSuperAdminPerms(){
    try{
      const sid=typeof getActiveSchoolId==='function'?getActiveSchoolId():'default_school';
      const allAcc=DB._raw_get?DB._raw_get('accounts'):DB.get('accounts')||[];
      const sa=(allAcc||[]).find(a=>a.role==='superadmin'&&(
        (sid==='default_school'&&(!a.schoolId||a.schoolId==='default_school'))||a.schoolId===sid
      ));
      return sa&&sa.permissions?sa.permissions:{};
    }catch(e){return {};}
  }
  
  // Check if a page is effectively hidden for the current user
  function isPageHidden(page){
    if(!CU)return false;
    // Backend Admin (not impersonating) sees everything
    if(CU.role==='backend_admin'&&!CU._impersonating)return false;
    // Direct permission on this account
    if(CU.permissions&&CU.permissions[page]==='hidden')return true;
    // CASCADE: if Super Admin has it hidden, ALL other staff are hidden too
    if(CU.role!=='superadmin'){
      const saPerms=getSuperAdminPerms();
      if(saPerms[page]==='hidden')return true;
    }
    // Module toggle check
    if(typeof getSchoolModuleToggles==='function'&&typeof ALL_MODULES!=='undefined'){
      const sid=typeof getActiveSchoolId==='function'?getActiveSchoolId():'default_school';
      const toggles=getSchoolModuleToggles(sid);
      const isModule=ALL_MODULES.some(m=>m.id===page);
      if(isModule&&toggles[page]===false)return true;
    }
    return false;
  }
  
  // Check if view-only
  function isPageViewOnly(page){
    if(!CU||CU.role==='backend_admin')return false;
    if(CU.permissions&&CU.permissions[page]==='view')return true;
    // CASCADE: if SA is view-only, staff is at most view-only
    if(CU.role!=='superadmin'){
      const saPerms=getSuperAdminPerms();
      if(saPerms[page]==='view')return true;
    }
    return false;
  }
  
  // Wrap buildNav — FINAL wrapper
  if(typeof window.buildNav==='function'){
    const _origBN=window.buildNav;
    window.buildNav=function(){
      _origBN.apply(this,arguments);
      if(!CU)return;
      if(CU.role==='backend_admin'&&!CU._impersonating)return;
      
      // Hide all pages that should be hidden (own permissions + SA cascade + module toggles)
      const allPages=typeof PAGE_LABELS!=='undefined'?Object.keys(PAGE_LABELS):[];
      allPages.forEach(pageId=>{
        if(isPageHidden(pageId)){
          document.querySelectorAll('.sb-it[data-page="'+pageId+'"]').forEach(el=>{el.style.display='none';});
        }
      });
    };
  }
  
  // Wrap navigate — FINAL wrapper
  if(typeof window.navigate==='function'){
    const _origNV=window.navigate;
    window.navigate=function(page){
      if(!CU)return _origNV.apply(this,arguments);
      if(CU.role==='backend_admin'&&!CU._impersonating)return _origNV.apply(this,arguments);
      
      if(isPageHidden(page)){
        toast('This page is not available for your account','danger');
        return;
      }
      
      const result=_origNV.apply(this,arguments);
      
      // Apply view-only mode if applicable (own permissions or SA cascade)
      if(isPageViewOnly(page)){
        setTimeout(()=>{if(typeof applyViewOnlyMode==='function')applyViewOnlyMode(page);},100);
      }
      
      return result;
    };
  }
  
  console.log('[Final Enforcement] Permission cascade + module toggle enforcement active');
})();
